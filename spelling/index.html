<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Romeo Spelling">
<link rel="apple-touch-icon" href="https://img.icons8.com/color/180/lego-head.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&family=Literata:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<title>Romeo's Spelling</title>
<style>
:root {
  --bg: #f0f4f8;
  --card: #ffffff;
  --primary: #4f7ef8;
  --primary-dark: #3563d4;
  --yellow: #ffd60a;
  --yellow-dark: #e6c200;
  --red: #ff453a;
  --green: #30d158;
  --text: #1a1a2e;
  --text-2: #6b7280;
  --radius: 20px;
  --shadow: 0 4px 20px rgba(0,0,0,0.07);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; }
body {
  margin: 0; padding: 0;
  font-family: 'Nunito', sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; width: 100vw;
  display: flex; flex-direction: column;
  overflow: hidden;
}
header {
  background: #fff;
  padding: 12px 20px;
  padding-top: max(12px, env(safe-area-inset-top));
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(0,0,0,0.06);
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.brand { display: flex; align-items: center; gap: 10px; }
.avatar {
  width: 40px; height: 40px; background: var(--yellow);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 22px; color: #333;
  box-shadow: 0 4px 0 var(--yellow-dark);
  font-family: 'Fredoka One', cursive;
}
.brand-name { font-weight: 900; font-size: 17px; font-family: 'Fredoka One', cursive; }
.brand-sub { font-size: 11px; color: var(--text-2); font-weight: 600; }
#app {
  flex: 1; overflow-y: auto; padding: 20px;
  padding-bottom: max(30px, env(safe-area-inset-bottom));
  -webkit-overflow-scrolling: touch;
}
.card {
  background: var(--card); border-radius: var(--radius); padding: 22px;
  box-shadow: var(--shadow); margin-bottom: 14px;
  border: 1px solid rgba(0,0,0,0.03);
}
.btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 17px;
  border: none; border-radius: 14px;
  font-size: 17px; font-weight: 800; cursor: pointer;
  margin-bottom: 12px; transition: transform 0.1s, box-shadow 0.1s;
  font-family: 'Nunito', sans-serif;
}
.btn:active { transform: scale(0.97) translateY(2px); box-shadow: none !important; }
.btn-primary { background: var(--primary); color: #fff; box-shadow: 0 5px 0 var(--primary-dark); }
.btn-yellow { background: var(--yellow); color: #1a1a2e; box-shadow: 0 5px 0 var(--yellow-dark); }
.btn-green { background: var(--green); color: #fff; box-shadow: 0 5px 0 #1fa846; }
.btn-outline { background: #fff; color: var(--primary); border: 2px solid #e5eaf5; box-shadow: none; }
.btn-red { background: #fff0f0; color: var(--red); border: 1.5px solid #ffd5d3; box-shadow: none; }
.btn-gray { background: #f1f3f7; color: #555; border: none; box-shadow: none; }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { margin-bottom: 0; }
.btn-sm { padding: 10px 16px; font-size: 14px; border-radius: 10px; width: auto; }
.hero-title {
  font-family: 'Fredoka One', cursive;
  font-size: 52px; color: #1a1a2e;
  text-shadow: 3px 3px 0 #dce3ef;
  margin: 0 0 6px 0; letter-spacing: 1px;
}
.home-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; margin-bottom: 14px;
}
.mode-card {
  background: var(--card); border-radius: var(--radius);
  padding: 20px 16px; cursor: pointer;
  box-shadow: var(--shadow); border: 2px solid transparent;
  transition: border-color 0.2s, transform 0.1s;
  display: flex; flex-direction: column; align-items: center;
  text-align: center; gap: 10px;
}
.mode-card:active { transform: scale(0.98); }
.mode-card.learn { border-color: #b3caff; background: linear-gradient(135deg, #f0f4ff 0%, #fff 60%); }
.mode-card.practice { border-color: #fde68a; background: linear-gradient(135deg, #fffbea 0%, #fff 60%); }
.mode-card.records { border-color: #a7f3c8; background: linear-gradient(135deg, #f0fdf6 0%, #fff 60%); }
.mode-card.manage { border-color: #e0e7ff; background: linear-gradient(135deg, #f8f0ff 0%, #fff 60%); }
.mode-icon { font-size: 38px; flex-shrink: 0; }
.mode-info h3 { margin: 0 0 3px 0; font-size: 16px; font-weight: 800; }
.mode-info p { margin: 0; font-size: 12px; color: var(--text-2); font-weight: 600; line-height: 1.4; }

/* Tabs */
.tab-bar {
  display: flex; gap: 0; margin-bottom: 16px;
  background: #f1f3f7; border-radius: 14px; padding: 4px; overflow-x: auto;
}
.tab-btn {
  flex-shrink: 0; padding: 9px 16px; border: none; border-radius: 10px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  background: transparent; color: var(--text-2); transition: all 0.15s;
  font-family: 'Nunito', sans-serif; white-space: nowrap;
}
.tab-btn.active { background: #fff; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

/* Target practice card */
.target-card {
  border-radius: 16px; padding: 18px; margin-bottom: 12px; cursor: pointer;
  background: linear-gradient(135deg, #fff5f0 0%, #fff 70%);
  border: 2px solid #ffccb3; box-shadow: 0 3px 12px rgba(255,100,50,0.08);
  display: flex; align-items: center; gap: 14px;
}
.target-card:active { transform: scale(0.98); }
.target-card.practice-type {
  background: linear-gradient(135deg, #f0f8ff 0%, #fff 70%);
  border-color: #b3d4ff;
}

/* Word stats badge */
.stat-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 800;
}
.stat-correct { background: #e6faf0; color: #1a7f45; }
.stat-wrong { background: #ffeef0; color: #c0392b; }
.stat-net-pos { background: #e8f5ff; color: #2563eb; }
.stat-net-neg { background: #fff0e8; color: #c2410c; }

/* Learn module */
.learn-progress {
  text-align: center; font-size: 13px; color: var(--text-2); font-weight: 700;
  margin-bottom: 14px; letter-spacing: 0.5px;
}
.learn-word-card {
  background: #fff; border-radius: 24px; padding: 40px 24px;
  text-align: center; box-shadow: 0 8px 32px rgba(79,126,248,0.1);
  border: 2px solid #e8effd; margin-bottom: 16px; min-height: 160px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.phonics-display {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 0;
  font-family: 'Literata', Georgia, serif; font-size: 76px; font-weight: 400;
  line-height: 1.15; min-height: 92px; align-items: center; letter-spacing: 1px;
}
.phonics-chunk { display: inline-flex; transition: opacity 0.3s, transform 0.3s; }
.phonics-chunk.hidden-chunk { opacity: 0; transform: translateY(8px); pointer-events: none; }
.phonics-chunk.color-0 { color: #e63946; }
.phonics-chunk.color-1 { color: #4f7ef8; }
.learn-controls { display: flex; flex-direction: column; gap: 10px; }
.learn-step-hint {
  text-align: center; color: var(--text-2); font-size: 13px; font-weight: 700;
  letter-spacing: 0.5px; padding: 8px; background: #f8faff; border-radius: 10px;
}

/* Practice */
.tiles-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
.letter-tile {
  width: 58px; height: 68px; background: var(--primary); color: #fff;
  border-radius: 12px; font-size: 34px; font-weight: 400;
  font-family: 'Literata', Georgia, serif;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  box-shadow: 0 5px 0 var(--primary-dark);
  transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s; border: none;
}
.letter-tile:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--primary-dark); }
.letter-tile.used { opacity: 0; pointer-events: none; }
.letter-tile.wrong-tile { background: var(--red); box-shadow: 0 5px 0 #c0392b; animation: shake 0.35s ease; }
.slots-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 18px 0 24px 0; }
.answer-slot {
  width: 58px; height: 68px; border-bottom: 5px solid #e0e0e0;
  font-size: 34px; font-weight: 400; font-family: 'Literata', Georgia, serif;
  display: flex; align-items: center; justify-content: center;
  background: #fff; color: #333; border-radius: 8px; transition: all 0.2s;
}
.answer-slot.filled { border-bottom-color: var(--primary); background: #f0f4ff; color: var(--primary); }
.answer-slot.correct { background: var(--green); border-bottom-color: var(--green); color: #fff; border-radius: 12px; border-bottom-width: 0; }
.answer-slot.wrong { background: var(--red); border-bottom-color: var(--red); color: #fff; border-radius: 12px; border-bottom-width: 0; }
.blank-char {
  width: 52px; height: 64px; border-bottom: 5px solid #e0e0e0;
  font-size: 38px; font-weight: 400; font-family: 'Literata', Georgia, serif;
  display: flex; align-items: center; justify-content: center;
  background: #fff; color: #333; border-radius: 8px; transition: all 0.15s;
}
.blank-char.active { border-bottom-color: var(--primary); background: #f0f5ff; transform: translateY(-3px); }
.blank-char.filled { border-bottom-color: #333; }
.blank-char.correct { color: #fff; background: var(--green); border: none; border-radius: 12px; }
.blank-char.wrong { color: #fff; background: var(--red); border: none; border-radius: 12px; }
.blanks-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 20px 0 28px 0; }

/* Manager */
.manage-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }

/* Records */
.history-item { background: #fff; border-radius: 14px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); overflow: hidden; }
.history-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; cursor: pointer; }
.history-details { padding: 0 16px 16px 16px; display: none; border-top: 1px solid #f0f0f0; }
.history-details.show { display: block; }
.detail-tag { display: inline-block; background: #e8f5e9; color: #2e7d32; padding: 5px 10px; border-radius: 8px; font-size: 14px; margin: 6px 4px 0 0; font-weight: 700; }
.word-wall { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.wall-item { background: #f0f4ff; border: 1.5px solid #c7d8ff; padding: 7px 12px; border-radius: 10px; font-size: 14px; font-weight: 700; color: var(--primary); }
.score-header { background: linear-gradient(135deg, #4f7ef8, #7c3aed); border-radius: var(--radius); padding: 28px 22px; color: #fff; margin-bottom: 14px; }
.big-score { font-size: 72px; font-family: 'Fredoka One', cursive; margin: 6px 0; line-height: 1; }
.icons-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 12px; font-size: 22px; }

/* Practice mode selector */
.practice-mode-btn {
  background: #fff; border: 2px solid #e5eaf5; border-radius: 16px;
  padding: 20px; cursor: pointer; transition: all 0.15s;
  text-align: left; width: 100%; margin-bottom: 12px; font-family: 'Nunito', sans-serif;
}
.practice-mode-btn:active { transform: scale(0.98); }
.practice-mode-btn.easy { border-color: #fde68a; background: #fffdf0; }
.practice-mode-btn.normal { border-color: #b3caff; background: #f5f7ff; }
.pmb-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
.pmb-desc { font-size: 13px; color: var(--text-2); font-weight: 600; }

textarea { width: 100%; border: 2px solid #e0e0e0; border-radius: 12px; padding: 14px; font-size: 16px; background: #fff; font-family: 'Nunito', sans-serif; font-weight: 600; transition: border 0.2s; user-select: auto; }
textarea:focus { border-color: var(--primary); outline: none; }
.feedback-text { text-align: center; height: 30px; margin-bottom: 8px; font-weight: 800; font-size: 17px; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
@keyframes pop-in {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.pop-in { animation: pop-in 0.2s ease; }
</style>
</head>
<body>

<input type="text" id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
  style="position:fixed;top:0;left:-1000px;opacity:0;font-size:16px;height:100px;">
<input type="file" id="fileInput" accept=".json" onchange="importData(this)" style="display:none">

<header>
  <div class="brand">
    <div class="avatar">R</div>
    <div>
      <div class="brand-name">Romeo's Spelling</div>
      <div class="brand-sub">Cloud Edition</div>
    </div>
  </div>
  <div id="headerBtn"></div>
</header>

<div id="app"></div>

<script>
/* ==================== CONFIG ==================== */
const BIN_ID = '695b813c43b1c97be91a29d3';
const API_KEY = '$2a$10$uEeLgIqeB1wImpeUneAhref2IXtkWjDsrQ1rh4tDTOdjMu8zDeYBC';

/* ==================== STATE ==================== */
let db;
let currentSetDate = null;
let practiceList = [], currentIndex = 0, sessionMasteredSet = new Set();
let sessionWrongSet = new Set(); // words that were wrong at least once this session
let isProcessing = false;
let easyHadWrong = false; // track if current easy word had any wrong attempt

// Learn state
let learnList = [], learnIndex = 0, learnChunks = [], learnRevealedCount = 0, learnCovered = false, learnInStepMode = false;
// Easy practice state
let easyAnswerArr = [], easyTileArr = [], easyTileOrder = [];
// Normal practice state
let targetWord = "", currentInput = "";

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function unlockAudio() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const u = new SpeechSynthesisUtterance(''); speechSynthesis.speak(u);
}
document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('click', unlockAudio, { once: true });

/* ==================== DB INIT (v7) ==================== */
// v7 adds: groups store, updates wrongBank schema
const DB_REQ = indexedDB.open('romeo_spelling_v7', 1);
DB_REQ.onupgradeneeded = (e) => {
  db = e.target.result;
  if (!db.objectStoreNames.contains('wordSets'))
    db.createObjectStore('wordSets', { keyPath: 'id' });
  if (!db.objectStoreNames.contains('groups'))
    db.createObjectStore('groups', { keyPath: 'id', autoIncrement: true });
  if (!db.objectStoreNames.contains('wrongBank'))
    db.createObjectStore('wrongBank', { keyPath: 'word' });
  if (!db.objectStoreNames.contains('practiceLogs'))
    db.createObjectStore('practiceLogs', { keyPath: 'id', autoIncrement: true });
};
DB_REQ.onsuccess = (e) => {
  db = e.target.result;
  migrateFromV6().then(() => autoRestoreFromCloud());
};

function showLoadingOverlay(msg) {
  const el = document.createElement('div');
  el.id = 'loadingOverlay';
  el.style.cssText = `
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(160deg, #f0f4f8 0%, #e8eef8 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
  `;
  el.innerHTML = `
    <div style="
      width: 72px; height: 72px; background: var(--yellow);
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 38px; font-family: 'Fredoka One', cursive; color: #333;
      box-shadow: 0 8px 0 var(--yellow-dark);
      animation: loadBounce 0.8s ease-in-out infinite alternate;
    ">R</div>
    <div style="text-align:center">
      <div style="font-family:'Fredoka One',cursive;font-size:22px;color:#1a1a2e;margin-bottom:6px">Romeo's Spelling</div>
      <div style="font-size:14px;color:var(--text-2);font-weight:700" id="loadingMsg">${msg}</div>
    </div>
    <style>
      @keyframes loadBounce {
        from { transform: translateY(0); box-shadow: 0 8px 0 var(--yellow-dark); }
        to   { transform: translateY(-10px); box-shadow: 0 18px 0 var(--yellow-dark); }
      }
    </style>
  `;
  document.body.appendChild(el);
}

function hideLoadingOverlay() {
  const el = document.getElementById('loadingOverlay');
  if (!el) return;
  el.style.transition = 'opacity 0.35s ease';
  el.style.opacity = '0';
  setTimeout(() => el.remove(), 380);
}

async function autoRestoreFromCloud() {
  showLoadingOverlay('正在从云端同步数据…');
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      headers: { 'X-Master-Key': API_KEY }
    });
    if (!res.ok) throw new Error('fetch failed');
    const result = await res.json();
    const content = result.record && result.record.data;
    if (!content) throw new Error('empty');

    const stores = ['wordSets', 'groups', 'wrongBank', 'practiceLogs'];
    const tx = db.transaction(stores, 'readwrite');
    stores.forEach(s => tx.objectStore(s).clear());
    (content.wordSets || []).forEach(s => tx.objectStore('wordSets').put({ id: s.id || s.date, words: s.words }));
    (content.groups || []).forEach(g => tx.objectStore('groups').put(g));
    (content.wrongBank || []).forEach(w => tx.objectStore('wrongBank').put({
      word: w.word,
      lastPractice: w.lastPractice || w.lastWrong || new Date().toISOString(),
      correctCount: w.correctCount || 0,
      wrongCount: w.wrongCount || (w.lastWrong ? 1 : 0)
    }));
    (content.practiceLogs || []).forEach(l => tx.objectStore('practiceLogs').put(l));

    await new Promise((resolve, reject) => {
      tx.oncomplete = resolve;
      tx.onerror = reject;
    });

    document.getElementById('loadingMsg').textContent = '✅ 同步完成';
    await new Promise(r => setTimeout(r, 600));
  } catch (err) {
    document.getElementById('loadingMsg').textContent = '⚠️ 无法连接云端，使用本地数据';
    await new Promise(r => setTimeout(r, 1200));
  }
  hideLoadingOverlay();
  renderHome();
}

function migrateFromV6() {
  return new Promise(resolve => {
    const req = indexedDB.open('romeo_spelling_v6', 2);
    req.onsuccess = (e) => {
      const oldDb = e.target.result;
      if (!oldDb.objectStoreNames.contains('wordSets')) { oldDb.close(); return resolve(); }
      const tx6 = oldDb.transaction(['wordSets', 'wrongBank', 'practiceLogs'], 'readonly');
      Promise.all([
        getAll(tx6.objectStore('wordSets')),
        getAll(tx6.objectStore('wrongBank')),
        getAll(tx6.objectStore('practiceLogs'))
      ]).then(([sets, wrongs, logs]) => {
        oldDb.close();
        // Check if v7 already has data
        const checkTx = db.transaction('wordSets', 'readonly');
        getAll(checkTx.objectStore('wordSets')).then(existing => {
          if (existing.length > 0) return resolve(); // already migrated
          if (!sets.length && !wrongs.length) return resolve();
          const tx7 = db.transaction(['wordSets', 'wrongBank', 'practiceLogs'], 'readwrite');
          sets.forEach(s => tx7.objectStore('wordSets').put({ id: s.id || s.date, words: s.words }));
          // Migrate wrongBank: old format {word, lastWrong} → new format {word, lastPractice, correctCount, wrongCount}
          wrongs.forEach(w => tx7.objectStore('wrongBank').put({
            word: w.word,
            lastPractice: w.lastWrong || w.lastPractice || new Date().toISOString(),
            correctCount: w.correctCount || 0,
            wrongCount: w.wrongCount || 1
          }));
          logs.forEach(l => tx7.objectStore('practiceLogs').put(l));
          tx7.oncomplete = () => resolve();
        });
      });
    };
    req.onerror = () => resolve();
  });
}

function getAll(store) {
  return new Promise(r => { const req = store.getAll(); req.onsuccess = () => r(req.result); req.onerror = () => r([]); });
}

function keepFocus() {
  const hidden = document.getElementById('hiddenInput');
  if (document.querySelector('.blanks-container') && !isProcessing) hidden.focus();
}
document.addEventListener('click', (e) => {
  if (['INPUT', 'TEXTAREA', 'BUTTON'].includes(e.target.tagName)) return;
  keepFocus();
}, true);

/* ==================== CLOUD SYNC ==================== */
async function syncToCloud(isSilent = false) {
  const tx = db.transaction(['wordSets', 'groups', 'wrongBank', 'practiceLogs'], 'readonly');
  const [sets, groups, wrongs, logs] = await Promise.all([
    getAll(tx.objectStore('wordSets')), getAll(tx.objectStore('groups')),
    getAll(tx.objectStore('wrongBank')), getAll(tx.objectStore('practiceLogs'))
  ]);
  const payload = { updatedAt: new Date(), data: { wordSets: sets, groups, wrongBank: wrongs, practiceLogs: logs } };

  let toast = null;
  if (isSilent) {
    toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:30px;right:20px;background:#333;color:#fff;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:700;z-index:999;opacity:0.9';
    toast.textContent = '☁️ 同步中…';
    document.body.appendChild(toast);
  }
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error();
    if (isSilent && toast) {
      toast.textContent = '✅ 已同步'; toast.style.background = '#1a7f45';
      setTimeout(() => toast.remove(), 2000);
    } else alert("✅ 云端同步成功！");
  } catch (err) {
    if (!isSilent) alert("同步失败，请检查网络");
    else if (toast) { toast.textContent = '❌ 同步失败'; toast.style.background = '#c0392b'; setTimeout(() => toast.remove(), 3000); }
  }
}

async function syncFromCloud() {
  if (!confirm("⚠️ 将从云端下载并【覆盖】当前所有数据。确定吗？")) return;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, { headers: { 'X-Master-Key': API_KEY } });
    const result = await res.json();
    const content = result.record.data;
    if (!content) return alert("云端数据为空");
    const stores = ['wordSets', 'groups', 'wrongBank', 'practiceLogs'];
    const tx = db.transaction(stores, 'readwrite');
    stores.forEach(s => tx.objectStore(s).clear());
    (content.wordSets || []).forEach(s => tx.objectStore('wordSets').put({ id: s.id || s.date, words: s.words }));
    (content.groups || []).forEach(g => tx.objectStore('groups').put(g));
    (content.wrongBank || []).forEach(w => tx.objectStore('wrongBank').put({
      word: w.word,
      lastPractice: w.lastPractice || w.lastWrong || new Date().toISOString(),
      correctCount: w.correctCount || 0,
      wrongCount: w.wrongCount || (w.lastWrong ? 1 : 0)
    }));
    (content.practiceLogs || []).forEach(l => tx.objectStore('practiceLogs').put(l));
    tx.oncomplete = () => { alert("✅ 恢复成功！"); renderHome(); };
  } catch (err) { alert("下载失败，请检查网络"); }
}

// Shows all words from wrongBank sorted by (correctCount - wrongCount) asc, then lastPractice asc
function renderTargetSelection(mode) {
  const backFn = `renderSetSelection('${mode}')`;
  document.getElementById('headerBtn').innerHTML = `<button class="btn btn-gray btn-sm" onclick="${backFn}">‹ 返回</button>`;

  // Read both wrongBank and wordSets together
  const tx = db.transaction(['wrongBank', 'wordSets'], 'readonly');
  Promise.all([
    getAll(tx.objectStore('wrongBank')),
    getAll(tx.objectStore('wordSets'))
  ]).then(([bank, sets]) => {
    if (bank.length === 0) {
      document.getElementById('app').innerHTML = `<div class="card" style="text-align:center;padding:40px;color:#999">
        <div style="font-size:48px;margin-bottom:12px">🎉</div>
        <div style="font-weight:700;font-size:17px">还没有练习记录</div>
        <div style="font-size:13px;color:var(--text-2);margin-top:8px;font-weight:600">先去练习几个词组，这里就会出现数据了！</div>
      </div>`;
      return;
    }

    // Build cleanWord → rawWord map AND cleanWord → setId map
    const cleanToRaw = {};
    const cleanToSet = {};
    sets.forEach(s => s.words.forEach(w => {
      const k = w.replace(/\//g, '').toLowerCase();
      cleanToRaw[k] = w;
      cleanToSet[k] = s.id;
    }));

    // Sort: net score asc, then lastPractice asc
    bank.sort((a, b) => {
      const netA = (a.correctCount || 0) - (a.wrongCount || 0);
      const netB = (b.correctCount || 0) - (b.wrongCount || 0);
      if (netA !== netB) return netA - netB;
      return new Date(a.lastPractice || 0) - new Date(b.lastPractice || 0);
    });

    const title = mode === 'learn' ? '🎯 针对复习' : '🎯 针对练习';
    const desc = mode === 'learn' ? '按掌握程度排序，全选或选择要复习的词' : '按掌握程度排序，全选或选择要练习的词';
    const startFn = mode === 'learn' ? `startTargetLearn` : `startTargetPractice`;

    const resolvedWords = bank.map(w => {
      const cleanKey = w.word.replace(/\//g, '').toLowerCase();
      return cleanToRaw[cleanKey] || w.word;
    });
    const wordsJson = JSON.stringify(resolvedWords).replace(/"/g, '&quot;');

    let listHtml = bank.map((w, i) => {
      const clean = w.word.replace(/\//g, '');
      const cleanKey = clean.toLowerCase();
      const net = (w.correctCount || 0) - (w.wrongCount || 0);
      const netClass = net >= 0 ? 'stat-net-pos' : 'stat-net-neg';
      const netSign = net >= 0 ? '+' : '';
      const lp = w.lastPractice ? new Date(w.lastPractice).toLocaleDateString('zh-CN', {month:'numeric',day:'numeric'}) : '—';
      const setId = cleanToSet[cleanKey] || '';
      return `<label style="display:grid;grid-template-columns:20px 1fr 80px 36px 36px 36px 34px;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid #f5f5f5;cursor:pointer">
        <input type="checkbox" id="tchk-${i}" checked style="width:20px;height:20px;accent-color:var(--primary);cursor:pointer">
        <span style="font-family:'Literata',Georgia,serif;font-size:19px;color:#1a1a2e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${clean}</span>
        <span style="font-size:11px;color:#bbb;font-weight:600;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:2px">${setId}</span>
        <span class="stat-badge stat-correct" style="justify-content:center">✓${w.correctCount||0}</span>
        <span class="stat-badge stat-wrong" style="justify-content:center">✗${w.wrongCount||0}</span>
        <span class="stat-badge ${netClass}" style="justify-content:center">${netSign}${net}</span>
        <span style="font-size:11px;color:#bbb;font-weight:600;text-align:right;white-space:nowrap">${lp}</span>
      </label>`;
    }).join('');

    document.getElementById('app').innerHTML = `
      <h3 style="margin:0 0 4px 0">${title}</h3>
      <div style="font-size:13px;color:var(--text-2);font-weight:600;margin-bottom:14px">${desc}</div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn btn-gray btn-sm" onclick="toggleAllTarget(true)">全选</button>
        <button class="btn btn-gray btn-sm" onclick="toggleAllTarget(false)">全不选</button>
        <span style="margin-left:auto;font-size:12px;color:var(--text-2);font-weight:600;align-self:center">${bank.length} 个词</span>
      </div>
      <div class="card" style="padding:4px 0;margin-bottom:14px">${listHtml}</div>
      <button class="btn btn-primary" onclick="${startFn}(${wordsJson})">开始 ›</button>
    `;
  });
}

/* ==================== LEARN MODULE ==================== */
function parseChunks(rawWord) {
  const clean = rawWord.replace(/\//g, '');
  if (rawWord.includes('/')) return rawWord.split('/').filter(c => c.length > 0);
  const chunks = clean.match(/[^aeiouy]*[aeiouy]+(?:[^aeiouy]*$|[^aeiouy](?=[^aeiouy]))?/gi);
  if (!chunks || chunks.length <= 1) return [clean];
  const last = chunks[chunks.length - 1];
  if (last === 'e' || last === 'es') chunks[chunks.length - 2] += chunks.pop();
  return chunks;
}

function startLearn(id) {
  const tx = db.transaction('wordSets', 'readonly');
  tx.objectStore('wordSets').get(id).onsuccess = (e) => {
    const data = e.target.result; if (!data) return;
    currentSetDate = id; learnList = data.words; learnIndex = 0;
    renderLearnUI();
  };
}

function exitLearn() { if (confirm('退出学习？')) renderHome(); }
function exitPracticeSession() { if (confirm('退出练习？')) renderHome(); }

function renderLearnUI() {
  document.getElementById('headerBtn').innerHTML = `<button class="btn btn-gray btn-sm" onclick="exitLearn()">🏃 退出</button>`;
  document.getElementById('app').innerHTML = `<div id="learnContainer"></div>`;
  loadLearnWord();
}

function loadLearnWord() {
  if (learnIndex >= learnList.length) {
    document.getElementById('headerBtn').innerHTML = '';
    document.getElementById('app').innerHTML = `<div class="card" style="text-align:center;padding:50px 20px;margin-top:40px">
      <div style="font-size:70px;margin-bottom:12px">🎓</div>

      <p style="color:var(--text-2);font-size:16px;font-weight:600">所有单词都学过啦，可以去练习了！</p>
      <div style="height:20px"></div>
      <button class="btn btn-primary" onclick="renderHome()">🏠 返回首页</button>
      <button class="btn btn-yellow" onclick="renderSetSelection('practice')">✏️ 开始练习</button>
    </div>`;
    return;
  }
  const rawWord = learnList[learnIndex];
  const cleanWord = rawWord.replace(/\//g, '');
  learnChunks = parseChunks(rawWord);
  learnRevealedCount = learnChunks.length;
  learnCovered = false; learnInStepMode = false;

  document.getElementById('learnContainer').innerHTML = `
    <div class="learn-progress">单词 ${learnIndex + 1} / ${learnList.length}</div>
    <div class="learn-word-card">
      <div class="phonics-display" id="learnPhonics"></div>
    </div>
    <div style="text-align:center;margin-bottom:16px">
      <button class="btn btn-outline" style="display:inline-flex;width:auto;padding:12px 28px;border-radius:30px;font-size:16px"
        ontouchstart="event.preventDefault();speak('${cleanWord}')" onclick="speak('${cleanWord}')">
        🔊 <span style="font-weight:800">听发音</span>
      </button>
    </div>
    <div id="learnStepHint" class="learn-step-hint">👂 先听发音，记住整个单词</div>
    <div class="learn-controls" id="learnControls"></div>
  `;
  renderLearnPhonics(learnChunks.length);
  renderLearnInitControls();
  setTimeout(() => speak(cleanWord), 350);
}

function renderLearnInitControls() {
  learnInStepMode = false;
  document.getElementById('learnControls').innerHTML = `
    <div class="btn-row" style="margin-top:4px">
      <button class="btn btn-yellow" style="flex:1;margin-bottom:0" id="toggleBtn" onclick="learnToggle()">🙈 隐藏</button>
      <button class="btn btn-green" style="flex:1;margin-bottom:0" onclick="learnStartStep()">👁 逐步展示</button>
    </div>
    <div class="btn-row" style="margin-top:10px">
      ${learnIndex > 0 ? `<button class="btn btn-outline" style="flex:1;margin-bottom:0" onclick="learnIndex--;loadLearnWord()">‹ 上一词</button>` : '<div style="flex:1"></div>'}
      <button class="btn btn-primary" style="flex:2;margin-bottom:0" onclick="learnIndex++;loadLearnWord()">下一词 ›</button>
    </div>
  `;
}

function learnToggle() {
  learnCovered = !learnCovered;
  if (learnCovered) {
    renderLearnPhonics(0);
    document.getElementById('learnStepHint').textContent = '词已隐藏，凭记忆说出来';
    const btn = document.getElementById('toggleBtn');
    btn.textContent = '👁 展示'; btn.className = 'btn btn-outline'; btn.style.cssText = 'flex:1;margin-bottom:0';
  } else {
    learnInStepMode = false;
    renderLearnPhonics(learnChunks.length);
    document.getElementById('learnStepHint').textContent = '👂 先听发音，记住整个单词';
    const btn = document.getElementById('toggleBtn');
    btn.textContent = '🙈 隐藏'; btn.className = 'btn btn-yellow'; btn.style.cssText = 'flex:1;margin-bottom:0';
  }
}

function learnStartStep() {
  learnInStepMode = true; learnCovered = true; learnRevealedCount = 0;
  renderLearnPhonics(0);
  document.getElementById('learnStepHint').textContent = '点击"+1展示"逐步揭示每个部分';
  renderLearnStepControls();
}

function renderLearnStepControls() {
  const allDone = learnRevealedCount >= learnChunks.length;
  const leftBtn = (allDone && !learnCovered)
    ? `<button class="btn btn-yellow" style="flex:1;margin-bottom:0" onclick="learnStepHide()">🙈 隐藏</button>`
    : `<button class="btn btn-outline" style="flex:1;margin-bottom:0" onclick="learnStepShowAll()">👁 展示</button>`;
  const rightBtn = !allDone
    ? `<button class="btn btn-green" style="flex:1;margin-bottom:0" onclick="learnRevealNext()">+1 展示 (${learnRevealedCount}/${learnChunks.length})</button>`
    : `<span style="flex:1;text-align:center;font-size:13px;font-weight:700;color:var(--green);padding:10px 0">✅ 展示完毕</span>`;
  document.getElementById('learnControls').innerHTML = `
    <div class="btn-row" style="margin-top:4px">${leftBtn}${rightBtn}</div>
    <div class="btn-row" style="margin-top:10px">
      ${learnIndex > 0 ? `<button class="btn btn-outline" style="flex:1;margin-bottom:0" onclick="learnIndex--;loadLearnWord()">‹ 上一词</button>` : '<div style="flex:1"></div>'}
      <button class="btn btn-primary" style="flex:2;margin-bottom:0" onclick="learnIndex++;loadLearnWord()">下一词 ›</button>
    </div>
  `;
}

function learnStepShowAll() {
  learnInStepMode = false; learnCovered = false; learnRevealedCount = learnChunks.length;
  renderLearnPhonics(learnChunks.length);
  document.getElementById('learnStepHint').textContent = '👂 先听发音，记住整个单词';
  renderLearnInitControls();
}

function learnStepHide() {
  learnCovered = true; learnRevealedCount = 0;
  renderLearnPhonics(0);
  document.getElementById('learnStepHint').textContent = '点击"+1展示"逐步揭示每个部分';
  renderLearnStepControls();
}

function renderLearnPhonics(visibleCount) {
  const container = document.getElementById('learnPhonics');
  if (!container) return;
  container.innerHTML = '';
  learnChunks.forEach((chunk, i) => {
    const span = document.createElement('span');
    span.className = `phonics-chunk color-${i % 2}`;
    span.textContent = chunk;
    if (i >= visibleCount) span.classList.add('hidden-chunk');
    container.appendChild(span);
  });
}

function learnRevealNext() {
  if (learnRevealedCount < learnChunks.length) {
    learnRevealedCount++;
    renderLearnPhonics(learnRevealedCount);
  }
  if (learnRevealedCount >= learnChunks.length) {
    learnCovered = false;
    document.getElementById('learnStepHint').textContent = '✅ 全部展示，可以隐藏再试试';
  }
  renderLearnStepControls();
}

function startPractice(setId, mode) {

    const data = e.target.result; if (!data) return;

    renderPracticeUI(mode);

}

  document.getElementById('app').innerHTML = `
    <div style="text-align:center;margin-bottom:14px;color:var(--text-2);font-weight:700;font-size:13px" id="practiceProgress">
      ${modeLabel} • <span style="color:var(--primary)">${currentIndex + 1} / ${practiceList.length}</span>
    </div>
    <div class="card" id="practiceCard" style="min-height:320px"></div>
  `;
  loadPracticeWord(mode);
}

function loadPracticeWord(mode) {
  if (currentIndex >= practiceList.length) { finishPractice(); return; }
  isProcessing = false;
  easyHadWrong = false;
  const rawWord = practiceList[currentIndex];
  const cleanWord = rawWord.replace(/\//g, '');
  const prog = document.getElementById('practiceProgress');
  const modeLabel = mode === 'easy' ? '🎮 简单模式' : '✍️ 普通模式';
  if (prog) prog.innerHTML = `${modeLabel} • <span style="color:var(--primary)">${currentIndex + 1} / ${practiceList.length}</span>`;
  if (mode === 'easy') loadEasyWord(cleanWord, rawWord);
  else loadNormalWord(cleanWord, rawWord, mode);
}

/* ---------- EASY MODE ---------- */
function loadEasyWord(cleanWord) {
  easyAnswerArr = new Array(cleanWord.length).fill('');
  easyTileOrder = shuffleArr([...Array(cleanWord.length).keys()]);
  document.getElementById('practiceCard').innerHTML = `
    <div style="text-align:center;margin-bottom:16px">
      <button class="btn btn-outline" style="display:inline-flex;width:auto;padding:10px 22px;border-radius:30px"
        ontouchstart="event.preventDefault();speak('${cleanWord}')" onclick="speak('${cleanWord}')">
        🔊 <span style="font-weight:800">听发音</span>
      </button>
    </div>
    <div class="slots-container" id="answerSlots"></div>
    <div class="feedback-text" id="feedback"></div>
    <div style="font-size:12px;color:var(--text-2);font-weight:700;text-align:center;margin-bottom:12px">点击字母磁贴，按顺序拼出单词</div>
    <div class="tiles-container" id="letterTiles"></div>
    <button class="btn btn-gray" style="margin-top:12px;font-size:14px" ontouchstart="event.preventDefault();skipEasy()" onclick="skipEasy()">跳过 ›</button>
  `;
  // Render slots
  const slotsEl = document.getElementById('answerSlots');
  for (let i = 0; i < cleanWord.length; i++) {
    const slot = document.createElement('div');
    slot.className = 'answer-slot'; slot.id = `slot-${i}`;
    slotsEl.appendChild(slot);
  }
  // Render tiles
  const tilesEl = document.getElementById('letterTiles');
  easyTileOrder.forEach(origIdx => {
    const tile = document.createElement('button');
    tile.className = 'letter-tile pop-in';
    tile.textContent = cleanWord[origIdx].toLowerCase();
    tile.dataset.origIdx = origIdx; tile.id = `tile-${origIdx}`;
    tile.onclick = () => handleTileClick(origIdx, cleanWord);
    tile.ontouchstart = (e) => { e.preventDefault(); handleTileClick(origIdx, cleanWord); };
    tilesEl.appendChild(tile);
  });
  setTimeout(() => speak(cleanWord), 350);
}

function handleTileClick(origIdx, cleanWord) {
  if (isProcessing) return;
  const tile = document.getElementById(`tile-${origIdx}`);
  if (!tile || tile.classList.contains('used')) return;
  const nextEmpty = easyAnswerArr.findIndex(c => c === '');
  if (nextEmpty === -1) return;
  const expectedChar = cleanWord[nextEmpty];
  const clickedChar = cleanWord[origIdx];
  if (clickedChar.toLowerCase() === expectedChar.toLowerCase()) {
    easyAnswerArr[nextEmpty] = clickedChar;
    tile.classList.add('used');
    const slot = document.getElementById(`slot-${nextEmpty}`);
    slot.textContent = clickedChar.toLowerCase(); slot.classList.add('filled', 'pop-in');
    if (easyAnswerArr.every(c => c !== '')) {
      isProcessing = true;
      document.querySelectorAll('.answer-slot').forEach(s => { s.classList.remove('filled'); s.classList.add('correct'); });
      document.getElementById('feedback').innerHTML = `<span style="color:var(--green)">太棒了！🎉</span>`;
      playSuccessTone();
      const wordKey = practiceList[currentIndex].replace(/\//g, '').toLowerCase();
      if (!easyHadWrong) {
        sessionMasteredSet.add(wordKey);
        recordWordResult(practiceList[currentIndex], true);
      } else {
        recordWordResult(practiceList[currentIndex], false);
      }
      setTimeout(() => { currentIndex++; loadPracticeWord('easy'); }, 900);
    }
  } else {
    // Wrong tap
    easyHadWrong = true;
    const wordKey = practiceList[currentIndex].replace(/\//g, '').toLowerCase();
    if (!sessionWrongSet.has(wordKey)) {
      sessionWrongSet.add(wordKey);
      recordEasyWrong(practiceList[currentIndex]); // record wrong once per word
    }
    tile.classList.add('wrong-tile');
    const slot = document.getElementById(`slot-${nextEmpty}`);
    slot.classList.add('wrong');
    document.getElementById('feedback').innerHTML = `<span style="color:var(--red)">不对，再想想！</span>`;
    setTimeout(() => {
      tile.classList.remove('wrong-tile');
      slot.classList.remove('wrong');
      document.getElementById('feedback').innerHTML = '';
    }, 600);
  }
}

function skipEasy() { currentIndex++; loadPracticeWord('easy'); }

/* ---------- NORMAL MODE ---------- */
function loadNormalWord(cleanWord, rawWord, mode) {
  document.getElementById('practiceCard').innerHTML = `
    <div style="text-align:center;margin-bottom:18px">
      <button class="btn btn-outline" style="display:inline-flex;width:auto;padding:10px 22px;border-radius:30px"
        ontouchstart="event.preventDefault();speak('${cleanWord}')" onclick="speak('${cleanWord}')">
        🔊 <span style="font-weight:800">听发音</span>
      </button>
    </div>
    <div class="blanks-container" id="blanksArea"></div>
    <div class="feedback-text" id="feedback"></div>
    <button class="btn btn-primary" id="confirmBtn"
      ontouchstart="event.preventDefault();checkNormal('${mode}')" onclick="checkNormal('${mode}')">✨ 确认 (Enter)</button>
    <button class="btn btn-gray" style="margin-top:0;font-size:14px"
      ontouchstart="event.preventDefault();skipNormal('${mode}')" onclick="skipNormal('${mode}')">跳过 ›</button>
  `;
  setupNormalInput(cleanWord, mode);
  setTimeout(() => speak(cleanWord), 350);
}

function setupNormalInput(word, mode) {
  targetWord = word; currentInput = "";
  const blanks = document.getElementById('blanksArea');
  blanks.innerHTML = '';
  for (let i = 0; i < word.length; i++) {
    const b = document.createElement('div'); b.className = 'blank-char'; blanks.appendChild(b);
  }
  const hidden = document.getElementById('hiddenInput');
  hidden.value = ''; hidden.focus();
  hidden.oninput = (e) => {
    if (isProcessing) return;
    currentInput = e.target.value.replace(/[^a-zA-Z]/g, '').slice(0, targetWord.length);
    updateNormalBlanks();
  };
  hidden.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); checkNormal(mode); } };
  updateNormalBlanks();
}

function updateNormalBlanks() {
  const chars = document.querySelectorAll('.blank-char');
  for (let i = 0; i < targetWord.length; i++) {
    const ch = chars[i]; const inp = currentInput[i] || '';
    ch.textContent = inp; ch.classList.remove('active', 'filled');
    if (i === currentInput.length) ch.classList.add('active');
    if (inp) ch.classList.add('filled');
  }
}

function checkNormal(mode) {
  if (isProcessing || !currentInput.trim()) return;
  const cleanInput = currentInput.trim().toLowerCase();
  const cleanTarget = targetWord.trim().toLowerCase();
  const fb = document.getElementById('feedback');
  if (cleanInput === cleanTarget) {
    isProcessing = true;
    fb.innerHTML = `<span style="color:var(--green)">太棒了！🎉</span>`;
    document.querySelectorAll('.blank-char').forEach(c => c.classList.add('correct'));
    playSuccessTone();
    const wordKey = cleanTarget;
    const rawWord = practiceList[currentIndex];
    const hadWrong = sessionWrongSet.has(wordKey);
    if (!hadWrong) {
      sessionMasteredSet.add(wordKey);
      recordWordResult(rawWord, true);
    } else {
      recordWordResult(rawWord, false);
    }
    setTimeout(() => { currentIndex++; loadPracticeWord(mode); }, 800);
  } else {
    fb.innerHTML = `<span style="color:var(--red)">正确: ${targetWord}</span>`;
    document.querySelectorAll('.blank-char').forEach(c => c.classList.add('wrong'));
    const wordKey = targetWord.toLowerCase();
    if (!sessionWrongSet.has(wordKey)) {
      sessionWrongSet.add(wordKey);
      recordWordResult(practiceList[currentIndex], false, true); // mark wrong
    }
    const btn = document.getElementById('confirmBtn');
    btn.innerText = "记住了 ↺ 重试"; btn.className = "btn btn-yellow";
    btn.ontouchstart = (e) => { e.preventDefault(); resetNormal(btn, mode); };
    btn.onclick = () => resetNormal(btn, mode);
    keepFocus();
  }
}

function resetNormal(btn, mode) {
  currentInput = ""; document.getElementById('hiddenInput').value = "";
  updateNormalBlanks();
  document.querySelectorAll('.blank-char').forEach(c => c.classList.remove('wrong'));
  document.getElementById('feedback').innerHTML = "";
  btn.innerText = "✨ 确认 (Enter)"; btn.className = "btn btn-primary";
  btn.ontouchstart = (e) => { e.preventDefault(); checkNormal(mode); };
  btn.onclick = () => checkNormal(mode);
  keepFocus();
}

function skipNormal(mode) { currentIndex++; loadPracticeWord(mode); }

/* ==================== WRONG BANK RECORD KEEPING ==================== */
// wrongBank key is always cleanWord (lowercase, no slashes)
// isWrongOnly: only increment wrongCount (normal mode first wrong answer)
// isCorrect: no wrong this session, add correctCount
function recordWordResult(rawWord, isCorrect, isWrongOnly) {
  const cleanKey = rawWord.replace(/\//g, '').toLowerCase();
  const now = new Date().toISOString();
  const tx = db.transaction('wrongBank', 'readwrite');
  const store = tx.objectStore('wrongBank');
  const req = store.get(cleanKey);
  req.onsuccess = (e) => {
    const existing = e.target.result || { word: cleanKey, lastPractice: now, correctCount: 0, wrongCount: 0 };
    existing.lastPractice = now;
    if (isWrongOnly) {
      existing.wrongCount = (existing.wrongCount || 0) + 1;
    } else if (isCorrect) {
      existing.correctCount = (existing.correctCount || 0) + 1;
    } else {
      existing.wrongCount = (existing.wrongCount || 0) + 1;
    }
    store.put(existing);
  };
}

// For easy mode: record wrong once per word per session
function recordEasyWrong(rawWord) {
  const cleanKey = rawWord.replace(/\//g, '').toLowerCase();
  const now = new Date().toISOString();
  const tx = db.transaction('wrongBank', 'readwrite');
  const store = tx.objectStore('wrongBank');
  const req = store.get(cleanKey);
  req.onsuccess = (e) => {
    const existing = e.target.result || { word: cleanKey, lastPractice: now, correctCount: 0, wrongCount: 0 };
    existing.lastPractice = now;
    existing.wrongCount = (existing.wrongCount || 0) + 1;
    store.put(existing);
  };
}

function finishPractice() {
  // Record all session wrongs (easy mode - wrongs recorded per-tap, but we need to finalize)
  const masteredCount = sessionMasteredSet.size;
  if (masteredCount > 0) {
    const tx = db.transaction('practiceLogs', 'readwrite');
    tx.objectStore('practiceLogs').add({
      date: new Date().toISOString().slice(0, 10),
      timestamp: Date.now(),
      count: masteredCount,
      words: Array.from(sessionMasteredSet),
      source: currentSetDate
    });
  }
  document.getElementById('headerBtn').innerHTML = '';
  document.getElementById('app').innerHTML = `<div class="card" style="text-align:center;padding:50px 20px;margin-top:40px">
    <div style="font-size:70px;margin-bottom:12px">🎉</div>
    <h2 style="font-family:'Fredoka One',cursive;font-size:30px;margin-bottom:8px">练习完成！</h2>
    <p style="color:var(--text-2);font-size:17px;font-weight:700">本次掌握: <b style="color:#f59e0b">${masteredCount} ⭐</b></p>
    <div style="height:20px"></div>
    <button class="btn btn-primary" onclick="renderHome()">🏠 返回首页</button>
    <button class="btn btn-yellow" onclick="renderRecords()">🏆 查看成就</button>
  </div>`;
  syncToCloud(true);
}

/* ==================== WORD MANAGER ==================== */
function renderWordManager(activeTab) {
  document.getElementById('headerBtn').innerHTML = `<button class="btn btn-gray btn-sm" onclick="renderHome()">🏠 首页</button>`;
  activeTab = activeTab || 'sets';
  const tx = db.transaction(['wordSets', 'groups'], 'readonly');
  Promise.all([getAll(tx.objectStore('wordSets')), getAll(tx.objectStore('groups'))]).then(([sets, groups]) => {
    sets.sort((a, b) => a.id.localeCompare(b.id));
    groups.sort((a, b) => a.name.localeCompare(b.name));

    const tabsHtml = `
      <div class="tab-bar" style="margin-bottom:18px">
        <button class="tab-btn ${activeTab === 'sets' ? 'active' : ''}" onclick="renderWordManager('sets')">📝 词组管理</button>
        <button class="tab-btn ${activeTab === 'groups' ? 'active' : ''}" onclick="renderWordManager('groups')">🗂 分组管理</button>

}

function editSet(id) {
  // Need to also load groups to find which group this set belongs to
  const tx = db.transaction(['wordSets', 'groups'], 'readonly');
  Promise.all([
    new Promise(r => { const req = tx.objectStore('wordSets').get(id); req.onsuccess = () => r(req.result); }),
    getAll(tx.objectStore('groups'))
  ]).then(([data, groups]) => {
    if (!data) return;
    document.getElementById('mgrTitle').innerText = "编辑：" + id;
    const idInput = document.getElementById('newSetId');
    idInput.value = data.id; idInput.disabled = true; idInput.style.background = '#f8faff';
    document.getElementById('newWords').value = data.words.join('\n');
    document.getElementById('delBtn').style.display = 'block';
    document.getElementById('cancelBtn').style.display = 'block';
    // Set group dropdown
    const grpSelect = document.getElementById('setGroupSelect');
    if (grpSelect) {
      const ownerGroup = groups.find(g => (g.setIds || []).includes(id));
      grpSelect.value = ownerGroup ? ownerGroup.id : '';
    }
    document.getElementById('app').scrollTop = 0;
  });
}

function saveSet() {
  const id = document.getElementById('newSetId').value.trim();
  const text = document.getElementById('newWords').value;
  const groupId = document.getElementById('setGroupSelect').value;
  if (!id) return alert("请填写词组名称");
  if (!text.trim()) return alert("请输入单词");
  const words = text.split(/\n+/).map(w => w.trim()).filter(w => w);

  // First read all groups, then do one write transaction
  const readTx = db.transaction(['wordSets', 'groups'], 'readonly');
  getAll(readTx.objectStore('groups')).then(groups => {
    const writeTx = db.transaction(['wordSets', 'groups'], 'readwrite');
    writeTx.objectStore('wordSets').put({ id, words });
    const grpStore = writeTx.objectStore('groups');
    groups.forEach(g => {
      const newSetIds = (g.setIds || []).filter(sid => sid !== id);
      if (groupId && String(g.id) === String(groupId)) newSetIds.push(id);
      grpStore.put({ ...g, setIds: newSetIds });
    });
    writeTx.oncomplete = () => { renderWordManager('sets'); syncToCloud(true); };
  });
}

function deleteSet() {
  const id = document.getElementById('newSetId').value.trim();
  if (!confirm(`确认删除「${id}」？`)) return;
  const readTx = db.transaction('groups', 'readonly');
  getAll(readTx.objectStore('groups')).then(groups => {
    const writeTx = db.transaction(['wordSets', 'groups'], 'readwrite');
    writeTx.objectStore('wordSets').delete(id);
    const grpStore = writeTx.objectStore('groups');
    groups.forEach(g => {
      const newSetIds = (g.setIds || []).filter(sid => sid !== id);
      grpStore.put({ ...g, setIds: newSetIds });
    });
    writeTx.oncomplete = () => { renderWordManager('sets'); syncToCloud(true); };
  });
}

function editGroup(gid) {
  const tx = db.transaction('groups', 'readonly');
  tx.objectStore('groups').get(gid).onsuccess = (e) => {
    const g = e.target.result; if (!g) return;
    document.getElementById('grpTitle').innerText = "编辑分组：" + g.name;
    document.getElementById('newGroupName').value = g.name;
    document.getElementById('editingGroupId').value = gid;
    document.getElementById('delGrpBtn').style.display = 'block';
    document.getElementById('cancelGrpBtn').style.display = 'block';
    // Check boxes
    document.querySelectorAll('[id^="gset-"]').forEach(cb => {
      cb.checked = (g.setIds || []).includes(cb.dataset.setid);
    });
    document.getElementById('app').scrollTop = 0;
  };
}

function saveGroup() {
  const name = document.getElementById('newGroupName').value.trim();
  const editingId = document.getElementById('editingGroupId').value;
  if (!name) return alert("请填写分组名称");
  const setIds = [];
  document.querySelectorAll('[id^="gset-"]').forEach(cb => { if (cb.checked) setIds.push(cb.dataset.setid); });

  const tx = db.transaction('groups', 'readwrite');
  const rec = editingId ? { id: parseInt(editingId), name, setIds } : { name, setIds };
  tx.objectStore('groups').put(rec);
  tx.oncomplete = () => { renderWordManager('groups'); syncToCloud(true); };
}

function deleteGroup() {
  const editingId = document.getElementById('editingGroupId').value;
  if (!editingId || !confirm("确认删除此分组？（词组不会被删除）")) return;
  const tx = db.transaction('groups', 'readwrite');
  tx.objectStore('groups').delete(parseInt(editingId));
  tx.oncomplete = () => { renderWordManager('groups'); syncToCloud(true); };
}

/* ==================== RECORDS ==================== */
function renderRecords() {
  document.getElementById('headerBtn').innerHTML = `<button class="btn btn-gray btn-sm" onclick="renderHome()">🏠 首页</button>`;
  const tx = db.transaction('practiceLogs', 'readonly');
  getAll(tx.objectStore('practiceLogs')).then(logs => {
    logs.sort((a, b) => b.timestamp - a.timestamp);
    let totalStars = 0; let allWords = new Set();
    logs.forEach(l => { totalStars += l.count; (l.words || []).forEach(w => allWords.add(w.toLowerCase())); });
    const rockets = Math.floor(totalStars / 10);
    const currentStars = totalStars % 10;
    let rockHtml = ''; for (let i = 0; i < rockets; i++) rockHtml += '🚀 ';
    let starHtml = ''; for (let i = 0; i < 10; i++) starHtml += i < currentStars ? '⭐ ' : '<span style="opacity:0.2">⭐</span> ';

    let histHtml = !logs.length ? '<div style="text-align:center;padding:24px;color:#999;font-weight:600">暂无记录</div>' : '';
    logs.forEach((log, idx) => {
      const wordsHtml = (log.words || []).map(w => `<span class="detail-tag">${w}</span>`).join('');
      histHtml += `<div class="history-item">
        <div class="history-header" onclick="toggleHistory(${idx})">
          <div><div style="font-weight:800">${log.date}</div><div style="font-size:13px;color:var(--text-2);font-weight:600">掌握 ${log.count} 个单词 <span style="font-size:10px">▼</span></div></div>
          <div style="font-weight:800;color:#f59e0b;font-size:18px">⭐ +${log.count}</div>
        </div>
        <div class="history-details" id="hist-detail-${idx}">${wordsHtml || '<span style="font-size:12px;color:#ccc">无详细记录</span>'}</div>
      </div>`;
    });
    const wallHtml = Array.from(allWords).sort().map(w => `<div class="wall-item">${w}</div>`).join('');

    document.getElementById('app').innerHTML = `
      <div class="score-header">
        <div style="font-size:13px;font-weight:700;opacity:0.8;letter-spacing:1px">TOTAL SCORE</div>
        <div class="big-score">${totalStars}</div>
        <div style="background:rgba(255,255,255,0.12);border-radius:14px;padding:14px;margin-top:12px">
          <div style="font-size:12px;margin-bottom:6px;opacity:0.7">火箭收藏 (${rockets})</div>
          <div class="icons-grid" style="font-size:18px">${rockHtml || '<span style="font-size:14px;opacity:0.6">加油攒火箭！</span>'}</div>
        </div>
        <div style="background:rgba(255,255,255,0.12);border-radius:14px;padding:14px;margin-top:10px">
          <div style="font-size:12px;margin-bottom:6px;opacity:0.7">进度 (${currentStars}/10)</div>
          <div class="icons-grid">${starHtml}</div>
        </div>
      </div>
      <div class="card"><h3 style="margin:0 0 10px 0">单词墙 (${allWords.size})</h3><div class="word-wall">${wallHtml || '<span style="color:#999;font-size:13px;font-weight:600">还没有掌握单词哦</span>'}</div></div>
      <h3 style="margin-left:6px">练习足迹</h3>${histHtml}
    `;
  });
}

function toggleHistory(idx) {
  const el = document.getElementById(`hist-detail-${idx}`);
  if (el) el.classList.toggle('show');
}

/* ==================== UTILS ==================== */
function esc(str) { return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

function shuffleArr(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function speak(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85;
  const all = speechSynthesis.getVoices();
  const pref = all.find(v => v.name === 'Daniel') || all.find(v => v.name === 'Samantha') || all.find(v => v.lang.includes('en'));
  if (pref) u.voice = pref;
  speechSynthesis.speak(u);
}
speechSynthesis.onvoiceschanged = () => {};

function playSuccessTone() {
  try {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(523, audioCtx.currentTime);
    osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.12);
    osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.24);
    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.55);
    osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.55);
  } catch (e) {}
}

function exportAllData() {
  const tx = db.transaction(['wordSets', 'groups', 'wrongBank', 'practiceLogs'], 'readonly');
  Promise.all([
    getAll(tx.objectStore('wordSets')), getAll(tx.objectStore('groups')),
    getAll(tx.objectStore('wrongBank')), getAll(tx.objectStore('practiceLogs'))
  ]).then(([sets, groups, wrongs, logs]) => {
    const data = { wordSets: sets, groups, wrongBank: wrongs, practiceLogs: logs, exportDate: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `romeo_backup_${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  });
}

function importData(inputEl) {
  const file = inputEl.files[0]; if (!file) return;
  if (!confirm("⚠️ 覆盖现有数据？")) { inputEl.value = ''; return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.wordSets) throw new Error();
      const tx = db.transaction(['wordSets', 'groups', 'wrongBank', 'practiceLogs'], 'readwrite');
      ['wordSets', 'groups', 'wrongBank', 'practiceLogs'].forEach(s => tx.objectStore(s).clear());
      (data.wordSets || []).forEach(s => tx.objectStore('wordSets').put(s));
      (data.groups || []).forEach(g => tx.objectStore('groups').put(g));
      (data.wrongBank || []).forEach(w => tx.objectStore('wrongBank').put({
        word: w.word,
        lastPractice: w.lastPractice || w.lastWrong || new Date().toISOString(),
        correctCount: w.correctCount || 0,
        wrongCount: w.wrongCount || (w.lastWrong ? 1 : 0)
      }));
      (data.practiceLogs || []).forEach(l => tx.objectStore('practiceLogs').put(l));
      tx.oncomplete = () => { alert("导入成功！"); renderHome(); inputEl.value = ''; syncToCloud(true); };
    } catch (err) { alert("文件格式错误"); inputEl.value = ''; }
  };
  reader.readAsText(file);
}
</script>
