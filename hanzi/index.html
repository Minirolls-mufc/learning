<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>汉字学习助手</title>
    <!-- 使用知乎提供的镜像源，国内访问更稳定 -->
    <script src="https://unpkg.zhimg.com/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            --bg-color: #FFFDF5;
            --btn-blue: #4A90E2;
            --btn-green: #52C41A;
        }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .header {
            width: 100%; padding: 15px; background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex; justify-content: center; gap: 10px; z-index: 100;
        }
        input { padding: 10px; font-size: 18px; border: 2px solid #ddd; border-radius: 8px; width: 120px; }
        button { padding: 10px 20px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; color: white; }
        #main-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        #hanzi-box { background: white; border: 4px solid #F0E68C; border-radius: 20px; min-width: 300px; min-height: 300px; position: relative; }
        #loading-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #666; font-size: 20px; text-align: center; }
        .footer { padding: 30px; display: flex; gap: 15px; }
        .btn-draw { background-color: var(--btn-green); width: 140px; height: 60px; font-weight: bold; }
        .btn-next { background-color: var(--btn-blue); }
        .info { margin-top: 10px; color: #666; font-size: 16px; height: 24px; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="input-words" value="人妈地" placeholder="输入汉字">
        <button style="background: var(--btn-blue)" onclick="start()">开始</button>
    </div>

    <div id="main-display">
        <div id="hanzi-box">
            <div id="loading-msg">等待输入...</div>
        </div>
        <div class="info" id="status-info"></div>
    </div>

    <div class="footer">
        <button class="btn-draw" onclick="drawStroke()">写一笔</button>
        <button class="btn-next" onclick="nextWord()">下一个</button>
    </div>

    <script>
        let words = [];
        let wordIdx = 0;
        let strokeIdx = 0; 
        let writer;
        let totalStrokes = 0;

        const colors = ['#E74C3C', '#3498DB', '#27AE60', '#F1C40F', '#9B59B6', '#E67E22'];

        // 核心修正：指定国内可用的数据下载源
        function charDataLoader(char, onComplete) {
            fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${char}.json`)
                .then(res => res.json())
                .then(onComplete)
                .catch(err => {
                    document.getElementById('loading-msg').innerHTML = "数据加载失败<br>请检查网络或刷新";
                    console.error(err);
                });
        }

        function initWriter(char) {
            if (!char) return;
            
            // 重置状态
            document.getElementById('hanzi-box').innerHTML = '<div id="loading-msg">加载中...</div>';
            document.getElementById('status-info').innerText = "";
            strokeIdx = 0;

            const size = Math.min(window.innerWidth * 0.8, 350);
            
            writer = HanziWriter.create('hanzi-box', char, {
                width: size,
                height: size,
                padding: 25,
                showOutline: true,
                strokeAnimationSpeed: 2,
                // 使用国内稳定的数据源
                charDataLoader: charDataLoader
            });

            // 监听数据加载成功
            writer.getCharData().then(data => {
                totalStrokes = data.strokes.length;
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('status-info').innerText = `这个字共 ${totalStrokes} 笔`;
            });
        }

        function drawStroke() {
            if (!writer || strokeIdx >= totalStrokes) return;

            let currentColor;
            if (totalStrokes <= 4) {
                currentColor = colors[strokeIdx % colors.length];
            } else {
                const colorGroup = Math.floor(strokeIdx / 3);
                currentColor = colors[colorGroup % colors.length];
            }

            writer.animateStroke(strokeIdx, { strokeColor: currentColor });
            strokeIdx++;
            document.getElementById('status-info').innerText = `正在写第 ${strokeIdx} / ${totalStrokes} 笔`;
        }

        function start() {
            const val = document.getElementById('input-words').value;
            words = val.split('').filter(s => s.trim());
            wordIdx = 0;
            if (words.length > 0) initWriter(words[wordIdx]);
        }

        function nextWord() {
            if (words.length === 0) return;
            wordIdx = (wordIdx + 1) % words.length;
            initWriter(words[wordIdx]);
        }

        // 自动初始化
        window.onload = start;
    </script>
</body>
</html>
