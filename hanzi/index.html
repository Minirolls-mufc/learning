<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romeo 汉字课堂</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.24.2/dist/index.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#3d1c02;--ink2:#7c3a0e;--muted:#b07040;--border:#fdd9b5;
  --bg:#fff8f0;--paper:#ffffff;
  --o1:#ff6b00;--o2:#ff8c38;--o3:#ffb366;--o4:#ffd199;
  --red:#ef4444;--blue:#3b82f6;--green:#22c55e;--gold:#f59e0b;
  --grad-hero:linear-gradient(135deg,#ff6b00 0%,#ff9a3c 100%);
  --grad-btn:linear-gradient(135deg,#ff6b00,#ff9a3c);
  --grad-gold:linear-gradient(135deg,#f59e0b,#fcd34d);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column}
.page{display:none;flex-direction:column;height:100%;overflow:hidden;animation:fadeUp .22s ease both}
.page.active{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pop{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
/* ═══════════════════════════════════
   TOPBAR — unified across ALL pages
═══════════════════════════════════ */
.topbar{
  flex-shrink:0;height:52px;display:flex;align-items:center;
  padding:0 12px;gap:10px;
  background:var(--paper);border-bottom:2px solid var(--border);
  box-shadow:0 2px 10px rgba(255,107,0,.07);z-index:10;
}
/* Left: brand wordmark */
.tb-brand{
  display:flex;align-items:baseline;gap:5px;flex-shrink:0;
  font-family:'ZCOOL XiaoWei',cursive;
}
.tb-brand-romeo{
  font-size:.95rem;font-weight:600;letter-spacing:.5px;
  background:var(--grad-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.tb-brand-sub{
  font-size:.72rem;color:var(--muted);letter-spacing:1px;font-weight:600;
}
/* Center: page title */
.tb-title{
  flex:1;text-align:center;
  font-family:'ZCOOL XiaoWei',cursive;font-size:.95rem;font-weight:600;letter-spacing:2px;
  background:var(--grad-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
/* Right: actions */
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
/* Back / home button — pill style */
.tb-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:4px;
  height:30px;padding:0 11px;border-radius:99px;
  border:1.5px solid var(--border);background:var(--paper);
  font-family:inherit;font-size:.72rem;font-weight:700;color:var(--ink2);
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.tb-btn:hover{background:#fff5ec;border-color:var(--o2);color:var(--o1)}
/* Small icon-only button */
.tb-icon{
  width:30px;height:30px;border-radius:99px;border:1.5px solid var(--border);
  background:var(--paper);display:inline-flex;align-items:center;justify-content:center;
  font-size:.85rem;cursor:pointer;transition:all .15s;color:var(--ink2);
}
.tb-icon:hover{background:#fff5ec;border-color:var(--o2);color:var(--o1)}
/* ═══════════════════════════════════
   BUTTONS
═══════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  gap:5px;padding:9px 18px;
  border-radius:12px;border:1.5px solid transparent;
  font-family:inherit;font-size:.84rem;font-weight:700;
  cursor:pointer;transition:all .15s;
  white-space:nowrap;line-height:1;text-align:center;
}
.btn:active{transform:scale(.95)}
.btn-primary{
  background:var(--grad-btn);color:#fff;
  box-shadow:0 3px 10px rgba(255,107,0,.28);
}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 5px 16px rgba(255,107,0,.38)}
.btn-ghost{
  background:var(--paper);color:var(--ink2);
  border-color:var(--border);
}
.btn-ghost:hover{background:#fff5ec;border-color:var(--o2);color:var(--o1)}
.btn-danger{background:#fff1f2;color:#ef4444;border-color:#fecaca}
.btn-danger:hover{background:#fee2e2}
.btn-gold{background:var(--grad-gold);color:#fff;box-shadow:0 3px 10px rgba(245,158,11,.3)}
.btn-sm{padding:6px 13px;font-size:.76rem;border-radius:9px}
.btn-icon{padding:0;width:34px;height:34px;border-radius:10px}
.btn.toggled{
  background:var(--grad-btn)!important;color:#fff!important;
  border-color:transparent!important;box-shadow:0 3px 10px rgba(255,107,0,.4)!important;
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--o2),var(--o3));border-radius:4px}
/* ═══════════════════════════════════
   HOME
═══════════════════════════════════ */
#page-home{background:var(--bg)}
/* Home topbar — brand only, no back button */
.home-topbar{
  flex-shrink:0;height:56px;display:flex;align-items:center;
  padding:0 16px;background:var(--paper);
  border-bottom:2px solid var(--border);
  box-shadow:0 2px 10px rgba(255,107,0,.07);
}
.home-brand{display:flex;align-items:center;gap:11px}
.home-brand-icon{
  width:36px;height:36px;border-radius:10px;
  background:var(--grad-btn);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:1.1rem;color:#fff;
  box-shadow:0 3px 10px rgba(255,107,0,.35);
  font-family:'ZCOOL XiaoWei',cursive;
}
.home-brand-title{
  font-family:'ZCOOL XiaoWei',cursive;font-size:1.05rem;font-weight:700;
  letter-spacing:1px;color:var(--ink);
}
.home-brand-sub{font-size:.63rem;color:var(--muted);letter-spacing:.5px;margin-top:1px}
.home-body{flex:1;overflow-y:auto;padding:16px 14px 24px}
.sec-label{
  font-size:.62rem;letter-spacing:3px;color:var(--muted);
  margin-bottom:9px;font-weight:700;text-transform:uppercase;
}
/* Home cloud sync section */
.home-sync-section{
  background:var(--paper);border:1.5px solid var(--border);border-radius:14px;
  padding:14px 14px 10px;margin-top:4px;
  box-shadow:0 2px 7px rgba(255,107,0,.04);
}
/* 2×2 nav grid — color-coded cards */
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.nav-card{
  background:var(--paper);border:2px solid var(--border);border-radius:18px;
  padding:22px 14px 18px;cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:7px;min-height:112px;
  box-shadow:0 3px 10px rgba(0,0,0,.05);position:relative;overflow:hidden;
}
.nav-card.card-learn{border-color:#b3caff;background:linear-gradient(145deg,#f0f4ff 0%,var(--paper) 65%)}
.nav-card.card-practice{border-color:#fde68a;background:linear-gradient(145deg,#fffbea 0%,var(--paper) 65%)}
.nav-card.card-achieve{border-color:#a7f3c8;background:linear-gradient(145deg,#f0fdf6 0%,var(--paper) 65%)}
.nav-card.card-manage{border-color:#d8b4fe;background:linear-gradient(145deg,#f5f0ff 0%,var(--paper) 65%)}
.nav-card:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,0,0,.1)}
.nav-card:active{transform:scale(.97)}
.nav-icon{font-size:1.9rem;line-height:1}
.nav-name{font-weight:900;font-size:.9rem;color:var(--ink)}
.nav-desc{font-size:.65rem;color:var(--muted);line-height:1.4}
.nav-badge{
  position:absolute;top:8px;right:8px;
  background:var(--o4);color:var(--ink);
  font-size:.52rem;font-weight:900;padding:2px 6px;border-radius:99px;
}
/* ═══════════════════════════════════
   GROUP FILTER TABS — shared across manage / gpick / practice
═══════════════════════════════════ */
.grp-tabs-wrap{
  flex-shrink:0;
  background:var(--paper);border-bottom:2px solid var(--border);
  padding:0 12px;
  display:flex;align-items:center;gap:0;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.grp-tabs-wrap::-webkit-scrollbar{height:3px}
.grp-tab{
  flex-shrink:0;
  padding:10px 14px;font-size:.76rem;font-weight:700;
  color:var(--muted);border-bottom:2.5px solid transparent;
  cursor:pointer;transition:all .15s;white-space:nowrap;
  background:none;border-top:none;border-left:none;border-right:none;
  font-family:inherit;
}
.grp-tab:hover{color:var(--ink2)}
.grp-tab.active{color:var(--o1);border-bottom-color:var(--o1);}
/* ═══════════════════════════════════
   GROUP PICKER
═══════════════════════════════════ */
.gpick-body{flex:1;overflow
