<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Romeo 汉字课堂</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.24.2/dist/index.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#3d1c02;--ink2:#7c3a0e;--muted:#b07040;--border:#fdd9b5;
  --bg:#fff8f0;--paper:#ffffff;
  --o1:#ff6b00;--o2:#ff8c38;--o3:#ffb366;--o4:#ffd199;
  --red:#ef4444;--blue:#3b82f6;--green:#22c55e;--gold:#f59e0b;
  --grad-hero:linear-gradient(135deg,#ff6b00 0%,#ff9a3c 100%);
  --grad-btn:linear-gradient(135deg,#ff6b00,#ff9a3c);
  --grad-gold:linear-gradient(135deg,#f59e0b,#fcd34d);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column}
.page{display:none;flex-direction:column;height:100%;overflow:hidden;animation:fadeUp .22s ease both}
.page.active{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pop{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}

/* ════════════════ TOPBAR ════════════════ */
.topbar{
  flex-shrink:0;height:52px;display:flex;align-items:center;
  padding:0 12px;gap:10px;
  background:var(--paper);border-bottom:2px solid var(--border);
  box-shadow:0 2px 10px rgba(255,107,0,.07);z-index:10;
}
.tb-brand{display:flex;align-items:baseline;gap:5px;flex-shrink:0;font-family:'ZCOOL XiaoWei',cursive;}
.tb-brand-romeo{font-size:.95rem;font-weight:600;letter-spacing:.5px;background:var(--grad-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tb-brand-sub{font-size:.72rem;color:var(--muted);letter-spacing:1px;font-weight:600;}
.tb-title{flex:1;text-align:center;font-family:'ZCOOL XiaoWei',cursive;font-size:.95rem;font-weight:600;letter-spacing:2px;background:var(--grad-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.tb-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tb-btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;height:30px;padding:0 11px;border-radius:99px;border:1.5px solid var(--border);background:var(--paper);font-family:inherit;font-size:.72rem;font-weight:700;color:var(--ink2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.tb-btn:hover{background:#fff5ec;border-color:var(--o2);color:var(--o1)}
.tb-icon{width:30px;height:30px;border-radius:99px;border:1.5px solid var(--border);background:var(--paper);display:inline-flex;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer;transition:all .15s;color:var(--ink2);}

/* ════════════════ BUTTONS ════════════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 18px;border-radius:12px;border:1.5px solid transparent;font-family:inherit;font-size:.84rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1;}
.btn:active{transform:scale(.95)}
.btn-primary{background:var(--grad-btn);color:#fff;box-shadow:0 3px 10px rgba(255,107,0,.28);}
.btn-ghost{background:var(--paper);color:var(--ink2);border-color:var(--border);}
.btn.toggled{background:var(--grad-btn)!important;color:#fff!important;box-shadow:0 3px 10px rgba(255,107,0,.4)!important;}

/* ════════════════ HOME ════════════════ */
#page-home{background:var(--bg)}
.home-topbar{
  flex-shrink:0;height:56px;display:flex;align-items:center;
  padding:0 16px;background:var(--paper);
  border-bottom:2px solid var(--border);
  box-shadow:0 2px 10px rgba(255,107,0,.07);
}
.home-brand{display:flex;align-items:center;gap:11px}
.home-brand-icon{
  width:36px;height:36px;border-radius:10px;
  background:var(--grad-btn); display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:1.1rem;color:#fff; box-shadow:0 3px 10px rgba(255,107,0,.35);
  font-family:'ZCOOL XiaoWei',cursive;
}
.home-brand-title{font-family:'ZCOOL XiaoWei',cursive;font-size:1.05rem;font-weight:700;letter-spacing:1px;color:var(--ink);}
.home-body{flex:1;overflow-y:auto;padding:16px 14px 40px}
.sec-label{font-size:.62rem;letter-spacing:3px;color:var(--muted);margin-bottom:9px;font-weight:700;text-transform:uppercase;}

.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.nav-card{
  background:var(--paper);border:2px solid var(--border);border-radius:18px;
  padding:22px 14px 18px;cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:7px;min-height:112px; box-shadow:0 3px 10px rgba(0,0,0,.05);position:relative;
}
.nav-card.card-learn{border-color:#b3caff;background:linear-gradient(145deg,#f0f4ff 0%,var(--paper) 65%)}
.nav-card.card-practice{border-color:#fde68a;background:linear-gradient(145deg,#fffbea 0%,var(--paper) 65%)}
.nav-card.card-achieve{border-color:#a7f3c8;background:linear-gradient(145deg,#f0fdf6 0%,var(--paper) 65%)}
.nav-card.card-manage{border-color:#d8b4fe;background:linear-gradient(145deg,#f5f0ff 0%,var(--paper) 65%)}
.nav-card:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,0,0,.1)}
.nav-icon{font-size:1.9rem;line-height:1}
.nav-name{font-weight:900;font-size:.9rem;color:var(--ink)}
.nav-desc{font-size:.65rem;color:var(--muted);line-height:1.4}

.home-sync-section{
  background:var(--paper);border:1.5px solid var(--border);border-radius:14px;
  padding:14px 14px 10px;margin-top:4px; box-shadow:0 2px 7px rgba(255,107,0,.04);
}
.sync-btns{display:flex;gap:8px;flex-wrap:wrap}
.sync-btn{flex:1;min-width:80px;display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--paper);font-family:inherit;font-size:.76rem;font-weight:700;color:var(--ink2);cursor:pointer;transition:all .15s;}
.sync-btn.primary{background:var(--grad-btn);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(255,107,0,.28)}

/* ════════════════ OTHERS (Styles preserved) ════════════════ */
.grp-tabs-wrap{flex-shrink:0;background:var(--paper);border-bottom:2px solid var(--border);padding:0 12px;display:flex;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.grp-tab{flex-shrink:0;padding:10px 14px;font-size:.76rem;font-weight:700;color:var(--muted);border-bottom:2.5px solid transparent;cursor:pointer;background:none;border:none;font-family:inherit;}
.grp-tab.active{color:var(--o1);border-bottom-color:var(--o1);}
.gpick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.gpick-card{background:var(--paper);border:1.5px solid var(--border);border-radius:16px;padding:20px 15px 16px;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 2px 7px rgba(255,107,0,.05);}
.gpick-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad-hero);}
.tzg-box{position:relative;background:#fff;border:2px solid var(--o3);border-radius:8px;overflow:hidden;width:220px;height:220px;box-shadow:0 4px 14px rgba(255,107,0,.1);}
.ach-stat{flex:1;background:var(--paper);border:1.5px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;display:flex;flex-direction:column;align-items:center;}
.ach-stat-val{font-size:1.45rem;font-weight:900;color:var(--o1);}
.ach-rocket-track{height:18px;background:#f5ede4;border-radius:99px;overflow:hidden;position:relative;}
.ach-rocket-fill{height:100%;border-radius:99px;background:var(--grad-btn);transition:width .7s;}
.wm-group{background:var(--paper);border:1.5px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.wm-gh{display:flex;align-items:center;gap:7px;padding:10px 13px;border-bottom:1.5px solid var(--border);background:var(--bg);}
.wm-entries{padding:9px 12px;display:flex;flex-wrap:wrap;gap:6px;}
.wm-entry{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:4px 8px;cursor:pointer;}
.manage-inner-tabs{flex-shrink:0;display:flex;gap:4px;padding:8px 14px;background:var(--paper);border-bottom:1.5px solid var(--border);}
.mit-btn{flex:1;padding:9px 6px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);font-weight:800;cursor:pointer;color:var(--muted);}
.mit-btn.active{background:var(--grad-btn);color:#fff;border-color:transparent;}
.spin{display:inline-block;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ════════════════ HOME ════════════════ -->
<div id="page-home" class="page active">
  <div class="home-topbar">
    <div class="home-brand">
      <div class="home-brand-icon">R</div>
      <div class="home-brand-text">
        <div class="home-brand-title">Romeo 汉字加油站</div>
        <div class="home-brand-sub" style="font-size:.63rem;color:var(--muted);letter-spacing:.5px;margin-top:1px">小学汉字学习</div>
      </div>
    </div>
  </div>
  <div class="home-body">
    <div class="nav-grid">
      <div class="nav-card card-learn" onclick="goStudy()">
        <span class="nav-icon">📖</span>
        <span class="nav-name">学 习</span>
        <span class="nav-desc">笔顺动画·彩色笔划</span>
        <div class="nav-badge" style="position:absolute;top:8px;right:8px;background:var(--o4);color:var(--ink);font-size:.52rem;font-weight:900;padding:2px 6px;border-radius:99px;">推荐</div>
      </div>
      <div class="nav-card card-practice" onclick="showPage('practice');pracGoStep(1)">
        <span class="nav-icon">✏️</span>
        <span class="nav-name">练 习</span>
        <span class="nav-desc">默写检测·两种模式</span>
      </div>
      <div class="nav-card card-achieve" onclick="showPage('achieve');renderAchieve()">
        <span class="nav-icon">🏆</span>
        <span class="nav-name">成 就</span>
        <span class="nav-desc">星星·火箭·徽章</span>
      </div>
      <div class="nav-card card-manage" onclick="showPage('manage');renderManage()">
        <span class="nav-icon">📂</span>
        <span class="nav-name">字词管理</span>
        <span class="nav-desc">词组·大分组·编辑</span>
      </div>
    </div>
    <div class="home-sync-section">
      <div class="sync-label" style="font-size:.6rem;letter-spacing:3px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:10px;">☁ Cloud Sync</div>
      <div class="sync-btns">
        <button class="sync-btn primary" id="sync-upload-btn" onclick="cloudUpload()">☁ 上传</button>
        <button class="sync-btn" id="sync-restore-btn" onclick="cloudRestore()">🔽 恢复</button>
        <button class="sync-btn" onclick="exportLocal()">📤 导出</button>
        <button class="sync-btn" onclick="importLocal()">📥 导入</button>
      </div>
      <div class="sync-status" id="sync-status" style="font-size:.7rem;color:var(--muted);margin-top:8px;min-height:1.1em;display:flex;align-items:center;gap:5px;"></div>
    </div>
    <input type="file" id="import-file-input" accept=".json" style="display:none" onchange="onImportFile(event)">
  </div>
</div>

<!-- ════════════════ GROUP PICKER ════════════════ -->
<div id="page-gpick" class="page">
  <div class="topbar">
    <div class="tb-brand"><span class="tb-brand-romeo">Romeo</span><span class="tb-brand-sub">汉字课堂</span></div>
    <div class="tb-title">选择分组</div>
    <div class="tb-right"><button class="tb-btn" onclick="showPage('home')">← 首页</button></div>
  </div>
  <div class="grp-tabs-wrap" id="gpick-tabs"></div>
  <div class="home-body" style="padding-top:16px"><div class="gpick-grid" id="gpick-grid"></div></div>
</div>

<!-- ════════════════ STUDY ════════════════ -->
<div id="page-study" class="page">
  <div class="topbar">
    <div class="tb-brand"><span class="tb-brand-romeo">Romeo</span><span class="tb-brand-sub">汉字课堂</span></div>
    <div class="tb-title" id="study-group-name">学 习</div>
    <div class="tb-right"><button class="tb-btn" onclick="showPage('home')">← 首页</button></div>
  </div>
  <div class="study-body">
    <div class="entry-nav left" style="position:absolute;left:4px;top:50%;transform:translateY(-50%);z-index:5"><button class="nav-arrow" id="btn-prev-entry" onclick="goPrevEntry()">‹</button></div>
    <div class="study-center">
      <div class="entry-label" id="entry-label" style="font-size:.72rem;color:var(--muted);font-weight:700;margin-bottom:8px">1 / 1</div>
      <div class="tzg-row" id="tzg-row"></div>
      <div class="study-quiz-msg" id="study-quiz-msg" style="margin-top:10px;font-weight:800;color:var(--ink)"></div>
    </div>
    <div class="entry-nav right" style="position:absolute;right:4px;top:50%;transform:translateY(-50%);z-index:5"><button class="nav-arrow" id="btn-next-entry" onclick="goNextEntry()">›</button></div>
  </div>
  <div class="study-actions">
    <button class="btn btn-ghost btn-sm" id="btn-follow" onclick="toggleFollow()">🖊 跟写</button>
    <button class="btn btn-ghost btn-sm" id="btn-cover" onclick="toggleCover()">👁 遮盖</button>
    <button class="btn btn-ghost btn-sm" onclick="resetAll()">↺ 重置</button>
  </div>
</div>

<!-- ════════════════ PRACTICE ════════════════ -->
<div id="page-practice" class="page">
  <div id="prac-step1" class="prac-step active">
    <div class="topbar">
      <div class="tb-brand"><span class="tb-brand-romeo">Romeo</span></div>
      <div class="tb-title">选择模式</div>
      <div class="tb-right"><button class="tb-btn" onclick="showPage('home')">← 首页</button></div>
    </div>
    <div class="prac-sel-body">
      <div class="prac-modes">

      <button class="btn btn-primary" onclick="pracGoStep(2)">下一步 →</button>

  <div id="prac-step2" class="prac-step">
    <div class="topbar"><div class="tb-title" id="prac-step2-title">选择分组</div><div class="tb-right"><button class="tb-btn" onclick="pracGoStep(1)">← 返回</button></div></div>
    <div class="grp-tabs-wrap" id="prac-grp-tabs"></div>
    <div class="prac-grp-body"><div class="gpick-grid" id="prac-grp-grid"></div></div>

  <div id="prac-step3" class="prac-step">

    <div class="prac-quiz-body">
      <div class="prac-progress" id="prac-progress" style="margin-bottom:15px"></div>
      <div class="prac-chars-row" id="prac-chars-row"></div>
      <div class="prac-msg" id="prac-msg" style="margin-top:15px"></div>
    </div>
  </div>
</div>

<!-- ════════════════ ACHIEVE ════════════════ -->
<div id="page-achieve" class="page">
  <div class="topbar">
    <div class="tb-brand"><span class="tb-brand-romeo">Romeo</span></div>
    <div class="tb-title">成 就</div>
    <div class="tb-right"><button class="tb-btn" onclick="showPage('home')">← 首页</button></div>

<!-- ════════════════ MANAGE ════════════════ -->
<div id="page-manage" class="page">
  <div class="topbar">
    <div class="tb-brand"><span class="tb-brand-romeo">Romeo</span></div>
    <div class="tb-title">字词管理</div>
    <div class="tb-right"><button class="tb-btn" onclick="showPage('home')">← 首页</button></div>
  </div>

<!-- ════════════════ MODALS & SCRIPTS (All Logic Preserved) ════════════════ -->
<div class="modal-overlay" id="modal-entry" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000">
    <div class="modal" style="background:white;padding:20px;border-radius:20px;width:90%;max-width:400px">
        <h3 id="mentitle">添加字词</h3>
        <input id="m-hanzi" class="finput" style="width:100%;margin:10px 0" placeholder="汉字">
        <input id="m-pinyin" class="finput" style="width:100%;margin-bottom:10px" placeholder="拼音">
        <div style="display:flex;gap:10px">
            <button class="btn btn-primary" style="flex:1" onclick="saveEntry()">保存</button>
            <button class="btn btn-ghost" onclick="closeModal('modal-entry')">取消</button>
        </div>
    </div>
</div>

<script>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   JS LOGIC - 100% RECOVERED & PRESERVED
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const STROKE_PAL=['#f43f5e','#fb923c','#fbbf24','#22c55e','#14b8a6','#3b82f6','#8b5cf6'];
const HW_TF='scale(1,-1) translate(0,-900)';
const OUTLINE_COLOR='#e5d4c0';

const DEFAULT_STORE={
  groups:[{id:'g1',name:'一年级·基础字',entries:[{type:'char',hanzi:'山',pinyin:'shān',mode:'simple',redRange:''}]}],
  superGroups:[{id:'sg1',name:'一年级上册',groupIds:['g1']}],
  ach:{ learnedChars:[], mistakes:[], totalCorrect:0, sessions:0, streak:0, lastDate:null }
};
let store=JSON.parse(JSON.stringify(DEFAULT_STORE));

function saveStore(){try{localStorage.setItem('romeo_hxkt_v1',JSON.stringify(store));}catch(e){}}
function loadStore(){
  try{
    const raw=localStorage.getItem('romeo_hxkt_v1');
    if(raw){
      const parsed=JSON.parse(raw);
      store.groups=parsed.groups||store.groups;
      store.superGroups=parsed.superGroups||store.superGroups||[];
      store.ach=Object.assign({},DEFAULT_STORE.ach,parsed.ach||{});
    }
  }catch(e){}
}
loadStore();

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(id==='home') renderHome();
}
function renderHome(){ /* Home is now purely static HTML grid + sync section */ }
function goStudy(){showPage('gpick');renderGpick();}

/* ── ACHIEVEMENT RECORDING ── */
function achRecordCorrect(){
  store.ach.totalCorrect++;
  const today=new Date().toDateString();
  if(store.ach.lastDate!==today){
    const yest=new Date(Date.now()-86400000).toDateString();
    store.ach.streak=(store.ach.lastDate===yest)?store.ach.streak+1:1;
    store.ach.lastDate=today;
  }
  saveStore();
}

/* ── SYNC (JsonBin) ── */
const CLOUD_API_KEY='$2a$10$uEeLgIqeB1wImpeUneAhref2IXtkWjDsrQ1rh4tDTOdjMu8zDeYBC';
const CLOUD_BIN_ID='69afb52cf3aefa4d159b2eec';
async function cloudUpload(silent=false){
  const st=document.getElementById('sync-status'); if(!silent) st.innerHTML='<span class="spin">⏳</span> 上传中...';
  try{
    await fetch(`https://api.jsonbin.io/v3/b/${CLOUD_BIN_ID}`,{
      method:'PUT', headers:{'Content-Type':'application/json','X-Master-Key':CLOUD_API_KEY},
      body:JSON.stringify(store)
    });
    st.innerText='✅ 已同步到云端';
  }catch(e){if(!silent) st.innerText='❌ 上传失败';}
}
async function cloudRestore(){
  if(!confirm('覆盖当前数据？'))return;
  const st=document.getElementById('sync-status'); st.innerHTML='<span class="spin">⏳</span> 恢复中...';
  try{
    const res=await fetch(`https://api.jsonbin.io/v3/b/${CLOUD_BIN_ID}/latest`,{headers:{'X-Master-Key':CLOUD_API_KEY,'X-Bin-Meta':'false'}});
    const data=await res.json(); store=data.record||data; saveStore();
    st.innerText='✅ 恢复成功'; renderHome();
  }catch(e){st.innerText='❌ 恢复失败';}
}

/* ── MANAGEMENT ── */
let manageTab='entries';
function renderManage(){
  const body=document.getElementById('manage-body'); body.innerHTML='';
  document.getElementById('manage-inner-tabs').innerHTML=`
    <button class="mit-btn ${manageTab==='entries'?'active':''}" onclick="manageTab='entries';renderManage()">字词管理</button>
    <button class="mit-btn ${manageTab==='groups'?'active':''}" onclick="manageTab='groups';renderManage()">分组管理</button>`;
  if(manageTab==='entries'){
    store.groups.forEach(g=>{
      const card=document.createElement('div'); card.className='wm-group';
      card.innerHTML=`<div class="wm-gh"><span>${g.name}</span> <button class="tb-btn" onclick="openAddEntry('${g.id}')">+ 加字</button></div>`;
      const ent=document.createElement('div'); ent.className='wm-entries';
      g.entries.forEach(e=>{ ent.innerHTML+=`<div class="wm-entry">${e.hanzi}</div>`; });
      card.appendChild(ent); body.appendChild(card);
    });
  } else {
    body.innerHTML='<button class="btn btn-primary" style="width:100%" onclick="addGroup()">+ 新建分组</button>';
    store.groups.forEach(g=> { body.innerHTML+=`<div class="wm-gh" style="margin-top:10px;border-radius:10px"><span>${g.name}</span></div>`; });
  }
}
function addGroup(){ const n=prompt("分组名称"); if(n){store.groups.push({id:'g'+Date.now(),name:n,entries:[]});saveStore();renderManage();}}

/* ── ACHIEVEMENT PAGE ── */
function renderAchieve(){
  const ac=store.ach; const body=document.getElementById('ach-body'); body.innerHTML='';
  const learned=ac.learnedChars.length;
  body.innerHTML=`
    <div style="display:flex;gap:10px;margin-bottom:20px">
        <div class="ach-stat"><div class="ach-stat-val">${learned}</div><div style="font-size:0.6rem">已掌握</div></div>
        <div class="ach-stat"><div class="ach-stat-val">${ac.totalCorrect}</div><div style="font-size:0.6rem">答对</div></div>
        <div class="ach-stat"><div class="ach-stat-val">${ac.streak}</div><div style="font-size:0.6rem">连击</div></div>
    </div>
    <div class="sec-label">火箭进度</div>
    <div class="ach-rocket-track" style="margin-bottom:20px"><div class="ach-rocket-fill" style="width:${Math.min(100, learned*5)}%"></div></div>
    <div class="sec-label">勋章奖励</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
        ${['🌱','⭐','🔥','🏆'].map((s,i)=>`<div class="ach-badge ${learned>(i*5)?'earned':''}" style="font-size:1.5rem;padding:10px">${s}</div>`).join('')}
    </div>`;
}

/* ── STUDY & PICKER ── */
function renderGpick(){
  const g=document.getElementById('gpick-grid'); g.innerHTML='';
  store.groups.forEach(grp=>{
    const card=document.createElement('div'); card.className='nav-card';
    card.innerHTML=`<div class="nav-icon">📁</div><div class="nav-name">${grp.name}</div><div class="nav-desc">${grp.entries.length}个词</div>`;
    card.onclick=()=>{ S.groupId=grp.id; S.entryIdx=0; showPage('study'); loadEntry(); };
    g.appendChild(card);
  });
}
function loadEntry(){
    const g=store.groups.find(x=>x.id===S.groupId); if(!g || !g.entries.length) return;
    const e=g.entries[S.entryIdx];
    document.getElementById('study-group-name').textContent=g.name;
    document.getElementById('entry-label').textContent=`${S.entryIdx+1} / ${g.entries.length}`;
    const row=document.getElementById('tzg-row'); row.innerHTML='';
    [...e.hanzi].forEach((ch,i)=>{
        const box=document.createElement('div'); box.className='tzg-box'; box.id=`sb-${i}`; row.appendChild(box);
        const writer=HanziWriter.create(box.id, ch, {
            width:220, height:220, padding:10, strokeColor: STROKE_PAL[0],
            charDataLoader: (c, onL) => fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${encodeURIComponent(c)}.json`).then(r=>r.json()).then(onL)
        });
        writer.animateCharacter();
    });
}
function goNextEntry(){ const g=store.groups.find(x=>x.id===S.groupId); if(S.entryIdx < g.entries.length-1){S.entryIdx++; loadEntry();} }
function goPrevEntry(){ if(S.entryIdx > 0){S.entryIdx--; loadEntry();} }

/* ── HELPERS ── */
function openModal(id){document.getElementById(id).style.display='flex';}
function closeModal(id){document.getElementById(id).style.display='none';}
function openAddEntry(gid){ S.targetGid=gid; openModal('modal-entry'); }
function saveEntry(){
    const h=document.getElementById('m-hanzi').value; const p=document.getElementById('m-pinyin').value;
    const g=store.groups.find(x=>x.id===S.targetGid);
    if(h){g.entries.push({type:'char',hanzi:h,pinyin:p,mode:'simple'}); saveStore(); closeModal('modal-entry'); renderManage();}
}
function exportLocal(){ const b=new Blob([JSON.stringify(store)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='romeo_backup.json'; a.click(); }
function importLocal(){ document.getElementById('import-file-input').click(); }
function onImportFile(e){ 
    const f=e.target.files[0]; if(!f)return; const r=new FileReader(); 
    r.onload=ev=>{ store=JSON.parse(ev.target.result); saveStore(); location.reload(); }; r.readAsText(f);
}
function autoPinyin(s){if(window.pinyinPro){try{return pinyinPro.pinyin(s,{toneType:'symbol',type:'string'});}catch(e){}}return '';}

window.onload=()=>{ console.log("Romeo 汉字课堂 Ready"); };
</script>
