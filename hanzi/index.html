<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>汉字写字助手</title>
    <!-- 更换为国内最稳定的 BootCDN 源 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/hanzi-writer/3.5.0/hanzi-writer.min.js"></script>
    <style>
        :root {
            --bg-color: #FFFDF5;
            --btn-blue: #4A90E2;
            --btn-green: #52C41A;
        }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .header {
            width: 100%; padding: 15px; background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex; justify-content: center; gap: 10px; z-index: 100;
        }
        input { padding: 12px; font-size: 18px; border: 2px solid #ddd; border-radius: 8px; width: 140px; }
        button { padding: 10px 20px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        
        #main-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        
        #hanzi-box { 
            background: white; 
            border: 4px solid #F0E68C; 
            border-radius: 20px; 
            width: 320px; 
            height: 320px; 
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #loading-msg { color: #999; font-size: 18px; }
        
        .footer { padding-bottom: 60px; display: flex; gap: 20px; }
        .btn-draw { background-color: var(--btn-green); width: 150px; height: 70px; font-size: 22px; box-shadow: 0 4px #388E3C; }
        .btn-draw:active { transform: translateY(4px); box-shadow: none; }
        .btn-next { background-color: var(--btn-blue); height: 70px; }
        
        .info { margin-top: 15px; color: #666; font-size: 18px; font-weight: bold; height: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="input-words" value="人妈地" placeholder="输入汉字">
        <button style="background: var(--btn-blue)" onclick="start()">开始学习</button>
    </div>

    <div id="main-display">
        <div id="hanzi-box">
            <div id="loading-msg">等待输入...</div>
        </div>
        <div class="info" id="status-info"></div>
    </div>

    <div class="footer">
        <button class="btn-draw" onclick="drawStroke()">写一笔</button>
        <button class="btn-next" onclick="nextWord()">下一个字</button>
    </div>

    <script>
        let words = [];
        let wordIdx = 0;
        let strokeIdx = 0; 
        let writer;
        let totalStrokes = 0;

        const colors = ['#E74C3C', '#3498DB', '#27AE60', '#E67E22', '#8E44AD', '#333333'];

        function initWriter(char) {
            if (!char) return;
            
            // 确保 HanziWriter 已经加载
            if (typeof HanziWriter === 'undefined') {
                document.getElementById('status-info').innerText = "核心库加载失败，请刷新页面";
                return;
            }

            const box = document.getElementById('hanzi-box');
            box.innerHTML = '<div id="loading-msg">加载中...</div>';
            document.getElementById('status-info').innerText = "正在获取笔划...";
            strokeIdx = 0;

            writer = HanziWriter.create('hanzi-box', char, {
                width: 300,
                height: 300,
                padding: 20,
                showOutline: true,
                strokeAnimationSpeed: 2,
                // 使用公共数据源
                charDataLoader: function(char, onComplete) {
                    fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${char}.json`)
                        .then(res => res.json())
                        .then(onComplete)
                        .catch(err => {
                            document.getElementById('loading-msg').innerText = "加载失败";
                        });
                }
            });

            writer.getCharData().then(data => {
                totalStrokes = data.strokes.length;
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('status-info').innerText = `这个字共 ${totalStrokes} 笔`;
            });
        }

        function drawStroke() {
            if (!writer || strokeIdx >= totalStrokes) return;

            let currentColor;
            if (totalStrokes <= 4) {
                currentColor = colors[strokeIdx % colors.length];
            } else {
                const group = Math.floor(strokeIdx / 3);
                currentColor = colors[group % colors.length];
            }

            writer.animateStroke(strokeIdx, { strokeColor: currentColor });
            strokeIdx++;
            document.getElementById('status-info').innerText = `第 ${strokeIdx} / ${totalStrokes} 笔`;
        }

        function start() {
            const input = document.getElementById('input-words').value;
            words = input.split('').filter(s => s.trim());
            wordIdx = 0;
            if (words.length > 0) initWriter(words[wordIdx]);
        }

        function nextWord() {
            if (words.length === 0) return;
            wordIdx = (wordIdx + 1) % words.length;
            initWriter(words[wordIdx]);
        }

        window.onload = start;
    </script>
</body>
</html>
