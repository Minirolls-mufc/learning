<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字小课堂</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.24.2/dist/index.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#3d1c02;--ink2:#7c3a0e;--muted:#b07040;--border:#fdd9b5;
  --bg:#fff8f0;--paper:#ffffff;
  --o1:#ff6b00;--o2:#ff8c38;--o3:#ffb366;--o4:#ffd199;
  --red:#ef4444;--blue:#3b82f6;--green:#22c55e;
  --accent:#ff6b00;--stamp:#ff6b00;
  --grad-hero:linear-gradient(135deg,#ff6b00 0%,#ff9a3c 100%);
  --grad-btn:linear-gradient(135deg,#ff6b00,#ff9a3c);
  --grad-btn2:linear-gradient(135deg,#ffb366,#ff6b00);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column}
.page{display:none;flex-direction:column;height:100%;overflow:hidden;animation:fadeUp .22s ease both}
.page.active{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── topbar ── */
.topbar{
  flex-shrink:0;height:54px;display:flex;align-items:center;padding:0 14px;gap:10px;
  background:var(--paper);border-bottom:2px solid var(--border);z-index:10;
  box-shadow:0 2px 8px rgba(255,107,0,.08);
}
.topbar-title{
  font-family:'ZCOOL XiaoWei',cursive;font-size:1.1rem;font-weight:600;
  flex:1;text-align:center;letter-spacing:3px;
  background:var(--grad-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.icon-btn{
  width:36px;height:36px;border-radius:10px;border:2px solid var(--border);
  background:var(--paper);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.95rem;transition:all .15s;flex-shrink:0;
}
.icon-btn:hover{background:var(--bg);border-color:var(--o2);transform:scale(1.06)}

/* ── buttons ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:9px 18px;border-radius:12px;border:2px solid transparent;
  font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;
  transition:all .15s;white-space:nowrap;line-height:1;
}
.btn:active{transform:scale(.95)}
.btn-primary{background:var(--grad-btn);color:#fff;box-shadow:0 3px 10px rgba(255,107,0,.35)}
.btn-primary:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn-ghost{background:var(--paper);color:var(--ink2);border-color:var(--border)}
.btn-ghost:hover{background:#fff5ec;border-color:var(--o2);color:var(--o1)}
.btn-danger{background:#fff1f2;color:#ef4444;border-color:#fecaca}
.btn-danger:hover{background:#fee2e2}
.btn-sm{padding:7px 14px;font-size:.78rem;border-radius:9px}
.btn-icon{padding:8px;border-radius:9px;min-width:34px;min-height:34px}
.btn.toggled{background:var(--grad-btn)!important;color:#fff!important;border-color:transparent!important;box-shadow:0 3px 10px rgba(255,107,0,.4)!important}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--o2),var(--o3));border-radius:4px}

/* ════ HOME ════ */
#page-home{background:var(--bg)}
.home-hero{
  flex-shrink:0;background:var(--grad-hero);color:#fff;
  padding:32px 22px 38px;position:relative;overflow:hidden;
}
.home-hero::before{content:'';position:absolute;right:-50px;top:-50px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.09)}
.home-hero::after{content:'';position:absolute;left:-30px;bottom:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.06)}
.hero-eyebrow{font-size:.68rem;letter-spacing:4px;color:rgba(255,255,255,.7);margin-bottom:8px}
.hero-title{font-family:'Ma Shan Zheng',cursive;font-size:2.8rem;line-height:1;letter-spacing:8px;margin-bottom:6px}
.hero-title span{color:#ffd199}
.hero-sub{font-size:.82rem;color:rgba(255,255,255,.75);letter-spacing:1px}
.home-body{flex:1;overflow-y:auto;padding:18px 16px 28px}
.sec-label{font-size:.67rem;letter-spacing:3px;color:var(--muted);margin-bottom:10px;font-weight:700;text-transform:uppercase}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
.nav-card{
  background:var(--paper);border:2px solid var(--border);border-radius:16px;
  padding:18px 14px;cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;gap:8px;
  box-shadow:0 2px 8px rgba(255,107,0,.06);position:relative;overflow:hidden;
}
.nav-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;background:var(--grad-hero)}
.nav-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,0,.12)}
.nav-card:active{transform:scale(.97)}
.nav-card.hl{background:var(--grad-hero);border-color:transparent}
.nav-card.hl::before{display:none}
.nav-card.hl .nav-name,.nav-card.hl .nav-icon{color:#fff}
.nav-card.hl .nav-desc{color:rgba(255,255,255,.7)}
.nav-icon{font-size:1.8rem;line-height:1}
.nav-name{font-weight:900;font-size:.92rem;color:var(--ink)}
.nav-desc{font-size:.72rem;color:var(--muted);line-height:1.4}
.nav-badge{position:absolute;top:10px;right:10px;background:#ffd199;color:var(--ink);font-size:.58rem;font-weight:900;padding:2px 7px;border-radius:99px}
.group-chips{display:flex;flex-wrap:wrap;gap:8px}
.g-chip{
  display:flex;align-items:center;gap:6px;padding:7px 13px;
  background:var(--paper);border:2px solid var(--border);border-radius:10px;
  cursor:pointer;transition:all .15s;font-size:.8rem;font-weight:700;
}
.g-chip:hover{border-color:var(--o2);background:#fff5ec;color:var(--o1)}
.g-chip-n{font-size:.67rem;color:var(--muted);font-weight:400}

/* ════ GROUP PICKER ════ */
#page-gpick{background:var(--bg)}
.gpick-body{flex:1;overflow-y:auto;padding:20px 16px 32px}
.gpick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.gpick-card{
  background:var(--paper);border:2px solid var(--border);border-radius:18px;
  padding:22px 18px 18px;cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;gap:10px;
  box-shadow:0 2px 8px rgba(255,107,0,.06);position:relative;overflow:hidden;
}
.gpick-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--grad-hero);border-radius:18px 18px 0 0}
.gpick-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(255,107,0,.14)}
.gpick-card:active{transform:scale(.97)}
.gpick-card-top{display:flex;align-items:center;gap:10px}
.gpick-name{font-weight:900;font-size:1.05rem;flex:1;color:var(--ink)}
.gpick-arrow{font-size:1.2rem;color:var(--muted)}
.gpick-meta{font-size:.78rem;color:var(--muted);font-weight:600}
.gpick-empty{text-align:center;padding:48px 20px;color:var(--muted);grid-column:1/-1}
.gpick-empty-icon{font-size:3rem;opacity:.35;margin-bottom:10px}
.gpick-empty-text{font-size:.9rem;font-weight:700;color:var(--ink2);margin-bottom:6px}
.gpick-empty-sub{font-size:.78rem;line-height:1.6}

/* ════ STUDY PAGE ════ */
#page-study{background:var(--bg)}
.study-body{
  flex:1;overflow:hidden;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:16px 60px;gap:14px;position:relative;
}
.entry-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:5}
.entry-nav.left{left:6px}.entry-nav.right{right:6px}
.nav-arrow{
  width:38px;height:58px;border-radius:14px;border:2px solid var(--border);
  background:var(--paper);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.3rem;font-weight:900;transition:all .18s;color:var(--muted);
  box-shadow:0 2px 8px rgba(255,107,0,.08);
}
.nav-arrow:hover{background:var(--grad-btn);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(255,107,0,.35);transform:scale(1.06)}
.nav-arrow:disabled{opacity:.2;pointer-events:none;box-shadow:none}
.study-center{display:flex;flex-direction:column;align-items:center;gap:14px;max-width:760px;width:100%}
.tzg-row{display:flex;gap:20px;align-items:flex-start;justify-content:center;flex-wrap:wrap}
.tzg-unit{display:flex;flex-direction:column;align-items:center;gap:8px}
.tzg-pinyin{
  font-size:1.6rem;font-weight:900;letter-spacing:5px;
  font-family:'Noto Sans SC',sans-serif;min-height:1.8em;text-align:center;line-height:1.2;
  background:var(--grad-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.tzg-box{
  position:relative;background:#fff;border:2.5px solid var(--o3);border-radius:8px;
  overflow:hidden;flex-shrink:0;width:240px;height:240px;
  box-shadow:0 4px 16px rgba(255,107,0,.12);
}
.tzg-cover{position:absolute;inset:0;z-index:3;display:none}
.tzg-cover.show{display:block}
.tzg-mini-ctrl{display:flex;gap:6px;justify-content:center}
.tzg-status{font-size:.72rem;color:var(--muted);text-align:center;min-height:1em;font-weight:600}
.tzg-status.ok{color:var(--green)}.tzg-status.err{color:var(--red)}
.entry-label{font-size:.78rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-align:center}
.study-quiz-msg{font-size:.92rem;font-weight:800;text-align:center;min-height:1.2em;letter-spacing:.3px;color:var(--ink)}
.study-actions{
  flex-shrink:0;display:flex;gap:9px;flex-wrap:wrap;justify-content:center;
  padding:11px 16px 13px;border-top:2px solid var(--border);
  background:var(--paper);box-shadow:0 -2px 10px rgba(255,107,0,.06);
}

/* ════ PRACTICE PAGE ════ */
#page-practice{background:var(--bg)}
.prac-body{flex:1;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:18px}
.prac-mode-sel{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.prac-mode-card{
  background:var(--paper);border:2px solid var(--border);border-radius:16px;
  padding:22px 26px;cursor:pointer;transition:all .2s;text-align:center;
  min-width:150px;box-shadow:0 2px 8px rgba(255,107,0,.06);
}
.prac-mode-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,0,.14);border-color:var(--o2)}
.prac-mode-card.active{background:var(--grad-btn);border-color:transparent;box-shadow:0 4px 16px rgba(255,107,0,.4)}
.prac-mode-card .pm-icon{font-size:2.2rem;margin-bottom:8px}
.prac-mode-card .pm-name{font-weight:900;font-size:.95rem;color:var(--ink)}
.prac-mode-card .pm-desc{font-size:.72rem;color:var(--muted);line-height:1.4;margin-top:4px}
.prac-mode-card.active .pm-name,.prac-mode-card.active .pm-desc{color:#fff}
.prac-gpick-hint{font-size:.82rem;color:var(--muted);font-weight:600}
.prac-start-btn{font-size:1rem;padding:12px 32px;border-radius:14px}

/* Practice quiz layout */
.prac-quiz-body{
  flex:1;overflow:hidden;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:12px 60px;gap:12px;position:relative;
}
.prac-char-area{display:flex;flex-direction:column;align-items:center;gap:10px}
.prac-pinyin-hint{
  font-size:2rem;font-weight:900;letter-spacing:6px;
  background:var(--grad-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  min-height:2.2em;text-align:center;
}
.prac-hint-label{
  font-size:.8rem;color:var(--muted);font-weight:700;text-align:center;
  background:var(--bg);border:1.5px solid var(--border);padding:4px 12px;border-radius:99px;margin-bottom:2px;
}
.prac-progress{
  display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center;
}
.prac-prog-dot{
  width:10px;height:10px;border-radius:50%;background:var(--border);transition:background .3s;
}
.prac-prog-dot.done{background:var(--green)}
.prac-prog-dot.current{background:var(--o1);transform:scale(1.3)}
.prac-msg{
  font-size:.95rem;font-weight:800;text-align:center;min-height:1.3em;
  letter-spacing:.3px;padding:8px 20px;border-radius:99px;
  background:var(--bg);border:1.5px solid var(--border);color:var(--ink);
}
.prac-nav-arrows{
  position:absolute;top:50%;transform:translateY(-50%);
  display:flex;width:100%;justify-content:space-between;
  padding:0 6px;pointer-events:none;z-index:5;
}
.prac-nav-arrows .nav-arrow{pointer-events:all}
.prac-actions{
  flex-shrink:0;display:flex;gap:9px;flex-wrap:wrap;justify-content:center;
  padding:10px 16px 12px;border-top:2px solid var(--border);
  background:var(--paper);box-shadow:0 -2px 8px rgba(255,107,0,.05);
}

/* ════ MANAGE PAGE ════ */
#page-manage{background:var(--bg)}
.manage-body{flex:1;overflow-y:auto;padding:12px 14px 28px}
.wm-group{
  background:var(--paper);border:2px solid var(--border);border-radius:16px;
  margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(255,107,0,.05);
}
.wm-gh{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:2px solid var(--border);background:var(--bg)}
.wm-gname{flex:1;font-weight:900;font-size:.9rem;color:var(--ink)}
.wm-gcnt{font-size:.7rem;color:var(--muted);background:var(--border);padding:2px 8px;border-radius:99px}
.wm-ga{display:flex;gap:5px}
.wm-entries{padding:10px 13px;display:flex;flex-wrap:wrap;gap:7px}
.wm-entry{
  display:flex;align-items:center;gap:6px;
  background:var(--bg);border:2px solid var(--border);
  border-radius:9px;padding:5px 9px;cursor:pointer;transition:all .15s;
}
.wm-entry:hover{border-color:var(--o2);background:#fff5ec;transform:translateY(-1px)}
.wm-ehanzi{font-family:'Ma Shan Zheng',cursive;font-size:1.3rem;line-height:1}
.wm-epy{font-size:.63rem;color:var(--muted)}
.wm-add{
  display:flex;align-items:center;justify-content:center;width:46px;height:46px;
  border:2px dashed var(--border);border-radius:9px;cursor:pointer;
  font-size:1.2rem;color:var(--muted);transition:all .15s;background:transparent;
}
.wm-add:hover{border-color:var(--o2);color:var(--o1);background:#fff5ec}

/* ════ PLACEHOLDER ════ */
.placeholder-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px;text-align:center}
.ph-icon{font-size:4rem;opacity:.4}
.ph-text{font-size:.95rem;font-weight:900;color:var(--ink2)}
.ph-sub{font-size:.8rem;line-height:1.8;color:var(--muted)}

/* ════ MODAL ════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(61,28,2,.45);backdrop-filter:blur(3px);
  z-index:100;display:none;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--paper);border-radius:20px;width:100%;max-width:430px;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 24px 64px rgba(61,28,2,.2);
  animation:slideUp .22s ease;border:2px solid var(--border);
}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 0}
.mtitle{
  font-weight:900;font-size:.95rem;
  background:var(--grad-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.mclose{
  width:30px;height:30px;border-radius:8px;border:2px solid var(--border);
  background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.85rem;transition:all .12s;
}
.mclose:hover{background:#ffe4e6;border-color:#ef4444;color:#ef4444}
.mbody{padding:14px 18px 16px;display:flex;flex-direction:column;gap:12px}
.frow{display:flex;flex-direction:column;gap:5px}
.flabel{font-size:.74rem;font-weight:800;color:var(--ink2);letter-spacing:.5px}
.finput{
  border:2px solid var(--border);border-radius:10px;padding:9px 12px;
  font-size:.88rem;font-family:inherit;background:var(--bg);outline:none;
  transition:border-color .18s;width:100%;
}
.finput:focus{border-color:var(--o2);background:var(--paper);box-shadow:0 0 0 3px rgba(255,107,0,.1)}
.fhint{font-size:.68rem;color:var(--muted);line-height:1.5}
.ftabs{display:flex;gap:6px}
.ftab{
  flex:1;padding:8px;border-radius:9px;border:2px solid var(--border);
  background:var(--bg);font-family:inherit;font-size:.76rem;font-weight:700;
  cursor:pointer;transition:all .15s;text-align:center;
}
.ftab.active{background:var(--grad-btn);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(255,107,0,.3)}
.mfooter{padding:0 18px 16px;display:flex;gap:8px;justify-content:flex-end}

/* word char config */
.word-char-cfg{display:flex;flex-direction:column;gap:7px;margin-top:4px}
.wcc-row{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--bg);border:2px solid var(--border);border-radius:10px}
.wcc-ch{font-family:'Ma Shan Zheng',cursive;font-size:1.4rem;width:30px;text-align:center;flex-shrink:0}
.wcc-tabs{display:flex;gap:4px;flex:1}
.wcc-tab{flex:1;padding:5px 4px;border-radius:7px;border:2px solid var(--border);background:var(--paper);font-family:inherit;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .12s;text-align:center}
.wcc-tab.active{background:var(--grad-btn);color:#fff;border-color:transparent}
.wcc-range{flex:1;border:2px solid var(--border);border-radius:7px;padding:5px 8px;font-size:.72rem;font-family:inherit;outline:none;background:#fff;display:none}
.wcc-range.show{display:block}
.wcc-range:focus{border-color:var(--o2)}
</style>
</head>
<body>

<!-- ═══ HOME ═══ -->
<div id="page-home" class="page active">
  <div class="home-hero">
    <div class="hero-eyebrow">小学汉字学习</div>
    <div class="hero-title">汉字<span>课堂</span></div>
    <div class="hero-sub">一笔一划，认识每个汉字</div>
  </div>
  <div class="home-body">
    <div class="sec-label">主菜单</div>
    <div class="nav-grid">
      <div class="nav-card hl" onclick="showPage('gpick');renderGpick()">
        <div class="nav-icon">📖</div><div class="nav-name">学 习</div>
        <div class="nav-desc">笔顺动画，彩色笔划</div><div class="nav-badge">NEW</div>
      </div>
      <div class="nav-card" onclick="openPractice()">
        <div class="nav-icon">✏️</div><div class="nav-name">练 习</div><div class="nav-desc">默写检测，两种模式</div>
      </div>
      <div class="nav-card" onclick="showPage('achieve')">
        <div class="nav-icon">🏆</div><div class="nav-name">成 就</div><div class="nav-desc">学习记录，解锁徽章</div>
      </div>
      <div class="nav-card" onclick="showPage('manage');renderManage()">
        <div class="nav-icon">📚</div><div class="nav-name">字词管理</div><div class="nav-desc">添加分组，管理字词</div>
      </div>
    </div>
    <div class="sec-label">分组快速开始</div>
    <div class="group-chips" id="home-chips"></div>
  </div>
</div>

<!-- ═══ GROUP PICKER (学习) ═══ -->
<div id="page-gpick" class="page">
  <div class="topbar">
    <button class="icon-btn" onclick="showPage('home');renderHome()">🏠</button>
    <div class="topbar-title">选择学习分组</div>
    <div style="width:36px"></div>
  </div>
  <div class="gpick-body">
    <div class="gpick-grid" id="gpick-grid"></div>
  </div>
</div>

<!-- ═══ STUDY ═══ -->
<div id="page-study" class="page">
  <div class="topbar">
    <button class="icon-btn" onclick="showPage('home');renderHome()">🏠</button>
    <div class="topbar-title" id="study-group-name">学 习</div>
    <button class="icon-btn" onclick="speakCurrent()" title="朗读">🔊</button>
  </div>
  <div class="study-body">
    <div class="entry-nav left">
      <button class="nav-arrow" id="btn-prev-entry" onclick="goPrevEntry()">‹</button>
    </div>
    <div class="study-center">

<script>
// ══ CONSTANTS ══
const STROKE_PAL=['#f43f5e','#fb923c','#fbbf24','#22c55e','#14b8a6','#3b82f6','#8b5cf6'];
const HW_TF='scale(1,-1) translate(0,-900)';
const OUTLINE='#e5d4c0';
const GRP_COLORS=['#ff6b00','#f43f5e','#8b5cf6','#22c55e','#3b82f6','#fbbf24','#14b8a6','#ec4899'];

// ══ STORE ══
let store={
  groups:[
    {id:'g1',name:'一年级·基础字',entries:[
      {type:'char',hanzi:'山',pinyin:'shān',mode:'simple',redRange:''},
      {type:'char',hanzi:'水',pinyin:'shuǐ',mode:'simple',redRange:''},
      {type:'char',hanzi:'火',pinyin:'huǒ',mode:'simple',redRange:''},
      {type:'word',hanzi:'大山',pinyin:'dà shān',charCfg:[{mode:'simple',redRange:''},{mode:'simple',redRange:''}]},
      {type:'word',hanzi:'山水',pinyin:'shān shuǐ',charCfg:[{mode:'simple',redRange:''},{mode:'simple',redRange:''}]},
    ]},
    {id:'g2',name:'认识结构',entries:[
      {type:'char',hanzi:'明',pinyin:'míng',mode:'complex',redRange:'1-4'},
      {type:'char',hanzi:'好',pinyin:'hǎo',mode:'complex',redRange:'1-3'},
      {type:'word',hanzi:'明天',pinyin:'míng tiān',charCfg:[{mode:'complex',redRange:'1-4'},{mode:'simple',redRange:''}]},
    ]}
  ]
};
// Assign stable colors by index
function grpColor(g){const i=store.groups.indexOf(g);return GRP_COLORS[i%GRP_COLORS.length];}

function saveStore(){try{localStorage.setItem('hxkt_v4',JSON.stringify(store));}catch(e){}}
function loadStore(){try{const d=localStorage.getItem('hxkt_v4');if(d)store=JSON.parse(d);}catch(e){}}
loadStore();

// ══ SPA NAV ══
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));

// ══ HOME ══
function renderHome(){
  const el=document.getElementById('home-chips');el.innerHTML='';
  store.groups.forEach(g=>{
    const c=document.createElement('div');c.className='g-chip';c.onclick=()=>startStudy(g.id);
    c.innerHTML=`${g.name}<span class="g-chip-n">${g.entries.length}条</span>`;
    el.appendChild(c);
  });
}

// ══ GROUP PICKER (学习) ══
function renderGpick(){
  const grid=document.getElementById('gpick-grid');grid.innerHTML='';
  if(!store.groups.length){
    grid.innerHTML=`<div class="gpick-empty"><div class="gpick-empty-icon">📚</div><div class="gpick-empty-text">暂无分组</div><div class="gpick-empty-sub">在「字词管理」新建分组</div></div>`;
    return;
  }
  store.groups.forEach(g=>{
    const card=document.createElement('div');card.className='gpick-card';
    card.onclick=()=>startStudy(g.id);
    const n=g.entries.length;
    const chars=g.entries.filter(e=>e.type==='char').length;
    const words=g.entries.filter(e=>e.type==='word').length;
    card.innerHTML=`<div class="gpick-card-top"><span class="gpick-name">${g.name}</span><span class="gpick-arrow">›</span></div>
      <div class="gpick-meta">${chars?chars+'个字 ':''} ${words?words+'个词':''} ${!n?'暂无内容':''}</div>`;
    grid.appendChild(card);
  });
}
function startStudy(gid){
  const g=store.groups.find(x=>x.id===gid);if(!g)return;
  S.groupId=gid;S.entryIdx=0;
  document.getElementById('study-group-name').textContent=g.name;
  showPage('study');loadEntry();
}

// ══ STUDY STATE ══
let S={groupId:null,entryIdx:0,chars:[],followMode:false,coverMode:false,followCharIdx:0,quizWriter:null};
function currentGroup(){return store.groups.find(x=>x.id===S.groupId);}
function currentEntry(){const g=currentGroup();return g?g.entries[S.entryIdx]:null;}
function goPrevEntry(){if(S.entryIdx<=0)return;S.entryIdx--;loadEntry();}
function goNextEntry(){const g=currentGroup();if(!g||S.entryIdx>=g.entries.length-1)return;S.entryIdx++;loadEntry();}
function updateNavBtns(){
  const g=currentGroup(),n=g?g.entries.length:0;
  document.getElementById('btn-prev-entry').disabled=S.entryIdx<=0;
  document.getElementById('btn-next-entry').disabled=S.entryIdx>=n-1;
  document.getElementById('entry-label').textContent=`${S.entryIdx+1} / ${n}`;
}

// ══ LOAD ENTRY ══
function makeTzgSvg(extraStyle){
  const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('viewBox','0 0 100 100');s.setAttribute('preserveAspectRatio','none');
  s.style.cssText=extraStyle||'';
  const mkL=(x1,y1,x2,y2,sw,color,dash)=>{
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke',color||'#e0cbb0');l.setAttribute('stroke-width',sw||'1');
    if(dash)l.setAttribute('stroke-dasharray',dash);return l;
  };
  s.appendChild(mkL(50,0,50,100,'1','#e0cbb0','6,4'));
  s.appendChild(mkL(0,50,100,50,'1','#e0cbb0','6,4'));
  s.appendChild(mkL(0,0,100,100,'0.8','#ead8c0','5,5'));
  s.appendChild(mkL(100,0,0,100,'0.8','#ead8c0','5,5'));
  return s;
}

function loadEntry(){
  exitAllQuiz();S.followMode=false;S.coverMode=false;
  document.getElementById('btn-follow').classList.remove('toggled');
  document.getElementById('btn-follow').textContent='🖊 跟写';
  document.getElementById('btn-cover').classList.remove('toggled');
  document.getElementById('btn-cover').textContent='👁 遮盖';
  document.getElementById('study-quiz-msg').textContent='';
  updateNavBtns();
  const entry=currentEntry();
  if(!entry){document.getElementById('tzg-row').innerHTML='<div style="color:var(--muted);padding:20px">暂无内容</div>';return;}
  const chars=[...entry.hanzi],n=chars.length;S.chars=[];
  const charCfgs=entry.type==='word'?(entry.charCfg||chars.map(()=>({mode:'simple',redRange:''}))):[{mode:entry.mode||'simple',redRange:entry.redRange||''}];
  const row=document.getElementById('tzg-row');row.innerHTML='';
  chars.forEach((ch,ci)=>{
    const cfg=charCfgs[ci]||{mode:'simple',redRange:''};
    S.chars.push({ch,charData:null,strokeColors:[],stepIdx:0,mode:cfg.mode,redRange:cfg.redRange||''});
    const unit=document.createElement('div');unit.className='tzg-unit';
    // pinyin above
    const py=document.createElement('div');py.className='tzg-pinyin';
    const parts=(entry.pinyin||autoPinyin(entry.hanzi)).split(' ');
    py.textContent=parts[ci]||autoPinyin(ch);unit.appendChild(py);
    // box
    const box=document.createElement('div');box.className='tzg-box';box.id=`box-${ci}`;
    box.appendChild(makeTzgSvg('position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0'));
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 1024 1024');
    svg.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:1';
    svg.id=`svg-${ci}`;box.appendChild(svg);
    const qd=document.createElement('div');qd.style.cssText='position:absolute;inset:0;z-index:2;display:none';qd.id=`qd-${ci}`;box.appendChild(qd);
    // cover with grid
    const cv=document.createElement('div');cv.className='tzg-cover';cv.id=`cv-${ci}`;
    const cvSvg=makeTzgSvg('position:absolute;inset:0;width:100%;height:100%');
    const wr=document.createElementNS('http://www.w3.org/2000/svg','rect');
    wr.setAttribute('width','100');wr.setAttribute('height','100');wr.setAttribute('fill','#fff');
    cvSvg.insertBefore(wr,cvSvg.firstChild);cv.appendChild(cvSvg);box.appendChild(cv);
    unit.appendChild(box);
    // mini controls
    const mc=document.createElement('div');mc.className='tzg-mini-ctrl';
    mc.innerHTML=`<button class="btn btn-ghost btn-sm btn-icon" onclick="charPrev(${ci})">◀</button><button class="btn btn-primary btn-sm btn-icon" onclick="charNext(${ci})">▶</button><button class="btn btn-ghost btn-sm btn-icon" onclick="charReset(${ci})">↺</button>`;
    unit.appendChild(mc);
    const st=document.createElement('div');st.className='tzg-status';st.id=`st-${ci}`;st.textContent='加载…';unit.appendChild(st);
    row.appendChild(unit);fetchCharData(ch,ci);
  });
}

function fetchCharData(ch,ci){
  fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${encodeURIComponent(ch)}.json`)
    .then(r=>{if(!r.ok)throw 0;return r.json();})
    .then(data=>{
      const c=S.chars[ci];c.charData=data;
      c.strokeColors=buildColors(data.strokes.length,c.mode,c.redRange);
      c.stepIdx=data.strokes.length;renderSvg(ci,c.stepIdx);setSt(ci,`${data.strokes.length}笔`,'ok');
    }).catch(()=>setSt(ci,'⚠️ 无数据','err'));
}
function buildColors(n,mode,redRange){
  if(mode==='simple')return Array.from({length:n},(_,i)=>STROKE_PAL[i%STROKE_PAL.length]);
  const rs=parseRange(redRange,n);
  return Array.from({length:n},(_,i)=>rs.has(i+1)?'#ef4444':'#3b82f6');
}
function parseRange(str,n){
  const s=new Set();if(!str)return s;
  str.split(',').forEach(p=>{p=p.trim();
    if(p.includes('-')){const[a,b]=p.split('-').map(Number);for(let i=a;i<=b&&i<=n;i++)s.add(i);}
    else{const v=parseInt(p);if(!isNaN(v)&&v>=1&&v<=n)s.add(v);}
  });return s;
}
function renderSvg(ci,upTo,animIdx){
  const c=S.chars[ci];if(!c||!c.charData)return;
  const svg=document.getElementById(`svg-${ci}`);if(!svg)return;
  svg.innerHTML='';
  c.charData.strokes.forEach(d=>svg.appendChild(mkP(d,OUTLINE)));
  for(let i=0;i<upTo;i++){
    const p=mkP(c.charData.strokes[i],c.strokeColors[i]);
    if(i===animIdx){p.style.opacity='0';p.style.transition='opacity .35s ease';svg.appendChild(p);requestAnimationFrame(()=>requestAnimationFrame(()=>p.style.opacity='1'));}
    else svg.appendChild(p);
  }
}
function mkP(d,color){const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',d);p.setAttribute('fill',color);p.setAttribute('transform',HW_TF);return p;}
function setSt(ci,msg,cls){const el=document.getElementById(`st-${ci}`);if(!el)return;el.textContent=msg;el.className='tzg-status'+(cls?' '+cls:'');}

function charNext(ci){
  if(S.followMode)return;const c=S.chars[ci];if(!c||!c.charData)return;
  const n=c.charData.strokes.length;
  if(c.stepIdx>=n){c.stepIdx=0;renderSvg(ci,0);setTimeout(()=>{c.stepIdx=1;renderSvg(ci,1,0);updateSt(ci);},60);return;}
  const prev=c.stepIdx++;renderSvg(ci,c.stepIdx,prev);updateSt(ci);
}
function charPrev(ci){if(S.followMode)return;const c=S.chars[ci];if(!c||!c.charData||c.stepIdx<=0)return;c.stepIdx--;renderSvg(ci,c.stepIdx);updateSt(ci);}
function charReset(ci){if(S.followMode)return;exitCharQuiz(ci);const c=S.chars[ci];if(!c||!c.charData)return;c.stepIdx=c.charData.strokes.length;renderSvg(ci,c.stepIdx);updateSt(ci);}
function updateSt(ci){const c=S.chars[ci];if(!c||!c.charData)return;const n=c.charData.strokes.length,s=c.stepIdx;setSt(ci,s===0?`${n}笔（隐藏）`:s===n?`${n}笔`:`第${s}/${n}笔`,s===n?'ok':'');}

function resetAll(){
  exitAllQuiz();S.followMode=false;S.coverMode=false;
  document.getElementById('btn-follow').classList.remove('toggled');document.getElementById('btn-follow').textContent='🖊 跟写';
  document.getElementById('btn-cover').classList.remove('toggled');document.getElementById('btn-cover').textContent='👁 遮盖';
  document.getElementById('study-quiz-msg').textContent='';
  S.chars.forEach((_,ci)=>{const cv=document.getElementById(`cv-${ci}`);if(cv)cv.classList.remove('show');});
  S.chars.forEach((_,ci)=>charReset(ci));
}

// follow mode
function toggleFollow(){
  S.followMode=!S.followMode;
  const btn=document.getElementById('btn-follow');
  btn.classList.toggle('toggled',S.followMode);
  if(!S.followMode){btn.textContent='🖊 跟写';exitAllQuiz();return;}
  btn.textContent=S.coverMode?'✋ 退出默写':'✋ 退出跟写';
  S.chars.forEach((c,ci)=>{exitCharQuiz(ci);if(c.charData){c.stepIdx=0;renderSvg(ci,0);}});
  S.followCharIdx=0;advanceFollow();
}
function advanceFollow(){
  if(!S.followMode)return;
  const ci=S.followCharIdx;
  if(ci>=S.chars.length){finishFollow();return;}
  const c=S.chars[ci];if(!c||!c.charData){S.followCharIdx++;advanceFollow();return;}
  const box=document.getElementById(`box-${ci}`);if(!box)return;
  const cvEl=document.getElementById(`cv-${ci}`);if(cvEl)cvEl.classList.remove('show');
  document.getElementById(`svg-${ci}`).style.display='none';
  const qd=document.getElementById(`qd-${ci}`);qd.style.display='block';qd.innerHTML='';qd.style.zIndex='4';
  const bsz=box.clientWidth||240,isMo=S.coverMode;
  document.getElementById('study-quiz-msg').textContent=isMo?`✏️ 默写「${c.ch}」`:`✏️ 描写「${c.ch}」`;
  S.quizWriter=HanziWriter.create(`qd-${ci}`,c.ch,{
    width:bsz,height:bsz,padding:0,showCharacter:false,showOutline:!isMo,
    strokeColor:'#444',outlineColor:'#e0cbb0',drawingColor:'#ff6b00',
    drawingWidth:Math.max(5,Math.round(bsz*.025)),showHintAfterMisses:isMo?5:3,highlightColor:'#fbbf24',
    charDataLoader:(ch2,onL,onE)=>{fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${encodeURIComponent(ch2)}.json`).then(r=>{if(!r.ok)throw 0;return r.json();}).then(onL).catch(onE);},
    onLoadCharDataSuccess:()=>{S.quizWriter.quiz({
      onMistake:d=>{document.getElementById('study-quiz-msg').textContent=`第${d.strokeNum+1}笔再试！😅`;},
      onCorrectStroke:d=>{document.getElementById('study-quiz-msg').textContent=isMo?`第${d.strokeNum+1}笔✓`:`第${d.strokeNum+1}笔棒棒！👍`;},

let P={
  groupId:null,mode:'simple',
  queue:[],       // [{hanzi,pinyin,charCfg,entry}] — one item per CHARACTER (not entry)
  idx:0,
  hwWriter:null,
  charData:null,
  phase:'write',  // 'write' | 'trace'

function selectPracMode(m){
  P.mode=m;
  document.getElementById('pmc-simple').classList.toggle('active',m==='simple');
  document.getElementById('pmc-standard').classList.toggle('active',m==='standard');
}

function startPractice(){
  const g=store.groups.find(x=>x.id===P.groupId);if(!g||!g.entries.length){alert('请先选择有内容的分组');return;}
  // Build queue: expand each entry into individual chars
  P.queue=[];
  g.entries.forEach(entry=>{
    const chars=[...entry.hanzi];
    const cfgs=entry.type==='word'?(entry.charCfg||chars.map(()=>({mode:'simple',redRange:''}))):[{mode:entry.mode||'simple',redRange:entry.redRange||''}];
    const pinyins=(entry.pinyin||autoPinyin(entry.hanzi)).split(' ');
    chars.forEach((ch,ci)=>{
      P.queue.push({ch,pinyin:pinyins[ci]||autoPinyin(ch),cfg:cfgs[ci]||{mode:'simple',redRange:''},entryHanzi:entry.hanzi});
    });
  });
  // Shuffle
  for(let i=P.queue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[P.queue[i],P.queue[j]]=[P.queue[j],P.queue[i]];}
  P.idx=0;P.hwWriter=null;P.charData=null;
  document.getElementById('prac-sel').style.display='none';
  document.getElementById('prac-quiz').style.display='flex';
  document.getElementById('prac-quiz').style.flexDirection='column';
  document.getElementById('prac-title').textContent=g.name+' · '+(P.mode==='simple'?'简单模式':'标准模式');
  loadPracChar();
}

function loadPracChar(){
  if(P.hwWriter){try{P.hwWriter.cancelAnimation();}catch(e){}P.hwWriter=null;}
  const item=P.queue[P.idx];if(!item)return;
  P.phase='write';P.mistakeCount=0;
  // progress dots
  const prog=document.getElementById('prac-progress');prog.innerHTML='';
  P.queue.forEach((_,i)=>{const d=document.createElement('div');d.className='prac-prog-dot'+(i<P.idx?' done':i===P.idx?' current':'');prog.appendChild(d);});
  // prev/next
  document.getElementById('prac-prev').disabled=P.idx<=0;
  document.getElementById('prac-next').disabled=P.idx>=P.queue.length-1;
  // pinyin hint: show in standard mode, hide in simple mode initially
  const phint=document.getElementById('prac-pinyin-hint');
  const hlbl=document.getElementById('prac-hint-label');
  if(P.mode==='standard'){
    phint.textContent=item.pinyin;hlbl.style.display='none';
  } else {
    phint.textContent='';hlbl.style.display='none';
  }
  // message
  document.getElementById('prac-msg').textContent=P.mode==='standard'?'根据拼音写出这个字':'写出这个字';
  // Build tzg-row with single char box for quiz
  const row=document.getElementById('prac-tzg-row');row.innerHTML='';
  const unit=document.createElement('div');unit.className='tzg-unit';
  // no pinyin label in practice (shown separately above)
  const box=document.createElement('div');box.className='tzg-box';box.id='prac-box';
  box.appendChild(makeTzgSvg('position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0'));
  // HanziWriter will be rendered into box directly
  unit.appendChild(box);row.appendChild(unit);
  // Fetch char data then create writer
  fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${encodeURIComponent(item.ch)}.json`)
    .then(r=>{if(!r.ok)throw 0;return r.json();})
    .then(data=>{P.charData=data;initPracWriter(item,data);})
    .catch(()=>{document.getElementById('prac-msg').textContent='⚠️ 无法加载字形数据';});
}

function initPracWriter(item,data){
  const box=document.getElementById('prac-box');if(!box)return;
  const bsz=box.clientWidth||240;
  const cfg=item.cfg;
  const isComplex=cfg.mode==='complex'&&cfg.redRange;
  if(P.hwWriter){try{P.hwWriter.cancelAnimation();}catch(e){}}
  // Clear box except grid svg (first child)
  while(box.children.length>1)box.removeChild(box.lastChild);
  P.hwWriter=HanziWriter.create(box,item.ch,{
    width:bsz,height:bsz,padding:0,
    showCharacter:false,showOutline:false,
    strokeColor:'#ff6b00',outlineColor:'#e0cbb0',
    drawingColor:'#ff6b00',drawingWidth:Math.max(5,Math.round(bsz*.025)),
    showHintAfterMisses:999,// we manage hints manually
    highlightColor:'#fbbf24',
    charDataLoader:(ch2,onL,onE)=>{onL(data);},
    onLoadCharDataSuccess:()=>{
      if(P.mode==='simple'&&isComplex){
        // Show structure hint: randomly pick red or blue part
        showStructureHint(item,data,bsz,()=>startPracQuiz(item,data));
      } else {
        startPracQuiz(item,data);
      }
    }
  });
}

function showStructureHint(item,data,bsz,cb){
  // Figure out red strokes vs blue strokes
  const n=data.strokes.length;
  const rs=parseRange(item.cfg.redRange,n);
  const redIdxs=[],blueIdxs=[];
  for(let i=1;i<=n;i++){(rs.has(i)?redIdxs:blueIdxs).push(i-1);}
  if(!redIdxs.length&&!blueIdxs.length){cb();return;}
  const showRed=Math.random()<.5&&redIdxs.length||!blueIdxs.length;
  const hintIdxs=showRed?redIdxs:blueIdxs;
  const hintColor=showRed?'#ef4444':'#3b82f6';
  const partName=showRed?'红色部件':'蓝色部件';
  const hlbl=document.getElementById('prac-hint-label');
  hlbl.textContent=`提示：${partName}`;hlbl.style.display='block';
  document.getElementById('prac-msg').textContent='观察结构提示，然后默写…';
  // Draw the hint strokes for 1.5s then clear and start quiz
  const box=document.getElementById('prac-box');
  // Overlay a temporary SVG with hint strokes
  const hsvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  hsvg.setAttribute('viewBox','0 0 1024 1024');
  hsvg.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:5;pointer-events:none';
  hintIdxs.forEach(i=>{
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',data.strokes[i]);p.setAttribute('fill',hintColor);p.setAttribute('transform',HW_TF);
    hsvg.appendChild(p);
  });
  box.appendChild(hsvg);
  setTimeout(()=>{
    if(box.contains(hsvg))box.removeChild(hsvg);
    hlbl.style.display='none';
    document.getElementById('prac-msg').textContent='开始写！';
    cb();
  },1800);
}

function startPracQuiz(item,data){
  if(!P.hwWriter)return;
  P.phase='write';
  document.getElementById('prac-msg').textContent=P.mode==='standard'?'根据拼音写出这个字':'写出这个字';
  P.hwWriter.quiz({
    leniency:1.1,
    onMistake:info=>{
      P.mistakeCount++;
      document.getElementById('prac-msg').textContent=`第${info.strokeNum+1}笔再试试！(错${P.mistakeCount}次)`;
      if(P.mistakeCount>=3&&P.phase==='write'){
        // After 3 mistakes, show hint automatically
        P.mistakeCount=0;
        document.getElementById('prac-msg').textContent='来看看正确写法…';
        P.hwWriter.cancelQuiz();
        playAnimationThenTrace(item,data);
      }
    },
    onCorrectStroke:info=>{
      document.getElementById('prac-msg').textContent=`第${info.strokeNum+1}笔✓ 继续！`;
    },
    onComplete:summary=>{
      if(P.phase==='trace'){
        document.getElementById('prac-msg').textContent=`描完了！错${summary.totalMistakes}次 ✅`;
        setTimeout(()=>pracAutoNext(),900);
      } else {
        document.getElementById('prac-msg').textContent=`太棒了！错${summary.totalMistakes}次 🎉`;
        setTimeout(()=>pracAutoNext(),900);
      }
    }
  });
}

function playAnimationThenTrace(item,data){
  // Animate the full character, then enter trace mode
  P.phase='trace';
  document.getElementById('prac-msg').textContent='看笔顺…';
  P.hwWriter.animateCharacter({
    onComplete:()=>{
      document.getElementById('prac-msg').textContent='现在描一遍 →';
      // Re-show outline for tracing
      P.hwWriter.updateColor('strokeColor','#aaaaaa');
      P.hwWriter.showOutline();
      P.hwWriter.quiz({
        leniency:1.2,
        onMistake:()=>{document.getElementById('prac-msg').textContent='描慢一点，跟着轮廓走…';},
        onCorrectStroke:()=>{document.getElementById('prac-msg').textContent='描对了，继续…';},
        onComplete:sum=>{
          document.getElementById('prac-msg').textContent=`描完了！✅`;
          setTimeout(()=>pracAutoNext(),900);
        }
      });
    }
  });
}

function pracAutoNext(){
  if(P.idx<P.queue.length-1){P.idx++;loadPracChar();}
  else{
    document.getElementById('prac-msg').textContent='🎉 本组练习完成！';
    document.getElementById('prac-progress').querySelectorAll('.prac-prog-dot').forEach(d=>{d.classList.remove('current');d.classList.add('done');});
  }
}
function pracGoPrev(){if(P.idx<=0)return;if(P.hwWriter){try{P.hwWriter.cancelAnimation();P.hwWriter.cancelQuiz();}catch(e){}}P.hwWriter=null;P.idx--;loadPracChar();}
function pracGoNext(){if(P.idx>=P.queue.length-1)return;if(P.hwWriter){try{P.hwWriter.cancelAnimation();P.hwWriter.cancelQuiz();}catch(e){}}P.hwWriter=null;P.idx++;loadPracChar();}
function pracSkip(){pracGoNext();}
function pracShowHint(){
  const item=P.queue[P.idx];if(!item||!P.charData||!P.hwWriter)return;
  document.getElementById('prac-msg').textContent='播放笔顺演示…';
  try{P.hwWriter.cancelQuiz();}catch(e){}
  playAnimationThenTrace(item,P.charData);
}
function pracRestart(){
  if(P.hwWriter){try{P.hwWriter.cancelAnimation();P.hwWriter.cancelQuiz();}catch(e){}}
  P.hwWriter=null;P.idx=0;
  for(let i=P.queue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[P.queue[i],P.queue[j]]=[P.queue[j],P.queue[i]];}
  loadPracChar();
}
function exitPractice(){
  if(P.hwWriter){try{P.hwWriter.cancelAnimation();P.hwWriter.cancelQuiz();}catch(e){}}
  P.hwWriter=null;
  document.getElementById('prac-sel').style.display='flex';
  document.getElementById('prac-quiz').style.display='none';
}
function speakPrac(){
  const item=P.queue[P.idx];if(!item||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(item.ch);u.lang='zh-CN';u.rate=.8;window.speechSynthesis.speak(u);
}

function buildWccTable(hanzi,existing){

function setWccMode(i,m){
  const rows=document.getElementById('wcc-table').querySelectorAll('.wcc-row');if(!rows[i])return;
  rows[i].querySelectorAll('.wcc-tab').forEach(t=>t.classList.remove('active'));

function getWccConfig(){

    const mode=active&&active.textContent.includes('红蓝')?'complex':'simple';

function saveEntry(){

  const name=document.getElementById('mg-name').value.trim();if(!name){alert('请输入分组名称');return;}
  if(ms.editGroupId){const g=store.groups.find(x=>x.id===ms.editGroupId);if(g)g.name=name;}
  else store.groups.push({id:'g'+Date.now(),name,entries:[]});
  saveStore();closeModal('modal-group');renderManage();renderHome();
}
function deleteGroup(){
  if(!confirm('确定删除整个分组？'))return;
  store.groups=store.groups.filter(x=>x.id!==ms.editGroupId);
  saveStore();closeModal('modal-group');renderManage();renderHome();
}

// ══ UTILS ══
function autoPinyin(s){if(window.pinyinPro){try{return pinyinPro.pinyin(s,{toneType:'symbol',type:'string'});}catch(e){}}return '';}

renderHome();
</script>
