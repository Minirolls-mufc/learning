<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>汉字写字助手</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/hanzi-writer/3.5.0/hanzi-writer.min.js"></script>
    <style>
        :root {
            --bg-color: #FFFDF5;
            --btn-blue: #4A90E2;
            --btn-green: #52C41A;
        }
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .header {
            width: 100%; padding: 15px; background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex; justify-content: center; gap: 10px; z-index: 100;
            box-sizing: border-box;
        }
        input { padding: 12px; font-size: 18px; border: 2px solid #ddd; border-radius: 8px; width: 140px; }
        button { padding: 10px 20px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        
        #main-display {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; width: 100%;
        }
        
        #hanzi-box { 
            background: white; 
            border: 4px solid #F0E68C; 
            border-radius: 20px; 
            width: 320px; height: 320px; 
            position: relative;
            overflow: hidden;
        }

        #loading-overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: white; border-radius: 16px;
            color: #999; font-size: 18px;
            z-index: 10;
            transition: opacity 0.3s;
        }

        .footer { padding-bottom: 60px; display: flex; gap: 20px; margin-top: 20px; }
        .btn-draw { background-color: var(--btn-green); width: 150px; height: 70px; font-size: 22px; box-shadow: 0 4px #388E3C; }
        .btn-draw:active { transform: translateY(4px); box-shadow: none; }
        .btn-next { background-color: var(--btn-blue); height: 70px; }
        
        .info { margin-top: 15px; color: #666; font-size: 18px; font-weight: bold; height: 30px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="input-words" value="人妈地" placeholder="输入汉字">
    <button style="background: var(--btn-blue)" onclick="start()">开始学习</button>
</div>

<div id="main-display">
    <div id="hanzi-box">
        <div id="loading-overlay">等待输入...</div>
        <div id="writer-target"></div>
    </div>
    <div class="info" id="status-info"></div>
</div>

<div class="footer">
    <button class="btn-draw" onclick="drawStroke()">写一笔</button>
    <button class="btn-next" onclick="nextWord()">下一个字</button>
</div>

<script>
    let words = [];
    let wordIdx = 0;
    let strokeIdx = 0;
    let writer = null;
    let totalStrokes = 0;
    let isReady = false;

    const colors = ['#E74C3C', '#3498DB', '#27AE60', '#E67E22', '#8E44AD', '#333333'];

    function setOverlay(text) {
        const el = document.getElementById('loading-overlay');
        if (text) {
            el.innerText = text;
            el.style.opacity = '1';
            el.style.pointerEvents = 'auto';
        } else {
            el.style.opacity = '0';
            el.style.pointerEvents = 'none';
        }
    }

    function initWriter(char) {
        if (!char) return;

        if (typeof HanziWriter === 'undefined') {
            document.getElementById('status-info').innerText = "核心库加载失败，请刷新页面";
            return;
        }

        isReady = false;
        strokeIdx = 0;
        totalStrokes = 0;
        writer = null;

        // 清空旧的 SVG，重建目标节点避免 HanziWriter 内部状态污染
        const box = document.getElementById('hanzi-box');
        const oldTarget = document.getElementById('writer-target');
        if (oldTarget) oldTarget.remove();
        const newTarget = document.createElement('div');
        newTarget.id = 'writer-target';
        box.appendChild(newTarget);

        setOverlay(`「${char}」加载中...`);
        document.getElementById('status-info').innerText = '';

        writer = HanziWriter.create('writer-target', char, {
            width: 300,
            height: 300,
            padding: 20,
            showOutline: true,
            strokeAnimationSpeed: 2,
            delayBetweenStrokes: 0,
            // 多源竞速 + 超时容错
            charDataLoader: function(char, onLoad, onError) {
                const urls = [
                    `https://unpkg.com/hanzi-writer-data@2.0/${char}.json`,
                    `https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${char}.json`,
                ];
                let tried = 0;
                let done = false;
                function tryNext() {
                    if (tried >= urls.length) {
                        if (!done) { done = true; onError('所有数据源均失败'); }
                        return;
                    }
                    const url = urls[tried++];
                    const timer = setTimeout(tryNext, 6000); // 6秒超时自动切换下一个源
                    fetch(url)
                        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
                        .then(data => {
                            clearTimeout(timer);
                            if (!done) { done = true; onLoad(data); }
                        })
                        .catch(() => { clearTimeout(timer); tryNext(); });
                }
                tryNext();
            },
            onLoadCharDataSuccess: function(data) {
                totalStrokes = data.strokes.length;
                isReady = true;
                setOverlay(null);
                document.getElementById('status-info').innerText = `「${char}」共 ${totalStrokes} 笔，点击"写一笔"开始`;
            },
            onLoadCharDataError: function(reason) {
                setOverlay(`「${char}」加载失败`);
                document.getElementById('status-info').innerText = "请检查网络，或换一个字试试";
                console.error('加载失败:', reason);
            }
        });
    }

    function drawStroke() {
        if (!writer || !isReady || strokeIdx >= totalStrokes) return;

        const group = totalStrokes <= 4
            ? strokeIdx
            : Math.floor(strokeIdx / 3);
        const color = colors[group % colors.length];

        writer.animateStroke(strokeIdx, { strokeColor: color });
        strokeIdx++;
        document.getElementById('status-info').innerText = `第 ${strokeIdx} / ${totalStrokes} 笔`;

        if (strokeIdx >= totalStrokes) {
            setTimeout(() => {
                document.getElementById('status-info').innerText = `✅ 全部 ${totalStrokes} 笔写完啦！`;
            }, 600);
        }
    }

    function start() {
        const input = document.getElementById('input-words').value;
        words = input.split('').filter(s => s.trim());
        wordIdx = 0;
        if (words.length > 0) {
            initWriter(words[wordIdx]);
        } else {
            setOverlay('请输入汉字');
        }
    }

    function nextWord() {
        if (words.length === 0) return;
        wordIdx = (wordIdx + 1) % words.length;
        initWriter(words[wordIdx]);
    }

    window.onload = start;
</script>
</body>
</html>
