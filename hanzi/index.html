<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字小课堂</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.24.2/dist/index.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1C1917;--ink2:#44403C;--muted:#A8A29E;--border:#E7E5E4;
  --bg:#FAFAF8;--paper:#FFFFFF;
  --red:#EF4444;--orange:#F97316;--yellow:#EAB308;
  --green:#22C55E;--teal:#14B8A6;--blue:#3B82F6;--violet:#8B5CF6;
  --accent:#F59E0B;--stamp:#DC2626;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column}

/* ── SPA ── */
.page{display:none;flex-direction:column;height:100%;overflow:hidden;animation:fadeUp .25s ease both}
.page.active{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── shared topbar ── */
.topbar{flex-shrink:0;height:52px;display:flex;align-items:center;padding:0 14px;gap:10px;
        background:var(--paper);border-bottom:1.5px solid var(--border);z-index:10}
.topbar-title{font-family:'ZCOOL XiaoWei',cursive;font-size:1.05rem;font-weight:600;flex:1;text-align:center;letter-spacing:3px}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--border);
          background:var(--paper);display:flex;align-items:center;justify-content:center;
          cursor:pointer;font-size:.9rem;transition:all .15s;flex-shrink:0}
.icon-btn:hover{background:var(--bg);border-color:var(--ink2)}

/* ── buttons ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;
     border-radius:10px;border:1.5px solid transparent;font-family:inherit;
     font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s;
     white-space:nowrap;line-height:1}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn-primary:hover{background:var(--ink2)}
.btn-ghost{background:transparent;color:var(--ink2);border-color:var(--border)}
.btn-ghost:hover{background:var(--bg);border-color:var(--ink2)}
.btn-danger{background:#FEF2F2;color:var(--red);border-color:#FECACA}
.btn-danger:hover{background:#FEE2E2}
.btn-sm{padding:6px 13px;font-size:.78rem;border-radius:8px}
.btn-icon{padding:7px;border-radius:8px}
.btn.toggled{background:var(--ink)!important;color:#fff!important;border-color:var(--ink)!important}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ════════════════════════
   HOME
════════════════════════ */
#page-home{background:var(--bg)}
.home-hero{flex-shrink:0;background:var(--ink);color:#fff;padding:30px 22px 34px;position:relative;overflow:hidden}
.home-hero::before{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04)}
.hero-eyebrow{font-size:.68rem;letter-spacing:4px;color:rgba(255,255,255,.4);margin-bottom:7px}
.hero-title{font-family:'Ma Shan Zheng',cursive;font-size:2.7rem;line-height:1;letter-spacing:8px;margin-bottom:5px}
.hero-title span{color:var(--accent)}
.hero-sub{font-size:.8rem;color:rgba(255,255,255,.5);letter-spacing:1px}
.home-body{flex:1;overflow-y:auto;padding:16px 16px 28px}
.sec-label{font-size:.67rem;letter-spacing:3px;color:var(--muted);margin-bottom:9px;font-weight:700;text-transform:uppercase}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.nav-card{background:var(--paper);border:1.5px solid var(--border);border-radius:14px;
          padding:18px 14px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;gap:8px;
          box-shadow:0 1px 3px rgba(0,0,0,.05);position:relative;overflow:hidden}
.nav-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.nav-card:active{transform:scale(.97)}
.nav-icon{font-size:1.6rem;line-height:1}
.nav-name{font-weight:900;font-size:.9rem}
.nav-desc{font-size:.72rem;color:var(--muted);line-height:1.4}
.nav-card.hl{background:var(--ink);border-color:var(--ink)}
.nav-card.hl .nav-name{color:#fff}
.nav-card.hl .nav-desc{color:rgba(255,255,255,.5)}
.nav-badge{position:absolute;top:10px;right:10px;background:var(--accent);color:var(--ink);
           font-size:.58rem;font-weight:900;padding:2px 6px;border-radius:99px}
.group-chips{display:flex;flex-wrap:wrap;gap:8px}
.g-chip{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--paper);
        border:1.5px solid var(--border);border-radius:9px;cursor:pointer;transition:all .15s;
        font-size:.8rem;font-weight:700}
.g-chip:hover{border-color:var(--ink)}
.g-chip-dot{width:8px;height:8px;border-radius:50%}
.g-chip-n{font-size:.67rem;color:var(--muted);font-weight:400}

/* ════════════════════════
   GROUP PICKER MODAL (shown when entering study)
════════════════════════ */
#modal-group-pick{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
                  display:none;align-items:center;justify-content:center;padding:20px}
#modal-group-pick.open{display:flex}
.gpick-box{background:var(--paper);border-radius:20px;width:100%;max-width:360px;
           box-shadow:0 20px 60px rgba(0,0,0,.2);animation:slideUp .22s ease;overflow:hidden}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.gpick-header{padding:18px 18px 12px;border-bottom:1.5px solid var(--border)}
.gpick-title{font-family:'ZCOOL XiaoWei',cursive;font-size:1rem;letter-spacing:2px}
.gpick-sub{font-size:.75rem;color:var(--muted);margin-top:3px}
.gpick-list{max-height:320px;overflow-y:auto}
.gpick-item{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;
            border-bottom:1px solid var(--border);transition:background .12s}
.gpick-item:last-child{border-bottom:none}
.gpick-item:hover{background:var(--bg)}
.gpick-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.gpick-name{flex:1;font-weight:700;font-size:.9rem}
.gpick-count{font-size:.75rem;color:var(--muted)}
.gpick-arrow{color:var(--muted);font-size:.8rem}
.gpick-empty{padding:24px;text-align:center;color:var(--muted);font-size:.85rem}

/* ════════════════════════
   STUDY PAGE
════════════════════════ */
#page-study{background:var(--bg)}

/* full-height centered layout */
.study-body{
  flex:1;overflow:hidden;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:16px;gap:16px;
  position:relative;
}

/* Navigation arrows: prev/next entry */
.entry-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  z-index:5;
}
.entry-nav.left{left:8px}
.entry-nav.right{right:8px}
.nav-arrow{width:36px;height:52px;border-radius:10px;border:1.5px solid var(--border);
           background:var(--paper);display:flex;align-items:center;justify-content:center;
           cursor:pointer;font-size:1.1rem;transition:all .15s;color:var(--ink2)}
.nav-arrow:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
.nav-arrow:disabled{opacity:.25;pointer-events:none}
.nav-counter{font-size:.68rem;color:var(--muted);font-weight:700;text-align:center}

/* center content column */
.study-center{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  max-width:680px;width:100%;
}

/* char row: one or more tian zi ge boxes */
.tzg-row{display:flex;gap:14px;align-items:flex-end;justify-content:center;flex-wrap:wrap}

/* single unit: box + pinyin below */
.tzg-unit{display:flex;flex-direction:column;align-items:center;gap:6px}

/* pinyin label — sits below the box */
.tzg-pinyin{
  font-size:1.1rem;color:var(--stamp);font-weight:900;
  letter-spacing:3px;font-family:'Noto Sans SC',sans-serif;
  min-height:1.4em;text-align:center;
}
/* Bigger for single char */
.tzg-unit.single .tzg-pinyin{font-size:1.6rem;letter-spacing:5px}

/* the box */
.tzg-box{
  position:relative;background:#fff;
  border:2px solid #2a2520;border-radius:5px;
  overflow:hidden;flex-shrink:0;
}
/* cross dashed center lines */
.tzg-box::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(to right,transparent calc(50% - .7px),#c0b8a8 calc(50% - .7px),#c0b8a8 calc(50% + .7px),transparent calc(50% + .7px)),
    linear-gradient(to bottom,transparent calc(50% - .7px),#c0b8a8 calc(50% - .7px),#c0b8a8 calc(50% + .7px),transparent calc(50% + .7px));
  background-size:100% 100%;
}
.tzg-diag{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
.tzg-char-svg{position:absolute;inset:0;width:100%;height:100%;z-index:1}
.tzg-quiz-div{position:absolute;inset:0;z-index:2;display:none}
/* cover = blank white field (no question mark) */
.tzg-cover{position:absolute;inset:0;z-index:3;background:#fff;display:none}
.tzg-cover.show{display:block}

/* Size system: auto-fit 1–4 chars */
.tzg-box.s1{width:240px;height:240px}
.tzg-box.s2{width:185px;height:185px}
.tzg-box.s34{width:148px;height:148px}

/* per-char mini controls */
.tzg-mini-ctrl{display:flex;gap:5px;justify-content:center}

/* status line per char */
.tzg-status{font-size:.72rem;color:var(--muted);text-align:center;min-height:1em}
.tzg-status.ok{color:var(--green)}
.tzg-status.err{color:var(--red)}

/* bottom action bar */
.study-actions{
  flex-shrink:0;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  padding:10px 14px 12px;border-top:1.5px solid var(--border);
  background:var(--paper);
}

/* global quiz msg */
.study-quiz-msg{font-size:.85rem;font-weight:700;text-align:center;
                min-height:1.1em;color:var(--ink);letter-spacing:.3px}

/* entry label (1/5 · 山水) */
.entry-label{font-size:.78rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-align:center}

/* ════════════════════════
   MANAGE PAGE
════════════════════════ */
#page-manage{background:var(--bg)}
.manage-body{flex:1;overflow-y:auto;padding:12px 12px 28px}
.wm-group{background:var(--paper);border:1.5px solid var(--border);border-radius:14px;
          margin-bottom:11px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.wm-gh{display:flex;align-items:center;gap:8px;padding:10px 13px;border-bottom:1.5px solid var(--border);background:var(--bg)}
.wm-gdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.wm-gname{flex:1;font-weight:900;font-size:.88rem}
.wm-gcnt{font-size:.7rem;color:var(--muted)}
.wm-ga{display:flex;gap:5px}
.wm-entries{padding:9px 12px;display:flex;flex-wrap:wrap;gap:7px}
.wm-entry{display:flex;align-items:center;gap:5px;background:var(--bg);border:1.5px solid var(--border);
          border-radius:8px;padding:5px 8px;cursor:pointer;transition:all .15s}
.wm-entry:hover{border-color:var(--ink);background:var(--paper)}
.wm-ehanzi{font-family:'Ma Shan Zheng',cursive;font-size:1.25rem;line-height:1}
.wm-epy{font-size:.63rem;color:var(--muted)}
.wm-etag{font-size:.57rem;padding:1px 4px;border-radius:3px;font-weight:700}
.wm-etag.simple{background:#DCFCE7;color:#166534}
.wm-etag.complex{background:#EDE9FE;color:#5B21B6}
.wm-etag.word{background:#FEF9C3;color:#854D0E}
.wm-add{display:flex;align-items:center;justify-content:center;width:44px;height:44px;
        border:1.5px dashed var(--border);border-radius:8px;cursor:pointer;
        font-size:1.1rem;color:var(--muted);transition:all .15s;background:transparent}
.wm-add:hover{border-color:var(--ink);color:var(--ink)}

/* ════════════════════════
   PLACEHOLDER
════════════════════════ */
.placeholder-body{flex:1;display:flex;flex-direction:column;align-items:center;
                  justify-content:center;gap:12px;color:var(--muted);padding:40px;text-align:center}
.ph-icon{font-size:3.5rem;opacity:.35}
.ph-text{font-size:.92rem;font-weight:700;color:var(--ink2)}
.ph-sub{font-size:.78rem;line-height:1.7}

/* ════════════════════════
   MODAL (entry / group)
════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:100;
               display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--paper);border-radius:18px;width:100%;max-width:430px;
       max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);
       animation:slideUp .22s ease}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:15px 17px 0}
.mtitle{font-weight:900;font-size:.93rem}
.mclose{width:29px;height:29px;border-radius:7px;border:1.5px solid var(--border);
        background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem}
.mclose:hover{background:var(--border)}
.mbody{padding:13px 17px 15px;display:flex;flex-direction:column;gap:11px}
.frow{display:flex;flex-direction:column;gap:4px}
.flabel{font-size:.74rem;font-weight:700;color:var(--ink2)}
.finput{border:1.5px solid var(--border);border-radius:9px;padding:9px 11px;
        font-size:.88rem;font-family:inherit;background:var(--bg);outline:none;
        transition:border-color .18s;width:100%}
.finput:focus{border-color:var(--blue);background:var(--paper)}
.fhint{font-size:.68rem;color:var(--muted);line-height:1.5}
.ftabs{display:flex;gap:6px}
.ftab{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);
      background:var(--bg);font-family:inherit;font-size:.76rem;font-weight:700;
      cursor:pointer;transition:all .15s;text-align:center}
.ftab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.mfooter{padding:0 17px 15px;display:flex;gap:7px;justify-content:flex-end}

/* word char config table */
.word-char-cfg{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.wcc-row{display:flex;align-items:center;gap:8px;padding:7px 10px;
         background:var(--bg);border:1.5px solid var(--border);border-radius:9px}
.wcc-ch{font-family:'Ma Shan Zheng',cursive;font-size:1.3rem;width:28px;text-align:center;flex-shrink:0}
.wcc-tabs{display:flex;gap:4px;flex:1}
.wcc-tab{flex:1;padding:5px 4px;border-radius:6px;border:1.5px solid var(--border);
         background:var(--paper);font-family:inherit;font-size:.72rem;font-weight:700;
         cursor:pointer;transition:all .12s;text-align:center}
.wcc-tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.wcc-range{flex:1;border:1.5px solid var(--border);border-radius:6px;padding:5px 7px;
           font-size:.72rem;font-family:inherit;outline:none;background:#fff;display:none}
.wcc-range.show{display:block}

/* color picker */
.color-picker{display:flex;gap:7px;flex-wrap:wrap}
.cp-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s}
.cp-dot.selected{border-color:var(--ink);transform:scale(1.2)}
</style>
</head>
<body>

<!-- ═══════ HOME ═══════ -->
<div id="page-home" class="page active">
  <div class="home-hero">
    <div class="hero-eyebrow">小学汉字学习</div>
    <div class="hero-title">汉字<span>课堂</span></div>
    <div class="hero-sub">一笔一划，认识每个汉字</div>
  </div>
  <div class="home-body">
    <div class="sec-label">主菜单</div>
    <div class="nav-grid">
      <div class="nav-card hl" onclick="openGroupPicker()">
        <div class="nav-icon">📖</div><div class="nav-name">学 习</div>
        <div class="nav-desc">笔顺动画，彩色笔划</div><div class="nav-badge">NEW</div>
      </div>
      <div class="nav-card" onclick="showPage('practice')">
        <div class="nav-icon">✏️</div><div class="nav-name">练 习</div><div class="nav-desc">跟着描字，检验笔顺</div>
      </div>
      <div class="nav-card" onclick="showPage('achieve')">
        <div class="nav-icon">🏆</div><div class="nav-name">成 就</div><div class="nav-desc">学习记录，解锁徽章</div>
      </div>
      <div class="nav-card" onclick="showPage('manage');renderManage()">
        <div class="nav-icon">📚</div><div class="nav-name">字词管理</div><div class="nav-desc">添加分组，管理字词</div>
      </div>
    </div>
    <div class="sec-label">分组快速开始</div>
    <div class="group-chips" id="home-chips"></div>
  </div>
</div>

<!-- ═══════ GROUP PICKER MODAL ═══════ -->
<div id="modal-group-pick">
  <div class="gpick-box">
    <div class="gpick-header">
      <div class="gpick-title">选择学习分组</div>
      <div class="gpick-sub">选好之后进入学习页面</div>
    </div>
    <div class="gpick-list" id="gpick-list"></div>
  </div>
</div>

<!-- ═══════ STUDY PAGE ═══════ -->
<div id="page-study" class="page">
  <!-- topbar: just home + title + speak -->
  <div class="topbar">
    <button class="icon-btn" onclick="showPage('home');renderHome()" title="返回首页">🏠</button>
    <div class="topbar-title" id="study-group-name">学 习</div>
    <button class="icon-btn" onclick="speakCurrent()" title="朗读">🔊</button>
  </div>

  <!-- centered body -->
  <div class="study-body">
    <!-- Left nav arrow -->
    <div class="entry-nav left">
      <button class="nav-arrow" id="btn-prev-entry" onclick="goPrevEntry()">‹</button>
    </div>

    <!-- Center content -->
    <div class="study-center">
      <div class="entry-label" id="entry-label">1 / 1</div>
      <div class="tzg-row" id="tzg-row"></div>
      <div class="study-quiz-msg" id="study-quiz-msg"></div>
    </div>

    <!-- Right nav arrow -->
    <div class="entry-nav right">
      <button class="nav-arrow" id="btn-next-entry" onclick="goNextEntry()">›</button>
    </div>
  </div>

  <!-- action bar -->
  <div class="study-actions">
    <button class="btn btn-ghost btn-sm" id="btn-follow" onclick="toggleFollow()">🖊 跟写</button>
    <button class="btn btn-ghost btn-sm" id="btn-cover"  onclick="toggleCover()">👁 遮盖</button>
    <button class="btn btn-ghost btn-sm" onclick="resetAll()">↺ 重置</button>
  </div>
</div>

<!-- ═══════ PRACTICE STUB ═══════ -->
<div id="page-practice" class="page">
  <div class="topbar"><button class="icon-btn" onclick="showPage('home');renderHome()">🏠</button><div class="topbar-title">练 习</div></div>
  <div class="placeholder-body"><div class="ph-icon">✏️</div><div class="ph-text">练习模块即将上线</div><div class="ph-sub">笔顺练习、跟写检测<br>敬请期待</div></div>
</div>

<!-- ═══════ ACHIEVE STUB ═══════ -->
<div id="page-achieve" class="page">
  <div class="topbar"><button class="icon-btn" onclick="showPage('home');renderHome()">🏠</button><div class="topbar-title">成 就</div></div>
  <div class="placeholder-body"><div class="ph-icon">🏆</div><div class="ph-text">成就系统即将上线</div><div class="ph-sub">完成学习任务，解锁专属徽章<br>记录你的每一步成长</div></div>
</div>

<!-- ═══════ MANAGE PAGE ═══════ -->
<div id="page-manage" class="page">
  <div class="topbar">
    <button class="icon-btn" onclick="showPage('home');renderHome()">🏠</button>
    <div class="topbar-title">字词管理</div>
    <button class="btn btn-primary btn-sm" onclick="openAddGroup()">＋ 分组</button>
  </div>
  <div class="manage-body" id="manage-body"></div>
</div>

<!-- ═══════ MODAL: add/edit entry ═══════ -->
<div class="modal-overlay" id="modal-entry">
  <div class="modal">
    <div class="mhdr">
      <div class="mtitle" id="mentitle">添加字/词</div>
      <button class="mclose" onclick="closeModal('modal-entry')">✕</button>
    </div>
    <div class="mbody">
      <div class="frow">
        <div class="flabel">类型</div>
        <div class="ftabs">
          <button class="ftab active" id="etype-char" onclick="setEntryType('char')">单字</button>
          <button class="ftab" id="etype-word" onclick="setEntryType('word')">词语</button>
        </div>
      </div>
      <div class="frow">
        <div class="flabel" id="ehanzi-lbl">汉字（单个）</div>
        <input class="finput" id="m-hanzi" placeholder="如：爱" maxlength="1" oninput="onHanziInput()">
      </div>
      <div class="frow">
        <div class="flabel">拼音（留空自动生成）</div>
        <input class="finput" id="m-pinyin" placeholder="如：ài">
      </div>

      <!-- SINGLE CHAR: simple/complex + red range -->
      <div id="char-cfg">
        <div class="frow">
          <div class="flabel">颜色模式</div>
          <div class="ftabs">
            <button class="ftab active" id="fmbtn-s" onclick="setFormMode('simple')">🎨 简单（七彩循环）</button>
            <button class="ftab" id="fmbtn-c" onclick="setFormMode('complex')">🧩 复杂（红蓝结构）</button>
          </div>
        </div>
        <div class="frow" id="red-range-row" style="display:none">
          <div class="flabel">🔴 红色笔画范围</div>
          <input class="finput" id="m-red" placeholder="如 1-4 或 1,2,3">
          <div class="fhint">这些笔画显示红色，其余蓝色</div>
        </div>
      </div>

      <!-- WORD: per-char config table -->
      <div id="word-cfg" style="display:none">
        <div class="frow">
          <div class="flabel">每个字的颜色设置</div>
          <div class="word-char-cfg" id="wcc-table"></div>
        </div>
      </div>
    </div>
    <div class="mfooter">
      <button class="btn btn-danger btn-sm" id="m-del" onclick="deleteEntry()" style="display:none;margin-right:auto">🗑 删除</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-entry')">取消</button>
      <button class="btn btn-primary btn-sm" onclick="saveEntry()">保存</button>
    </div>
  </div>
</div>

<!-- ═══════ MODAL: group ═══════ -->
<div class="modal-overlay" id="modal-group">
  <div class="modal">
    <div class="mhdr">
      <div class="mtitle" id="mgtitle">新建分组</div>
      <button class="mclose" onclick="closeModal('modal-group')">✕</button>
    </div>
    <div class="mbody">
      <div class="frow"><div class="flabel">分组名称</div><input class="finput" id="mg-name" placeholder="如：一年级上册第一单元"></div>

      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-group')">取消</button>
      <button class="btn btn-primary btn-sm" onclick="saveGroup()">保存</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
const GRP_COLORS=['#EF4444','#F97316','#EAB308','#22C55E','#14B8A6','#3B82F6','#8B5CF6','#EC4899'];
const STROKE_PAL=['#EF4444','#F97316','#EAB308','#22C55E','#14B8A6','#3B82F6','#8B5CF6'];
const HW_TF='scale(1,-1) translate(0,-900)';
const OUTLINE='#D4CFC6';

let store={
  groups:[
    {id:'g1',name:'一年级·基础字',color:'#3B82F6',entries:[
      {type:'char',hanzi:'山',pinyin:'shān',mode:'simple',redRange:''},
      {type:'char',hanzi:'水',pinyin:'shuǐ',mode:'simple',redRange:''},
      {type:'char',hanzi:'火',pinyin:'huǒ',mode:'simple',redRange:''},
      {type:'word',hanzi:'大山',pinyin:'dà shān',
       charCfg:[{mode:'simple',redRange:''},{mode:'simple',redRange:''}]},
      {type:'word',hanzi:'山水',pinyin:'shān shuǐ',
       charCfg:[{mode:'simple',redRange:''},{mode:'simple',redRange:''}]},
    ]},
    {id:'g2',name:'认识结构',color:'#8B5CF6',entries:[
      {type:'char',hanzi:'明',pinyin:'míng',mode:'complex',redRange:'1-4'},
      {type:'char',hanzi:'好',pinyin:'hǎo', mode:'complex',redRange:'1-3'},
      {type:'word',hanzi:'明天',pinyin:'míng tiān',
       charCfg:[{mode:'complex',redRange:'1-4'},{mode:'simple',redRange:''}]},
    ]}
  ]
};
function saveStore(){try{localStorage.setItem('hxkt_v3',JSON.stringify(store));}catch(e){}}
function loadStore(){try{const d=localStorage.getItem('hxkt_v3');if(d)store=JSON.parse(d);}catch(e){}}
loadStore();

// ══════════════════════════════════════
// NAV
// ══════════════════════════════════════
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
});

// ══════════════════════════════════════
// HOME
// ══════════════════════════════════════
function renderHome(){
  const el=document.getElementById('home-chips');
  el.innerHTML='';
  store.groups.forEach(g=>{
    const c=document.createElement('div');c.className='g-chip';c.onclick=()=>{openGroupPicker(g.id);};
    c.innerHTML=`<span class="g-chip-dot" style="background:${g.color}"></span>${g.name}<span class="g-chip-n">${g.entries.length}条</span>`;
    el.appendChild(c);
  });
}

// ══════════════════════════════════════
// GROUP PICKER
// ══════════════════════════════════════
function openGroupPicker(preselect){
  const list=document.getElementById('gpick-list');
  list.innerHTML='';
  if(!store.groups.length){
    list.innerHTML='<div class="gpick-empty">暂无分组，请先在「字词管理」新建分组</div>';
  }
  store.groups.forEach(g=>{
    const item=document.createElement('div');item.className='gpick-item';
    item.onclick=()=>startStudy(g.id);
    item.innerHTML=`<span class="gpick-dot" style="background:${g.color}"></span>
      <span class="gpick-name">${g.name}</span>
      <span class="gpick-count">${g.entries.length} 条</span>
      <span class="gpick-arrow">›</span>`;
    list.appendChild(item);
  });
  document.getElementById('modal-group-pick').classList.add('open');
  // close on backdrop
  const overlay=document.getElementById('modal-group-pick');
  overlay.onclick=e=>{ if(e.target===overlay) overlay.classList.remove('open'); };
}
function startStudy(gid){
  document.getElementById('modal-group-pick').classList.remove('open');
  const g=store.groups.find(x=>x.id===gid);
  if(!g) return;
  S.groupId=gid;
  S.entryIdx=0;
  document.getElementById('study-group-name').textContent=g.name;
  showPage('study');
  loadEntry();
}

// ══════════════════════════════════════
// STUDY STATE
// ══════════════════════════════════════
let S={
  groupId:null,
  entryIdx:0,
  chars:[],       // [{ch,charData,strokeColors,stepIdx,mode,redRange}]
  followMode:false,
  coverMode:false,
  followCharIdx:0,
  quizWriter:null,
};

function currentGroup(){return store.groups.find(x=>x.id===S.groupId);}
function currentEntry(){const g=currentGroup();return g?g.entries[S.entryIdx]:null;}

function goPrevEntry(){
  if(S.entryIdx<=0) return;
  S.entryIdx--;
  loadEntry();
}
function goNextEntry(){
  const g=currentGroup();
  if(!g||S.entryIdx>=g.entries.length-1) return;
  S.entryIdx++;
  loadEntry();
}
function updateNavBtns(){
  const g=currentGroup();
  const n=g?g.entries.length:0;
  document.getElementById('btn-prev-entry').disabled=S.entryIdx<=0;
  document.getElementById('btn-next-entry').disabled=S.entryIdx>=n-1;
  document.getElementById('entry-label').textContent=`${S.entryIdx+1} / ${n}`;
}

// ══════════════════════════════════════
// LOAD ENTRY — builds the stage
// ══════════════════════════════════════
function loadEntry(){
  exitAllQuiz();
  S.followMode=false; S.coverMode=false;
  document.getElementById('btn-follow').classList.remove('toggled');
  document.getElementById('btn-follow').textContent='🖊 跟写';
  document.getElementById('btn-cover').classList.remove('toggled');
  document.getElementById('btn-cover').textContent='👁 遮盖';
  document.getElementById('study-quiz-msg').textContent='';
  updateNavBtns();

  const entry=currentEntry();
  if(!entry){ document.getElementById('tzg-row').innerHTML='<div style="color:var(--muted);padding:20px">暂无内容</div>'; return; }

  const chars=[...entry.hanzi];
  const n=chars.length;
  S.chars=[];

  // Build charCfg: for single char use entry.mode/redRange; for word use entry.charCfg[]
  const charCfgs = entry.type==='word'
    ? (entry.charCfg||chars.map(()=>({mode:'simple',redRange:''})))
    : [{mode:entry.mode||'simple',redRange:entry.redRange||''}];

  const row=document.getElementById('tzg-row');
  row.innerHTML='';

  const sz=n===1?'s1':n===2?'s2':'s34';
  const boxPx=n===1?240:n===2?185:148;

  chars.forEach((ch,ci)=>{
    const cfg=charCfgs[ci]||{mode:'simple',redRange:''};
    S.chars.push({ch,charData:null,strokeColors:[],stepIdx:0,mode:cfg.mode,redRange:cfg.redRange||''});

    const unit=document.createElement('div');
    unit.className='tzg-unit'+(n===1?' single':'');

    // Box
    const box=document.createElement('div');
    box.className=`tzg-box ${sz}`;
    box.id=`box-${ci}`;

    // diagonal SVG
    const dsvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    dsvg.setAttribute('viewBox',`0 0 ${boxPx} ${boxPx}`);
    dsvg.style.cssText='position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0';
    const mkL=(x1,y1,x2,y2)=>{
      const l=document.createElementNS('http://www.w3.org/2000/svg','line');
      [['x1',x1],['y1',y1],['x2',x2],['y2',y2]].forEach(([k,v])=>l.setAttribute(k,v));
      l.setAttribute('stroke','#d0c8b8');l.setAttribute('stroke-width','0.8');
      l.setAttribute('stroke-dasharray','4,4');return l;
    };
    dsvg.appendChild(mkL(0,0,boxPx,boxPx));
    dsvg.appendChild(mkL(boxPx,0,0,boxPx));
    box.appendChild(dsvg);

    // char SVG
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 1024 1024');
    svg.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:1';
    svg.id=`svg-${ci}`;
    box.appendChild(svg);

    // quiz div
    const qd=document.createElement('div');
    qd.style.cssText='position:absolute;inset:0;z-index:2;display:none';
    qd.id=`qd-${ci}`;
    box.appendChild(qd);

    // cover (blank, no question mark)
    const cv=document.createElement('div');
    cv.className='tzg-cover';
    cv.id=`cv-${ci}`;
    box.appendChild(cv);

    unit.appendChild(box);

    // mini controls
    const mc=document.createElement('div');
    mc.className='tzg-mini-ctrl';
    mc.innerHTML=`
      <button class="btn btn-ghost btn-sm btn-icon" onclick="charPrev(${ci})" title="上一笔">◀</button>
      <button class="btn btn-primary btn-sm btn-icon" onclick="charNext(${ci})" title="下一笔">▶</button>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="charReset(${ci})" title="重置">↺</button>`;
    unit.appendChild(mc);

    // status
    const st=document.createElement('div');
    st.className='tzg-status';st.id=`st-${ci}`;st.textContent='加载…';
    unit.appendChild(st);

    // pinyin below
    const pyEl=document.createElement('div');
    pyEl.className='tzg-pinyin';
    // For word: split pinyin by spaces; for single char: whole pinyin
    const pinyinParts=(entry.pinyin||autoPinyin(entry.hanzi)).split(' ');
    pyEl.textContent=pinyinParts[ci]||autoPinyin(ch);
    unit.appendChild(pyEl);

    row.appendChild(unit);
    fetchCharData(ch,ci);
  });
}

function fetchCharData(ch,ci){
  fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${encodeURIComponent(ch)}.json`)
    .then(r=>{if(!r.ok)throw new Error();return r.json();})
    .then(data=>{
      const c=S.chars[ci];
      c.charData=data;
      const n=data.strokes.length;
      c.strokeColors=buildColors(n,c.mode,c.redRange);
      c.stepIdx=n;
      renderSvg(ci,n);
      setSt(ci,`${n} 笔`,'ok');
    })
    .catch(()=>setSt(ci,'⚠️ 无数据','err'));
}

function buildColors(n,mode,redRange){
  if(mode==='simple') return Array.from({length:n},(_,i)=>STROKE_PAL[i%STROKE_PAL.length]);
  const rs=parseRange(redRange,n);
  return Array.from({length:n},(_,i)=>rs.has(i+1)?'#EF4444':'#3B82F6');
}
function parseRange(str,n){
  const s=new Set();
  if(!str) return s;
  str.split(',').forEach(p=>{
    p=p.trim();
    if(p.includes('-')){const[a,b]=p.split('-').map(Number);for(let i=a;i<=b&&i<=n;i++)s.add(i);}
    else{const v=parseInt(p);if(!isNaN(v)&&v>=1&&v<=n)s.add(v);}
  });
  return s;
}

function renderSvg(ci,upTo,animIdx){
  const c=S.chars[ci];if(!c||!c.charData)return;
  const svg=document.getElementById(`svg-${ci}`);if(!svg)return;
  svg.innerHTML='';
  c.charData.strokes.forEach(d=>svg.appendChild(mkP(d,OUTLINE)));
  for(let i=0;i<upTo;i++){
    const p=mkP(c.charData.strokes[i],c.strokeColors[i]);
    if(i===animIdx){
      p.style.opacity='0';p.style.transition='opacity .35s ease';
      svg.appendChild(p);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{p.style.opacity='1';}));
    } else svg.appendChild(p);
  }
}
function mkP(d,color){
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',d);p.setAttribute('fill',color);p.setAttribute('transform',HW_TF);
  return p;
}
function setSt(ci,msg,cls){
  const el=document.getElementById(`st-${ci}`);if(!el)return;
  el.textContent=msg;el.className='tzg-status'+(cls?' '+cls:'');
}

// ── per-char controls ──
function charNext(ci){
  if(S.followMode)return;
  const c=S.chars[ci];if(!c||!c.charData)return;
  const n=c.charData.strokes.length;
  if(c.stepIdx>=n){c.stepIdx=0;renderSvg(ci,0);setTimeout(()=>{c.stepIdx=1;renderSvg(ci,1,0);updateSt(ci);},60);return;}
  const prev=c.stepIdx++;renderSvg(ci,c.stepIdx,prev);updateSt(ci);
}
function charPrev(ci){
  if(S.followMode)return;
  const c=S.chars[ci];if(!c||!c.charData||c.stepIdx<=0)return;
  c.stepIdx--;renderSvg(ci,c.stepIdx);updateSt(ci);
}
function charReset(ci){
  if(S.followMode)return;
  exitCharQuiz(ci);
  const c=S.chars[ci];if(!c||!c.charData)return;
  c.stepIdx=c.charData.strokes.length;renderSvg(ci,c.stepIdx);updateSt(ci);
}
function updateSt(ci){
  const c=S.chars[ci];if(!c||!c.charData)return;
  const n=c.charData.strokes.length,s=c.stepIdx;
  setSt(ci,s===0?`${n}笔（隐藏）`:s===n?`${n}笔`:`第${s}/${n}笔`,s===n?'ok':'');
}

function resetAll(){
  exitAllQuiz();S.followMode=false;S.coverMode=false;
  document.getElementById('btn-follow').classList.remove('toggled');
  document.getElementById('btn-follow').textContent='🖊 跟写';
  document.getElementById('btn-cover').classList.remove('toggled');
  document.getElementById('btn-cover').textContent='👁 遮盖';
  document.getElementById('study-quiz-msg').textContent='';
  // unhide covers
  S.chars.forEach((_,ci)=>{const cv=document.getElementById(`cv-${ci}`);if(cv)cv.classList.remove('show');});
  S.chars.forEach((_,ci)=>charReset(ci));
}

// ── follow mode ──
function toggleFollow(){
  S.followMode=!S.followMode;
  const btn=document.getElementById('btn-follow');
  btn.classList.toggle('toggled',S.followMode);
  btn.textContent=S.followMode?'✋ 退出跟写':'🖊 跟写';
  if(S.followMode) startFollow();
  else exitAllQuiz();
}
function startFollow(){
  S.chars.forEach((c,ci)=>{exitCharQuiz(ci);if(c.charData){c.stepIdx=0;renderSvg(ci,0);}});
  S.followCharIdx=0;advanceFollow();
}
function advanceFollow(){
  if(!S.followMode)return;
  const ci=S.followCharIdx;
  if(ci>=S.chars.length){finishFollow();return;}
  const c=S.chars[ci];
  if(!c||!c.charData){S.followCharIdx++;advanceFollow();return;}
  const box=document.getElementById(`box-${ci}`);
  if(!box)return;
  document.getElementById(`svg-${ci}`).style.display='none';
  const qd=document.getElementById(`qd-${ci}`);
  qd.style.display='block';qd.innerHTML='';
  const bsz=box.clientWidth||240;
  document.getElementById('study-quiz-msg').textContent=`✏️ 请描写「${c.ch}」`;
  S.quizWriter=HanziWriter.create(`qd-${ci}`,c.ch,{
    width:bsz,height:bsz,padding:Math.round(bsz*.05),
    showCharacter:false,showOutline:true,
    strokeColor:'#444',outlineColor:'#DDD',
    drawingColor:'#3B82F6',drawingWidth:Math.max(5,Math.round(bsz*.025)),
    showHintAfterMisses:3,highlightColor:'#EAB308',
    charDataLoader:(ch2,onL,onE)=>{
      fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${encodeURIComponent(ch2)}.json`)
        .then(r=>{if(!r.ok)throw new Error();return r.json();}).then(onL).catch(onE);
    },
    onLoadCharDataSuccess:()=>{
      S.quizWriter.quiz({
        onMistake:d=>{document.getElementById('study-quiz-msg').textContent=`第${d.strokeNum+1}笔再试！😅`;},
        onCorrectStroke:d=>{document.getElementById('study-quiz-msg').textContent=`第${d.strokeNum+1}笔棒棒！👍`;},
        onComplete:sum=>{
          document.getElementById('study-quiz-msg').textContent=`「${c.ch}」完成！错${sum.totalMistakes}次 🎉`;
          exitCharQuiz(ci);
          document.getElementById(`svg-${ci}`).style.display='';
          c.stepIdx=c.charData.strokes.length;renderSvg(ci,c.stepIdx);
          S.followCharIdx++;setTimeout(()=>advanceFollow(),700);
        }
      });
    }
  });
}
function finishFollow(){S.followMode=false;const b=document.getElementById('btn-follow');b.classList.remove('toggled');b.textContent='🖊 跟写';document.getElementById('study-quiz-msg').textContent='🎉 全部完成！';}
function exitCharQuiz(ci){
  const qd=document.getElementById(`qd-${ci}`);if(qd){qd.style.display='none';qd.innerHTML='';}
  const sv=document.getElementById(`svg-${ci}`);if(sv)sv.style.display='';
  S.quizWriter=null;
}
function exitAllQuiz(){S.quizWriter=null;S.chars.forEach((_,ci)=>exitCharQuiz(ci));}

// ── cover mode ──
function toggleCover(){
  S.coverMode=!S.coverMode;
  S.chars.forEach((_,ci)=>{const cv=document.getElementById(`cv-${ci}`);if(cv)cv.classList.toggle('show',S.coverMode);});
  const btn=document.getElementById('btn-cover');
  btn.classList.toggle('toggled',S.coverMode);
  btn.textContent=S.coverMode?'👁 显示':'👁 遮盖';
}

// ── speak ──
function speakCurrent(){
  const e=currentEntry();if(!e||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(e.hanzi);
  u.lang='zh-CN';u.rate=0.8;u.pitch=1.1;window.speechSynthesis.speak(u);
}

// ══════════════════════════════════════
// MANAGE
// ══════════════════════════════════════
function renderManage(){
  const body=document.getElementById('manage-body');body.innerHTML='';
  if(!store.groups.length){
    body.innerHTML=`<div style="text-align:center;padding:36px;color:var(--muted)"><div style="font-size:3rem">📚</div><div style="margin-top:8px;font-weight:700">暂无分组</div><div style="font-size:.78rem;margin-top:5px">点右上角「＋ 分组」新建</div></div>`;
    return;
  }
  store.groups.forEach(g=>{
    const card=document.createElement('div');card.className='wm-group';
    card.innerHTML=`<div class="wm-gh"><span class="wm-gdot" style="background:${g.color}"></span><span class="wm-gname">${g.name}</span><span class="wm-gcnt">${g.entries.length}条</span><div class="wm-ga"><button class="btn btn-ghost btn-sm btn-icon" onclick="openGroupPicker('${g.id}')" title="学习">📖</button><button class="btn btn-ghost btn-sm btn-icon" onclick="openEditGroup('${g.id}')" title="编辑">✏️</button></div></div><div class="wm-entries" id="wme-${g.id}"></div>`;
    body.appendChild(card);
    const el=card.querySelector(`#wme-${g.id}`);
    g.entries.forEach((e,ei)=>{
      const item=document.createElement('div');item.className='wm-entry';item.onclick=()=>openEditEntry(g.id,ei);
      const tag=e.type==='word'?'word':e.mode;
      const tl=e.type==='word'?'词语':e.mode==='simple'?'简':'复';
      item.innerHTML=`<div><div class="wm-ehanzi">${e.hanzi}</div><div class="wm-epy">${e.pinyin||autoPinyin(e.hanzi)}</div></div><span class="wm-etag ${tag}">${tl}</span>`;
      el.appendChild(item);
    });
    const ab=document.createElement('button');ab.className='wm-add';ab.title='添加';ab.textContent='＋';ab.onclick=()=>openAddEntry(g.id);
    el.appendChild(ab);
  });
}

// ══════════════════════════════════════
// MODAL: entry
// ══════════════════════════════════════
let ms={groupId:null,entryIdx:null,formMode:'simple',entryType:'char',selColor:GRP_COLORS[0],editGroupId:null};

function openAddEntry(gid){
  ms.groupId=gid;ms.entryIdx=null;ms.formMode='simple';ms.entryType='char';
  document.getElementById('mentitle').textContent='添加字/词';
  document.getElementById('m-hanzi').value='';document.getElementById('m-hanzi').maxLength=1;
  document.getElementById('m-pinyin').value='';document.getElementById('m-red').value='';
  document.getElementById('m-del').style.display='none';
  document.getElementById('wcc-table').innerHTML='';
  setEntryType('char');setFormMode('simple');
  openModal('modal-entry');
}
function openEditEntry(gid,ei){
  const g=store.groups.find(x=>x.id===gid);if(!g)return;
  const e=g.entries[ei];ms.groupId=gid;ms.entryIdx=ei;ms.formMode=e.mode||'simple';ms.entryType=e.type||'char';
  document.getElementById('mentitle').textContent='编辑字/词';
  document.getElementById('m-hanzi').value=e.hanzi;
  document.getElementById('m-hanzi').maxLength=ms.entryType==='char'?1:10;
  document.getElementById('m-pinyin').value=e.pinyin||'';
  document.getElementById('m-red').value=e.redRange||'';
  document.getElementById('m-del').style.display='inline-flex';
  setEntryType(ms.entryType);setFormMode(ms.formMode);
  if(ms.entryType==='word') buildWccTable(e.hanzi,e.charCfg||[]);
  openModal('modal-entry');
}
function setEntryType(t){
  ms.entryType=t;
  document.getElementById('etype-char').classList.toggle('active',t==='char');
  document.getElementById('etype-word').classList.toggle('active',t==='word');
  document.getElementById('ehanzi-lbl').textContent=t==='char'?'汉字（单个）':'词语（多个字）';
  document.getElementById('m-hanzi').maxLength=t==='char'?1:10;
  document.getElementById('m-hanzi').placeholder=t==='char'?'如：爱':'如：大山';
  document.getElementById('char-cfg').style.display=t==='char'?'':'none';
  document.getElementById('word-cfg').style.display=t==='word'?'':'none';
  if(t==='word'){const h=document.getElementById('m-hanzi').value.trim();if(h)buildWccTable(h,[]);}
}
function setFormMode(m){
  ms.formMode=m;
  document.getElementById('fmbtn-s').classList.toggle('active',m==='simple');
  document.getElementById('fmbtn-c').classList.toggle('active',m==='complex');
  document.getElementById('red-range-row').style.display=m==='complex'?'flex':'none';
  document.getElementById('red-range-row').style.flexDirection='column';
  document.getElementById('red-range-row').style.gap='4px';
}
function onHanziInput(){
  if(ms.entryType==='word'){
    const h=document.getElementById('m-hanzi').value.trim();
    buildWccTable(h,[]);
  }
}
function buildWccTable(hanzi,existing){
  const tbl=document.getElementById('wcc-table');tbl.innerHTML='';
  const chars=[...hanzi];
  chars.forEach((ch,i)=>{
    const cfg=(existing||[])[i]||{mode:'simple',redRange:''};
    const row=document.createElement('div');row.className='wcc-row';
    const rangeId=`wcc-range-${i}`;
    row.innerHTML=`
      <span class="wcc-ch">${ch}</span>
      <div class="wcc-tabs">
        <button class="wcc-tab ${cfg.mode==='simple'?'active':''}" onclick="setWccMode(${i},'simple')">🎨 简单</button>
        <button class="wcc-tab ${cfg.mode==='complex'?'active':''}" onclick="setWccMode(${i},'complex')">🧩 复杂</button>
      </div>
      <input class="wcc-range ${cfg.mode==='complex'?'show':''}" id="${rangeId}" placeholder="红色笔画 如1-3" value="${cfg.redRange||''}">`;
    tbl.appendChild(row);
  });
}
function setWccMode(i,m){
  const tbl=document.getElementById('wcc-table');
  const rows=tbl.querySelectorAll('.wcc-row');
  if(!rows[i])return;
  rows[i].querySelectorAll('.wcc-tab').forEach(t=>t.classList.remove('active'));
  rows[i].querySelectorAll('.wcc-tab')[m==='complex'?1:0].classList.add('active');
  const ri=rows[i].querySelector('.wcc-range');
  if(ri)ri.classList.toggle('show',m==='complex');
}
function getWccConfig(){
  const tbl=document.getElementById('wcc-table');
  const rows=tbl.querySelectorAll('.wcc-row');
  return Array.from(rows).map(row=>{
    const active=row.querySelector('.wcc-tab.active');
    const mode=active&&active.textContent.includes('复杂')?'complex':'simple';
    const range=row.querySelector('.wcc-range');
    return{mode,redRange:range?range.value.trim():''};
  });
}
function saveEntry(){
  const hanzi=document.getElementById('m-hanzi').value.trim();
  if(!hanzi){alert('请输入汉字或词语');return;}
  let pinyin=document.getElementById('m-pinyin').value.trim();
  if(!pinyin)pinyin=autoPinyin(hanzi);
  const g=store.groups.find(x=>x.id===ms.groupId);if(!g)return;
  let obj;
  if(ms.entryType==='char'){
    obj={type:'char',hanzi,pinyin,mode:ms.formMode,redRange:document.getElementById('m-red').value.trim()};
  } else {
    obj={type:'word',hanzi,pinyin,charCfg:getWccConfig()};
  }
  if(ms.entryIdx===null)g.entries.push(obj);
  else g.entries[ms.entryIdx]=obj;
  saveStore();closeModal('modal-entry');renderManage();renderHome();
}
function deleteEntry(){
  if(!confirm('删除这条记录吗？'))return;
  const g=store.groups.find(x=>x.id===ms.groupId);if(!g)return;
  g.entries.splice(ms.entryIdx,1);saveStore();closeModal('modal-entry');renderManage();renderHome();
}

// ══════════════════════════════════════
// MODAL: group
// ══════════════════════════════════════
function initCp(){
  const el=document.getElementById('mg-color');el.innerHTML='';
  GRP_COLORS.forEach(c=>{
    const d=document.createElement('div');d.className='cp-dot'+(c===ms.selColor?' selected':'');
    d.style.background=c;d.onclick=()=>{ms.selColor=c;el.querySelectorAll('.cp-dot').forEach(x=>x.classList.remove('selected'));d.classList.add('selected');};
    el.appendChild(d);
  });
}
function openAddGroup(){
  ms.editGroupId=null;ms.selColor=GRP_COLORS[store.groups.length%GRP_COLORS.length];
  document.getElementById('mgtitle').textContent='新建分组';
  document.getElementById('mg-name').value='';
  document.getElementById('mg-del').style.display='none';
  initCp();openModal('modal-group');
}
function openEditGroup(gid){
  const g=store.groups.find(x=>x.id===gid);if(!g)return;
  ms.editGroupId=gid;ms.selColor=g.color;
  document.getElementById('mgtitle').textContent='编辑分组';
  document.getElementById('mg-name').value=g.name;
  document.getElementById('mg-del').style.display='inline-flex';
  initCp();openModal('modal-group');
}
function saveGroup(){
  const name=document.getElementById('mg-name').value.trim();if(!name){alert('请输入分组名称');return;}
  if(ms.editGroupId){const g=store.groups.find(x=>x.id===ms.editGroupId);if(g){g.name=name;g.color=ms.selColor;}}
  else store.groups.push({id:'g'+Date.now(),name,color:ms.selColor,entries:[]});
  saveStore();closeModal('modal-group');renderManage();renderHome();
}
function deleteGroup(){
  if(!confirm('确定删除整个分组？'))return;
  store.groups=store.groups.filter(x=>x.id!==ms.editGroupId);
  saveStore();closeModal('modal-group');renderManage();renderHome();
}

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
function autoPinyin(s){
  if(window.pinyinPro){try{return pinyinPro.pinyin(s,{toneType:'symbol',type:'string'});}catch(e){}}
  return '';
}

// keyboard: ← → switch entry in study
document.addEventListener('keydown',e=>{
  if(!document.getElementById('page-study').classList.contains('active'))return;
  if(document.querySelector('.modal-overlay.open'))return;
  if(e.key==='ArrowRight')goNextEntry();
  if(e.key==='ArrowLeft')goPrevEntry();
});

renderHome();
</script>
</body>
</html>
