<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉字小课堂</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.24.2/dist/index.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  /* 活泼主色 */
  --ink:#1a1a2e;--ink2:#16213e;--muted:#94a3b8;--border:#e2e8f0;
  --bg:#f0f4ff;--paper:#ffffff;
  --red:#f43f5e;--orange:#fb923c;--yellow:#fbbf24;
  --green:#34d399;--teal:#2dd4bf;--blue:#60a5fa;--violet:#a78bfa;
  --pink:#f472b6;--accent:#fbbf24;--stamp:#f43f5e;
  /* fun gradients */
  --grad-hero:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  --grad-study:linear-gradient(135deg,#f093fb 0%,#f5576c 100%);
  --grad-manage:linear-gradient(135deg,#4facfe 0%,#00f2fe 100%);
  --grad-achieve:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%);
  --grad-practice:linear-gradient(135deg,#fa709a 0%,#fee140 100%);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column}

/* ── SPA ── */
.page{display:none;flex-direction:column;height:100%;overflow:hidden;animation:fadeUp .25s ease both}
.page.active{display:flex}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── shared topbar ── */
.topbar{
  flex-shrink:0;height:54px;display:flex;align-items:center;padding:0 14px;gap:10px;
  background:var(--paper);border-bottom:2px solid var(--border);z-index:10;
  box-shadow:0 2px 8px rgba(102,126,234,.08);
}
.topbar-title{
  font-family:'ZCOOL XiaoWei',cursive;font-size:1.1rem;font-weight:600;
  flex:1;text-align:center;letter-spacing:3px;
  background:var(--grad-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.icon-btn{
  width:36px;height:36px;border-radius:10px;border:2px solid var(--border);
  background:var(--paper);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.95rem;transition:all .15s;flex-shrink:0;
}
.icon-btn:hover{background:var(--bg);border-color:#a78bfa;transform:scale(1.05)}

/* ── buttons — all content centered ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:9px 18px;border-radius:12px;border:2px solid transparent;
  font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;
  transition:all .15s;white-space:nowrap;line-height:1;text-align:center;
}
.btn:active{transform:scale(.95)}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(102,126,234,.4)}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-ghost{background:var(--paper);color:var(--ink2);border-color:var(--border)}
.btn-ghost:hover{background:var(--bg);border-color:#a78bfa;color:#764ba2}
.btn-danger{background:#fff1f2;color:#f43f5e;border-color:#fecdd3}
.btn-danger:hover{background:#ffe4e6}
.btn-sm{padding:7px 14px;font-size:.78rem;border-radius:9px}
.btn-icon{padding:8px;border-radius:9px;min-width:34px;min-height:34px}
.btn.toggled{background:linear-gradient(135deg,#f43f5e,#fb923c)!important;color:#fff!important;border-color:transparent!important;box-shadow:0 3px 10px rgba(244,63,94,.35)!important}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:linear-gradient(#a78bfa,#60a5fa);border-radius:4px}

/* ════════════════════════
   HOME
════════════════════════ */
#page-home{background:var(--bg)}
.home-hero{
  flex-shrink:0;background:var(--grad-hero);color:#fff;
  padding:32px 22px 38px;position:relative;overflow:hidden;
}
.home-hero::before{content:'';position:absolute;right:-50px;top:-50px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.08)}
.home-hero::after{content:'';position:absolute;left:-30px;bottom:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.05)}
.hero-eyebrow{font-size:.68rem;letter-spacing:4px;color:rgba(255,255,255,.65);margin-bottom:8px}
.hero-title{font-family:'Ma Shan Zheng',cursive;font-size:2.8rem;line-height:1;letter-spacing:8px;margin-bottom:6px}
.hero-title span{color:#fbbf24}
.hero-sub{font-size:.82rem;color:rgba(255,255,255,.7);letter-spacing:1px}
.home-body{flex:1;overflow-y:auto;padding:18px 16px 28px}
.sec-label{
  font-size:.67rem;letter-spacing:3px;color:var(--muted);margin-bottom:10px;
  font-weight:700;text-transform:uppercase;
}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.nav-card{
  background:var(--paper);border:2px solid var(--border);border-radius:16px;
  padding:18px 14px;cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;gap:8px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);position:relative;overflow:hidden;
}
.nav-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
.nav-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.nav-card:active{transform:scale(.97)}
.nav-icon{font-size:1.8rem;line-height:1}
.nav-name{font-weight:900;font-size:.92rem;color:var(--ink)}
.nav-desc{font-size:.72rem;color:var(--muted);line-height:1.4}
/* colorful top bars per card */
.nav-card.hl{background:linear-gradient(135deg,#667eea,#764ba2);border-color:transparent}
.nav-card.hl::before{display:none}
.nav-card.hl .nav-name{color:#fff}
.nav-card.hl .nav-desc{color:rgba(255,255,255,.65)}
.nav-card:nth-child(2)::before{background:var(--grad-practice)}
.nav-card:nth-child(3)::before{background:var(--grad-achieve)}
.nav-card:nth-child(4)::before{background:var(--grad-manage)}
.nav-badge{
  position:absolute;top:10px;right:10px;
  background:#fbbf24;color:#1a1a2e;
  font-size:.58rem;font-weight:900;padding:2px 7px;border-radius:99px;
}
.group-chips{display:flex;flex-wrap:wrap;gap:8px}
.g-chip{
  display:flex;align-items:center;gap:6px;padding:7px 13px;
  background:var(--paper);border:2px solid var(--border);border-radius:10px;
  cursor:pointer;transition:all .15s;font-size:.8rem;font-weight:700;
}
.g-chip:hover{border-color:#a78bfa;background:#faf5ff;color:#7c3aed}
.g-chip-dot{width:8px;height:8px;border-radius:50%}
.g-chip-n{font-size:.67rem;color:var(--muted);font-weight:400}

/* ════════════════════════
   GROUP PICKER — full page
════════════════════════ */
#page-gpick{background:var(--bg)}
.gpick-body{flex:1;overflow-y:auto;padding:20px 16px 32px}
.gpick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.gpick-card{
  background:var(--paper);border:2px solid var(--border);border-radius:18px;
  padding:20px 18px 16px;cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;gap:12px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);position:relative;overflow:hidden;
}
.gpick-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
}
.gpick-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(102,126,234,.15)}
.gpick-card:active{transform:scale(.97)}
.gpick-card-top{display:flex;align-items:center;gap:10px}
.gpick-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.gpick-name{font-weight:900;font-size:1rem;flex:1;color:var(--ink)}
.gpick-arrow{font-size:1.1rem;color:var(--muted)}
.gpick-meta{display:flex;gap:7px;flex-wrap:wrap}
.gpick-tag{
  font-size:.72rem;padding:3px 10px;border-radius:99px;
  background:var(--bg);border:1.5px solid var(--border);
  color:var(--muted);font-weight:600;
}
.gpick-empty{text-align:center;padding:48px 20px;color:var(--muted)}
.gpick-empty-icon{font-size:3rem;opacity:.3;margin-bottom:10px}
.gpick-empty-text{font-size:.88rem;font-weight:700;color:var(--ink2);margin-bottom:6px}
.gpick-empty-sub{font-size:.78rem;line-height:1.6}

/* ════════════════════════
   STUDY PAGE
════════════════════════ */
#page-study{background:var(--bg)}

.study-body{
  flex:1;overflow:hidden;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:16px 60px;gap:14px;position:relative;
}

/* Nav arrows */
.entry-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:5}
.entry-nav.left{left:6px}
.entry-nav.right{right:6px}
.nav-arrow{
  width:38px;height:58px;border-radius:14px;border:2px solid var(--border);
  background:var(--paper);display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.3rem;font-weight:900;transition:all .18s;color:var(--muted);
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.nav-arrow:hover{background:var(--grad-hero);background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(102,126,234,.4);transform:scale(1.06)}
.nav-arrow:disabled{opacity:.2;pointer-events:none;box-shadow:none}

.study-center{display:flex;flex-direction:column;align-items:center;gap:14px;max-width:760px;width:100%}

/* row of boxes */
.tzg-row{display:flex;gap:20px;align-items:flex-start;justify-content:center;flex-wrap:wrap}
.tzg-unit{display:flex;flex-direction:column;align-items:center;gap:8px}

.tzg-pinyin{
  font-size:1.6rem;font-weight:900;letter-spacing:5px;
  font-family:'Noto Sans SC',sans-serif;min-height:1.8em;
  text-align:center;line-height:1.2;
  background:linear-gradient(135deg,#f43f5e,#fb923c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* uniform 240×240 box */
.tzg-box{
  position:relative;background:#fff;
  border:2.5px solid #c4b5fd;border-radius:8px;
  overflow:hidden;flex-shrink:0;
  width:240px;height:240px;
  box-shadow:0 4px 16px rgba(167,139,250,.2);
}
.tzg-char-svg{position:absolute;inset:0;width:100%;height:100%;z-index:1}
.tzg-quiz-div{position:absolute;inset:0;z-index:2;display:none}
.tzg-cover{position:absolute;inset:0;z-index:3;display:none}
.tzg-cover.show{display:block}

/* mini controls per char */
.tzg-mini-ctrl{display:flex;gap:6px;justify-content:center}
.tzg-status{font-size:.72rem;color:var(--muted);text-align:center;min-height:1em;font-weight:600}
.tzg-status.ok{color:#34d399}
.tzg-status.err{color:#f43f5e}

/* entry counter */
.entry-label{
  font-size:.78rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-align:center;
}

/* quiz message */
.study-quiz-msg{
  font-size:.92rem;font-weight:800;text-align:center;min-height:1.2em;
  letter-spacing:.3px;color:var(--ink);
}

/* action bar */
.study-actions{
  flex-shrink:0;display:flex;gap:9px;flex-wrap:wrap;justify-content:center;
  padding:11px 16px 13px;
  border-top:2px solid var(--border);
  background:var(--paper);
  box-shadow:0 -2px 10px rgba(102,126,234,.06);
}

/* ════════════════════════
   MANAGE PAGE
════════════════════════ */
#page-manage{background:var(--bg)}
.manage-body{flex:1;overflow-y:auto;padding:12px 14px 28px}
.wm-group{
  background:var(--paper);border:2px solid var(--border);border-radius:16px;
  margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.wm-gh{
  display:flex;align-items:center;gap:8px;padding:11px 14px;
  border-bottom:2px solid var(--border);background:var(--bg);
}
.wm-gdot{width:11px;height:11px;border-radius:50%;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.wm-gname{flex:1;font-weight:900;font-size:.9rem}
.wm-gcnt{font-size:.7rem;color:var(--muted);background:var(--border);padding:2px 7px;border-radius:99px}
.wm-ga{display:flex;gap:5px}
.wm-entries{padding:10px 13px;display:flex;flex-wrap:wrap;gap:7px}
.wm-entry{
  display:flex;align-items:center;gap:6px;
  background:var(--bg);border:2px solid var(--border);
  border-radius:9px;padding:5px 9px;cursor:pointer;transition:all .15s;
}
.wm-entry:hover{border-color:#a78bfa;background:#faf5ff;transform:translateY(-1px)}
.wm-ehanzi{font-family:'Ma Shan Zheng',cursive;font-size:1.3rem;line-height:1}
.wm-epy{font-size:.63rem;color:var(--muted)}
.wm-etag{font-size:.58rem;padding:2px 5px;border-radius:4px;font-weight:800}
.wm-etag.simple{background:#d1fae5;color:#065f46}
.wm-etag.complex{background:#ede9fe;color:#5b21b6}
.wm-etag.word{background:#fef3c7;color:#92400e}
.wm-add{
  display:flex;align-items:center;justify-content:center;width:46px;height:46px;
  border:2px dashed var(--border);border-radius:9px;cursor:pointer;
  font-size:1.2rem;color:var(--muted);transition:all .15s;background:transparent;
}
.wm-add:hover{border-color:#a78bfa;color:#7c3aed;background:#faf5ff}

/* ════════════════════════
   PLACEHOLDER
════════════════════════ */
.placeholder-body{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;color:var(--muted);padding:40px;text-align:center;
}
.ph-icon{font-size:4rem;opacity:.4}
.ph-text{font-size:.95rem;font-weight:900;color:var(--ink2)}
.ph-sub{font-size:.8rem;line-height:1.8;color:var(--muted)}

/* ════════════════════════
   MODAL (entry / group)
════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(26,26,46,.5);backdrop-filter:blur(3px);
  z-index:100;display:none;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal{
  background:var(--paper);border-radius:20px;width:100%;max-width:430px;
  max-height:90vh;overflow-y:auto;
  box-shadow:0 24px 64px rgba(26,26,46,.2);
  animation:slideUp .22s ease;border:2px solid var(--border);
}
.mhdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px 0;
}
.mtitle{
  font-weight:900;font-size:.95rem;
  background:var(--grad-hero);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.mclose{
  width:30px;height:30px;border-radius:8px;border:2px solid var(--border);
  background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.85rem;transition:all .12s;
}
.mclose:hover{background:#fecdd3;border-color:#f43f5e;color:#f43f5e}
.mbody{padding:14px 18px 16px;display:flex;flex-direction:column;gap:12px}
.frow{display:flex;flex-direction:column;gap:5px}
.flabel{font-size:.74rem;font-weight:800;color:var(--ink2);letter-spacing:.5px}
.finput{
  border:2px solid var(--border);border-radius:10px;padding:9px 12px;
  font-size:.88rem;font-family:inherit;background:var(--bg);outline:none;
  transition:border-color .18s;width:100%;
}
.finput:focus{border-color:#a78bfa;background:var(--paper);box-shadow:0 0 0 3px rgba(167,139,250,.15)}
.fhint{font-size:.68rem;color:var(--muted);line-height:1.5}
.ftabs{display:flex;gap:6px}
.ftab{
  flex:1;padding:8px;border-radius:9px;border:2px solid var(--border);
  background:var(--bg);font-family:inherit;font-size:.76rem;font-weight:700;
  cursor:pointer;transition:all .15s;text-align:center;
}
.ftab.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(102,126,234,.3)}
.mfooter{padding:0 18px 16px;display:flex;gap:8px;justify-content:flex-end}

/* word char config */
.word-char-cfg{display:flex;flex-direction:column;gap:7px;margin-top:4px}
.wcc-row{
  display:flex;align-items:center;gap:8px;padding:8px 11px;
  background:var(--bg);border:2px solid var(--border);border-radius:10px;
}
.wcc-ch{font-family:'Ma Shan Zheng',cursive;font-size:1.4rem;width:30px;text-align:center;flex-shrink:0}
.wcc-tabs{display:flex;gap:4px;flex:1}
.wcc-tab{
  flex:1;padding:5px 4px;border-radius:7px;border:2px solid var(--border);
  background:var(--paper);font-family:inherit;font-size:.72rem;font-weight:700;
  cursor:pointer;transition:all .12s;text-align:center;
}
.wcc-tab.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent}
.wcc-range{
  flex:1;border:2px solid var(--border);border-radius:7px;padding:5px 8px;
  font-size:.72rem;font-family:inherit;outline:none;background:#fff;display:none;
}
.wcc-range.show{display:block}
.wcc-range:focus{border-color:#a78bfa}

/* color picker */
.color-picker{display:flex;gap:8px;flex-wrap:wrap}
.cp-dot{
  width:24px;height:24px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;transition:all .15s;
  box-shadow:0 2px 6px rgba(0,0,0,.2);
}
.cp-dot.selected{border-color:var(--ink);transform:scale(1.25);box-shadow:0 3px 10px rgba(0,0,0,.3)}
</style>
</head>
<body>

<!-- ═══════ HOME ═══════ -->
<div id="page-home" class="page active">
  <div class="home-hero">
    <div class="hero-eyebrow">小学汉字学习</div>
    <div class="hero-title">汉字<span>课堂</span></div>
    <div class="hero-sub">一笔一划，认识每个汉字</div>
  </div>
  <div class="home-body">
    <div class="sec-label">主菜单</div>
    <div class="nav-grid">
      <div class="nav-card hl" onclick="showPage('gpick');renderGpick()">
        <div class="nav-icon">📖</div><div class="nav-name">学 习</div>
        <div class="nav-desc">笔顺动画，彩色笔划</div><div class="nav-badge">NEW</div>
      </div>
      <div class="nav-card" onclick="showPage('practice')">
        <div class="nav-icon">✏️</div><div class="nav-name">练 习</div><div class="nav-desc">跟着描字，检验笔顺</div>
      </div>
      <div class="nav-card" onclick="showPage('achieve')">
        <div class="nav-icon">🏆</div><div class="nav-name">成 就</div><div class="nav-desc">学习记录，解锁徽章</div>
      </div>
      <div class="nav-card" onclick="showPage('manage');renderManage()">
        <div class="nav-icon">📚</div><div class="nav-name">字词管理</div><div class="nav-desc">添加分组，管理字词</div>
      </div>
    </div>
    <div class="sec-label">分组快速开始</div>
    <div class="group-chips" id="home-chips"></div>
  </div>
</div>

<!-- ═══════ GROUP PICKER PAGE ═══════ -->
<div id="page-gpick" class="page">
  <div class="topbar">
    <button class="icon-btn" onclick="showPage('home');renderHome()" title="返回首页">🏠</button>
    <div class="topbar-title">选择学习分组</div>
    <div style="width:34px"></div>
  </div>
  <div class="gpick-body">
    <div class="gpick-grid" id="gpick-grid"></div>
  </div>
</div>

<!-- ═══════ STUDY PAGE ═══════ -->
<div id="page-study" class="page">
  <!-- topbar: just home + title + speak -->
  <div class="topbar">
    <button class="icon-btn" onclick="showPage('home');renderHome()" title="返回首页">🏠</button>
    <div class="topbar-title" id="study-group-name">学 习</div>
    <button class="icon-btn" onclick="speakCurrent()" title="朗读">🔊</button>
  </div>

  <!-- centered body -->
  <div class="study-body">
    <!-- Left nav arrow -->
    <div class="entry-nav left">
      <button class="nav-arrow" id="btn-prev-entry" onclick="goPrevEntry()">‹</button>
    </div>

    <!-- Center content -->
    <div class="study-center">
      <div class="entry-label" id="entry-label">1 / 1</div>
      <div class="tzg-row" id="tzg-row"></div>
      <div class="study-quiz-msg" id="study-quiz-msg"></div>
    </div>

    <!-- Right nav arrow -->
    <div class="entry-nav right">
      <button class="nav-arrow" id="btn-next-entry" onclick="goNextEntry()">›</button>
    </div>
  </div>

  <!-- action bar -->
  <div class="study-actions">

<script>
// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
const GRP_COLORS=['#EF4444','#F97316','#EAB308','#22C55E','#14B8A6','#3B82F6','#8B5CF6','#EC4899'];
const STROKE_PAL=['#EF4444','#F97316','#EAB308','#22C55E','#14B8A6','#3B82F6','#8B5CF6'];
const HW_TF='scale(1,-1) translate(0,-900)';
const OUTLINE='#D4CFC6';

let store={
  groups:[
    {id:'g1',name:'一年级·基础字',color:'#3B82F6',entries:[
      {type:'char',hanzi:'山',pinyin:'shān',mode:'simple',redRange:''},
      {type:'char',hanzi:'水',pinyin:'shuǐ',mode:'simple',redRange:''},
      {type:'char',hanzi:'火',pinyin:'huǒ',mode:'simple',redRange:''},
      {type:'word',hanzi:'大山',pinyin:'dà shān',
       charCfg:[{mode:'simple',redRange:''},{mode:'simple',redRange:''}]},
      {type:'word',hanzi:'山水',pinyin:'shān shuǐ',
       charCfg:[{mode:'simple',redRange:''},{mode:'simple',redRange:''}]},
    ]},
    {id:'g2',name:'认识结构',color:'#8B5CF6',entries:[
      {type:'char',hanzi:'明',pinyin:'míng',mode:'complex',redRange:'1-4'},
      {type:'char',hanzi:'好',pinyin:'hǎo', mode:'complex',redRange:'1-3'},
      {type:'word',hanzi:'明天',pinyin:'míng tiān',
       charCfg:[{mode:'complex',redRange:'1-4'},{mode:'simple',redRange:''}]},
    ]}
  ]
};
function saveStore(){try{localStorage.setItem('hxkt_v3',JSON.stringify(store));}catch(e){}}
function loadStore(){try{const d=localStorage.getItem('hxkt_v3');if(d)store=JSON.parse(d);}catch(e){}}
loadStore();

// ══════════════════════════════════════
// NAV
// ══════════════════════════════════════
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
});

// ══════════════════════════════════════
// HOME
// ══════════════════════════════════════
function renderHome(){
  const el=document.getElementById('home-chips');
  el.innerHTML='';
  store.groups.forEach(g=>{
    const c=document.createElement('div');c.className='g-chip';c.onclick=()=>startStudy(g.id);
    c.innerHTML=`<span class="g-chip-dot" style="background:${g.color}"></span>${g.name}<span class="g-chip-n">${g.entries.length}条</span>`;
    el.appendChild(c);
  });
}

// ══════════════════════════════════════
// GROUP PICKER (full page)
// ══════════════════════════════════════
function renderGpick(){
  const grid=document.getElementById('gpick-grid');
  grid.innerHTML='';
  if(!store.groups.length){
    grid.innerHTML=`<div class="gpick-empty" style="grid-column:1/-1">
      <div class="gpick-empty-icon">📚</div>
      <div class="gpick-empty-text">暂无分组</div>
      <div class="gpick-empty-sub">请先在「字词管理」新建分组和字词</div>
    </div>`;
    return;
  }
  store.groups.forEach(g=>{
    const card=document.createElement('div');card.className='gpick-card';
    card.onclick=()=>startStudy(g.id);
    // accent left bar color
    card.style.borderLeftColor=g.color;
    card.style.borderLeftWidth='4px';
    const charCount=g.entries.filter(e=>e.type==='char').length;
    const wordCount=g.entries.filter(e=>e.type==='word').length;
    card.innerHTML=`
      <div class="gpick-card-top">
        <span class="gpick-dot" style="background:${g.color}"></span>
        <span class="gpick-name">${g.name}</span>
        <span class="gpick-arrow">›</span>
      </div>
      <div class="gpick-meta">
        ${charCount?`<span class="gpick-tag">${charCount} 个字</span>`:''}
        ${wordCount?`<span class="gpick-tag">${wordCount} 个词</span>`:''}
        ${!g.entries.length?'<span class="gpick-tag">暂无内容</span>':''}
      </div>`;
    grid.appendChild(card);
  });
}
function startStudy(gid){
  const g=store.groups.find(x=>x.id===gid);
  if(!g) return;
  S.groupId=gid;
  S.entryIdx=0;
  document.getElementById('study-group-name').textContent=g.name;
  showPage('study');
  loadEntry();
}

// ══════════════════════════════════════
// STUDY STATE
// ══════════════════════════════════════
let S={
  groupId:null,
  entryIdx:0,
  chars:[],       // [{ch,charData,strokeColors,stepIdx,mode,redRange}]
  followMode:false,
  coverMode:false,
  followCharIdx:0,
  quizWriter:null,
};

function currentGroup(){return store.groups.find(x=>x.id===S.groupId);}
function currentEntry(){const g=currentGroup();return g?g.entries[S.entryIdx]:null;}

function goPrevEntry(){
  if(S.entryIdx<=0) return;
  S.entryIdx--;
  loadEntry();
}
function goNextEntry(){
  const g=currentGroup();
  if(!g||S.entryIdx>=g.entries.length-1) return;
  S.entryIdx++;
  loadEntry();
}
function updateNavBtns(){
  const g=currentGroup();
  const n=g?g.entries.length:0;
  document.getElementById('btn-prev-entry').disabled=S.entryIdx<=0;
  document.getElementById('btn-next-entry').disabled=S.entryIdx>=n-1;
  document.getElementById('entry-label').textContent=`${S.entryIdx+1} / ${n}`;
}

// ══════════════════════════════════════
// LOAD ENTRY — builds the stage
// ══════════════════════════════════════
function loadEntry(){
  exitAllQuiz();
  S.followMode=false; S.coverMode=false;
  document.getElementById('btn-follow').classList.remove('toggled');
  document.getElementById('btn-follow').textContent='🖊 跟写';
  document.getElementById('btn-cover').classList.remove('toggled');
  document.getElementById('btn-cover').textContent='👁 遮盖';
  document.getElementById('study-quiz-msg').textContent='';
  updateNavBtns();

  const entry=currentEntry();
  if(!entry){ document.getElementById('tzg-row').innerHTML='<div style="color:var(--muted);padding:20px">暂无内容</div>'; return; }

  const chars=[...entry.hanzi];
  const n=chars.length;
  S.chars=[];

  // Build charCfg: for single char use entry.mode/redRange; for word use entry.charCfg[]
  const charCfgs = entry.type==='word'
    ? (entry.charCfg||chars.map(()=>({mode:'simple',redRange:''})))
    : [{mode:entry.mode||'simple',redRange:entry.redRange||''}];

  const row=document.getElementById('tzg-row');
  row.innerHTML='';

  const sz=''; // all same size now
  const boxPx=240;

  // Helper: build a tian zi ge SVG (cross + diagonals).
  // Uses viewBox="0 0 100 100" with preserveAspectRatio so it scales to any container size.
  function makeTzgSvg(extraStyle){
    const s=document.createElementNS('http://www.w3.org/2000/svg','svg');
    s.setAttribute('viewBox','0 0 100 100');
    s.setAttribute('preserveAspectRatio','none');
    s.setAttribute('xmlns','http://www.w3.org/2000/svg');
    s.style.cssText=extraStyle||'';
    const mkL=(x1,y1,x2,y2,sw,color,dash)=>{
      const l=document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',x1);l.setAttribute('y1',y1);
      l.setAttribute('x2',x2);l.setAttribute('y2',y2);
      l.setAttribute('stroke',color||'#c0b8a8');
      l.setAttribute('stroke-width',sw||'1');
      if(dash)l.setAttribute('stroke-dasharray',dash);
      return l;
    };
    // center vertical & horizontal dashed lines
    s.appendChild(mkL(50,0,50,100,'1','#c0b8a8','6,4'));
    s.appendChild(mkL(0,50,100,50,'1','#c0b8a8','6,4'));
    // diagonals dashed lighter
    s.appendChild(mkL(0,0,100,100,'0.8','#d0c8b8','5,5'));
    s.appendChild(mkL(100,0,0,100,'0.8','#d0c8b8','5,5'));
    return s;
  }

  chars.forEach((ch,ci)=>{
    const cfg=charCfgs[ci]||{mode:'simple',redRange:''};
    S.chars.push({ch,charData:null,strokeColors:[],stepIdx:0,mode:cfg.mode,redRange:cfg.redRange||''});

    const unit=document.createElement('div');
    unit.className='tzg-unit'+(n===1?' single':'');

    // ── PINYIN ABOVE the box ──
    const pyEl=document.createElement('div');
    pyEl.className='tzg-pinyin';
    const pinyinParts=(entry.pinyin||autoPinyin(entry.hanzi)).split(' ');
    pyEl.textContent=pinyinParts[ci]||autoPinyin(ch);
    unit.appendChild(pyEl);   // <-- added BEFORE box

    // ── Box ──
    const box=document.createElement('div');
    box.className='tzg-box';
    box.id=`box-${ci}`;

    // background grid SVG (z-index 0)
    box.appendChild(makeTzgSvg('position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0'));

    // char SVG (z-index 1)
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 1024 1024');
    svg.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:1';
    svg.id=`svg-${ci}`;
    box.appendChild(svg);

    // quiz div (z-index 2)
    const qd=document.createElement('div');
    qd.style.cssText='position:absolute;inset:0;z-index:2;display:none';
    qd.id=`qd-${ci}`;
    box.appendChild(qd);

    // cover: white rect + grid lines (z-index 3) — hides strokes but shows grid
    const cv=document.createElement('div');
    cv.className='tzg-cover';
    cv.id=`cv-${ci}`;
    // SVG: white background rect + grid lines on top
    const cvSvg=makeTzgSvg('position:absolute;inset:0;width:100%;height:100%');
    const whiteRect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    whiteRect.setAttribute('width','100');whiteRect.setAttribute('height','100');whiteRect.setAttribute('fill','#fff');
    cvSvg.insertBefore(whiteRect,cvSvg.firstChild);
    cv.appendChild(cvSvg);
    box.appendChild(cv);

    unit.appendChild(box);

    // mini controls
    const mc=document.createElement('div');
    mc.className='tzg-mini-ctrl';
    mc.innerHTML=`
      <button class="btn btn-ghost btn-sm btn-icon" onclick="charPrev(${ci})" title="上一笔">◀</button>
      <button class="btn btn-primary btn-sm btn-icon" onclick="charNext(${ci})" title="下一笔">▶</button>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="charReset(${ci})" title="重置">↺</button>`;
    unit.appendChild(mc);

    // status
    const st=document.createElement('div');
    st.className='tzg-status';st.id=`st-${ci}`;st.textContent='加载…';
    unit.appendChild(st);

    row.appendChild(unit);
    fetchCharData(ch,ci);
  });
}

function fetchCharData(ch,ci){
  fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${encodeURIComponent(ch)}.json`)
    .then(r=>{if(!r.ok)throw new Error();return r.json();})
    .then(data=>{
      const c=S.chars[ci];
      c.charData=data;
      const n=data.strokes.length;
      c.strokeColors=buildColors(n,c.mode,c.redRange);
      c.stepIdx=n;
      renderSvg(ci,n);
      setSt(ci,`${n} 笔`,'ok');
    })
    .catch(()=>setSt(ci,'⚠️ 无数据','err'));
}

function buildColors(n,mode,redRange){
  if(mode==='simple') return Array.from({length:n},(_,i)=>STROKE_PAL[i%STROKE_PAL.length]);
  const rs=parseRange(redRange,n);
  return Array.from({length:n},(_,i)=>rs.has(i+1)?'#EF4444':'#3B82F6');
}
function parseRange(str,n){
  const s=new Set();
  if(!str) return s;
  str.split(',').forEach(p=>{
    p=p.trim();
    if(p.includes('-')){const[a,b]=p.split('-').map(Number);for(let i=a;i<=b&&i<=n;i++)s.add(i);}
    else{const v=parseInt(p);if(!isNaN(v)&&v>=1&&v<=n)s.add(v);}
  });
  return s;
}

function renderSvg(ci,upTo,animIdx){
  const c=S.chars[ci];if(!c||!c.charData)return;
  const svg=document.getElementById(`svg-${ci}`);if(!svg)return;
  svg.innerHTML='';
  c.charData.strokes.forEach(d=>svg.appendChild(mkP(d,OUTLINE)));
  for(let i=0;i<upTo;i++){
    const p=mkP(c.charData.strokes[i],c.strokeColors[i]);
    if(i===animIdx){
      p.style.opacity='0';p.style.transition='opacity .35s ease';
      svg.appendChild(p);
      requestAnimationFrame(()=>requestAnimationFrame(()=>{p.style.opacity='1';}));
    } else svg.appendChild(p);
  }
}
function mkP(d,color){
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',d);p.setAttribute('fill',color);p.setAttribute('transform',HW_TF);
  return p;
}
function setSt(ci,msg,cls){
  const el=document.getElementById(`st-${ci}`);if(!el)return;
  el.textContent=msg;el.className='tzg-status'+(cls?' '+cls:'');
}

// ── per-char controls ──
function charNext(ci){
  if(S.followMode)return;
  const c=S.chars[ci];if(!c||!c.charData)return;
  const n=c.charData.strokes.length;
  if(c.stepIdx>=n){c.stepIdx=0;renderSvg(ci,0);setTimeout(()=>{c.stepIdx=1;renderSvg(ci,1,0);updateSt(ci);},60);return;}
  const prev=c.stepIdx++;renderSvg(ci,c.stepIdx,prev);updateSt(ci);
}
function charPrev(ci){
  if(S.followMode)return;
  const c=S.chars[ci];if(!c||!c.charData||c.stepIdx<=0)return;
  c.stepIdx--;renderSvg(ci,c.stepIdx);updateSt(ci);
}
function charReset(ci){
  if(S.followMode)return;
  exitCharQuiz(ci);
  const c=S.chars[ci];if(!c||!c.charData)return;
  c.stepIdx=c.charData.strokes.length;renderSvg(ci,c.stepIdx);updateSt(ci);
}
function updateSt(ci){
  const c=S.chars[ci];if(!c||!c.charData)return;
  const n=c.charData.strokes.length,s=c.stepIdx;
  setSt(ci,s===0?`${n}笔（隐藏）`:s===n?`${n}笔`:`第${s}/${n}笔`,s===n?'ok':'');
}

function resetAll(){
  exitAllQuiz();S.followMode=false;S.coverMode=false;
  document.getElementById('btn-follow').classList.remove('toggled');
  document.getElementById('btn-follow').textContent='🖊 跟写';
  document.getElementById('btn-cover').classList.remove('toggled');
  document.getElementById('btn-cover').textContent='👁 遮盖';
  document.getElementById('study-quiz-msg').textContent='';
  // unhide covers
  S.chars.forEach((_,ci)=>{const cv=document.getElementById(`cv-${ci}`);if(cv)cv.classList.remove('show');});
  S.chars.forEach((_,ci)=>charReset(ci));
}

// ── follow mode ──
function toggleFollow(){
  S.followMode=!S.followMode;
  const btn=document.getElementById('btn-follow');
  btn.classList.toggle('toggled',S.followMode);
  if(!S.followMode){btn.textContent='🖊 跟写';exitAllQuiz();return;}
  btn.textContent=S.coverMode?'✋ 退出默写':'✋ 退出跟写';
  startFollow();
}
function startFollow(){
  // If cover is on, this is 默写 mode: hide cover for quiz (quiz handles display), no outline shown
  S.chars.forEach((c,ci)=>{
    exitCharQuiz(ci);
    if(c.charData){c.stepIdx=0;renderSvg(ci,0);}
    // If covering, hide cover during quiz (quiz div is on top anyway at z-index 2, cover at 3)
    // We'll temporarily hide cover per char during its quiz, restore after
  });
  S.followCharIdx=0;advanceFollow();
}
function advanceFollow(){
  if(!S.followMode)return;
  const ci=S.followCharIdx;
  if(ci>=S.chars.length){finishFollow();return;}
  const c=S.chars[ci];
  if(!c||!c.charData){S.followCharIdx++;advanceFollow();return;}
  const box=document.getElementById(`box-${ci}`);
  if(!box)return;

  // During quiz, hide cover so drawing is visible, hide char SVG
  const cvEl=document.getElementById(`cv-${ci}`);
  if(cvEl) cvEl.classList.remove('show'); // temporarily hide cover during drawing
  document.getElementById(`svg-${ci}`).style.display='none';

  const qd=document.getElementById(`qd-${ci}`);
  qd.style.display='block';qd.innerHTML='';
  // quiz div is z-index 2, needs to be on top
  qd.style.zIndex='4';

  const bsz=box.clientWidth||240;
  const isMowrite=S.coverMode; // 默写: no outline hint
  document.getElementById('study-quiz-msg').textContent= isMowrite?`✏️ 默写「${c.ch}」`:`✏️ 请描写「${c.ch}」`;

  S.quizWriter=HanziWriter.create(`qd-${ci}`,c.ch,{
    width:bsz,height:bsz,padding:0,
    showCharacter:false,
    showOutline:!isMowrite, // 默写时不显示轮廓
    strokeColor:'#444',outlineColor:'#DDD',
    drawingColor:'#3B82F6',drawingWidth:Math.max(5,Math.round(bsz*.025)),
    showHintAfterMisses: isMowrite? 5 : 3, // 默写多给几次机会才提示
    highlightColor:'#EAB308',
    charDataLoader:(ch2,onL,onE)=>{
      fetch(`https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0/${encodeURIComponent(ch2)}.json`)
        .then(r=>{if(!r.ok)throw new Error();return r.json();}).then(onL).catch(onE);
    },
    onLoadCharDataSuccess:()=>{
      S.quizWriter.quiz({
        onMistake:d=>{document.getElementById('study-quiz-msg').textContent=`第${d.strokeNum+1}笔再试！😅`;},
        onCorrectStroke:d=>{document.getElementById('study-quiz-msg').textContent= isMowrite?`第${d.strokeNum+1}笔✓`:`第${d.strokeNum+1}笔棒棒！👍`;},
        onComplete:sum=>{
          document.getElementById('study-quiz-msg').textContent=
            isMowrite?`「${c.ch}」默写完成！错${sum.totalMistakes}次 🎉`:`「${c.ch}」完成！错${sum.totalMistakes}次 🎉`;
          exitCharQuiz(ci);
          // After quiz: show colored strokes, restore cover if in cover mode
          document.getElementById(`svg-${ci}`).style.display='';
          c.stepIdx=c.charData.strokes.length;renderSvg(ci,c.stepIdx);
          if(S.coverMode){
            const cv2=document.getElementById(`cv-${ci}`);
            if(cv2) cv2.classList.add('show'); // restore cover
          }
          S.followCharIdx++;setTimeout(()=>advanceFollow(),700);
        }
      });
    }
  });
}
function finishFollow(){S.followMode=false;const b=document.getElementById('btn-follow');b.classList.remove('toggled');b.textContent='🖊 跟写';document.getElementById('study-quiz-msg').textContent='🎉 全部完成！';}
function exitCharQuiz(ci){
  const qd=document.getElementById(`qd-${ci}`);
  if(qd){qd.style.display='none';qd.innerHTML='';qd.style.zIndex='2';} // reset zIndex
  const sv=document.getElementById(`svg-${ci}`);if(sv)sv.style.display='';
  S.quizWriter=null;
}
function exitAllQuiz(){S.quizWriter=null;S.chars.forEach((_,ci)=>exitCharQuiz(ci));}

// ── cover mode ──
function toggleCover(){
  S.coverMode=!S.coverMode;
  S.chars.forEach((_,ci)=>{const cv=document.getElementById(`cv-${ci}`);if(cv)cv.classList.toggle('show',S.coverMode);});
  const btn=document.getElementById('btn-cover');
  btn.classList.toggle('toggled',S.coverMode);
  btn.textContent=S.coverMode?'👁 显示':'👁 遮盖';
}

// ── speak ──
function speakCurrent(){
  const e=currentEntry();if(!e||!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(e.hanzi);
  u.lang='zh-CN';u.rate=0.8;u.pitch=1.1;window.speechSynthesis.speak(u);
}

// ══════════════════════════════════════
// MANAGE
// ══════════════════════════════════════
function renderManage(){
  const body=document.getElementById('manage-body');body.innerHTML='';
  if(!store.groups.length){
    body.innerHTML=`<div style="text-align:center;padding:36px;color:var(--muted)"><div style="font-size:3rem">📚</div><div style="margin-top:8px;font-weight:700">暂无分组</div><div style="font-size:.78rem;margin-top:5px">点右上角「＋ 分组」新建</div></div>`;
    return;
  }
  store.groups.forEach(g=>{
    const card=document.createElement('div');card.className='wm-group';
    card.innerHTML=`<div class="wm-gh"><span class="wm-gdot" style="background:${g.color}"></span><span class="wm-gname">${g.name}</span><span class="wm-gcnt">${g.entries.length}条</span><div class="wm-ga"><button class="btn btn-ghost btn-sm btn-icon" onclick="startStudy('${g.id}')" title="学习">📖</button><button class="btn btn-ghost btn-sm btn-icon" onclick="openEditGroup('${g.id}')" title="编辑">✏️</button></div></div><div class="wm-entries" id="wme-${g.id}"></div>`;
    body.appendChild(card);
    const el=card.querySelector(`#wme-${g.id}`);
    g.entries.forEach((e,ei)=>{
      const item=document.createElement('div');item.className='wm-entry';item.onclick=()=>openEditEntry(g.id,ei);
      const tag=e.type==='word'?'word':e.mode;
      const tl=e.type==='word'?'词语':e.mode==='simple'?'简':'复';
      item.innerHTML=`<div><div class="wm-ehanzi">${e.hanzi}</div><div class="wm-epy">${e.pinyin||autoPinyin(e.hanzi)}</div></div><span class="wm-etag ${tag}">${tl}</span>`;
      el.appendChild(item);
    });
    const ab=document.createElement('button');ab.className='wm-add';ab.title='添加';ab.textContent='＋';ab.onclick=()=>openAddEntry(g.id);
    el.appendChild(ab);
  });
}

// ══════════════════════════════════════
// MODAL: entry
// ══════════════════════════════════════
let ms={groupId:null,entryIdx:null,formMode:'simple',entryType:'char',selColor:GRP_COLORS[0],editGroupId:null};

function openAddEntry(gid){
  ms.groupId=gid;ms.entryIdx=null;ms.formMode='simple';ms.entryType='char';
  document.getElementById('mentitle').textContent='添加字/词';
  document.getElementById('m-hanzi').value='';document.getElementById('m-hanzi').maxLength=1;
  document.getElementById('m-pinyin').value='';document.getElementById('m-red').value='';
  document.getElementById('m-del').style.display='none';
  document.getElementById('wcc-table').innerHTML='';
  setEntryType('char');setFormMode('simple');
  openModal('modal-entry');
}
function openEditEntry(gid,ei){
  const g=store.groups.find(x=>x.id===gid);if(!g)return;
  const e=g.entries[ei];ms.groupId=gid;ms.entryIdx=ei;ms.formMode=e.mode||'simple';ms.entryType=e.type||'char';
  document.getElementById('mentitle').textContent='编辑字/词';
  document.getElementById('m-hanzi').value=e.hanzi;
  document.getElementById('m-hanzi').maxLength=ms.entryType==='char'?1:10;
  document.getElementById('m-pinyin').value=e.pinyin||'';
  document.getElementById('m-red').value=e.redRange||'';
  document.getElementById('m-del').style.display='inline-flex';
  setEntryType(ms.entryType);setFormMode(ms.formMode);
  if(ms.entryType==='word') buildWccTable(e.hanzi,e.charCfg||[]);
  openModal('modal-entry');
}
function setEntryType(t){
  ms.entryType=t;
  document.getElementById('etype-char').classList.toggle('active',t==='char');
  document.getElementById('etype-word').classList.toggle('active',t==='word');
  document.getElementById('ehanzi-lbl').textContent=t==='char'?'汉字（单个）':'词语（多个字）';
  document.getElementById('m-hanzi').maxLength=t==='char'?1:10;
  document.getElementById('m-hanzi').placeholder=t==='char'?'如：爱':'如：大山';
  document.getElementById('char-cfg').style.display=t==='char'?'':'none';
  document.getElementById('word-cfg').style.display=t==='word'?'':'none';
  if(t==='word'){const h=document.getElementById('m-hanzi').value.trim();if(h)buildWccTable(h,[]);}
}
function setFormMode(m){
  ms.formMode=m;
  document.getElementById('fmbtn-s').classList.toggle('active',m==='simple');
  document.getElementById('fmbtn-c').classList.toggle('active',m==='complex');
  document.getElementById('red-range-row').style.display=m==='complex'?'flex':'none';
  document.getElementById('red-range-row').style.flexDirection='column';
  document.getElementById('red-range-row').style.gap='4px';
}
function onHanziInput(){
  if(ms.entryType==='word'){
    const h=document.getElementById('m-hanzi').value.trim();
    buildWccTable(h,[]);
  }
}
function buildWccTable(hanzi,existing){
  const tbl=document.getElementById('wcc-table');tbl.innerHTML='';
  const chars=[...hanzi];
  chars.forEach((ch,i)=>{
    const cfg=(existing||[])[i]||{mode:'simple',redRange:''};
    const row=document.createElement('div');row.className='wcc-row';
    const rangeId=`wcc-range-${i}`;
    row.innerHTML=`
      <span class="wcc-ch">${ch}</span>
      <div class="wcc-tabs">
        <button class="wcc-tab ${cfg.mode==='simple'?'active':''}" onclick="setWccMode(${i},'simple')">🎨 简单</button>
        <button class="wcc-tab ${cfg.mode==='complex'?'active':''}" onclick="setWccMode(${i},'complex')">🧩 复杂</button>
      </div>
      <input class="wcc-range ${cfg.mode==='complex'?'show':''}" id="${rangeId}" placeholder="红色笔画 如1-3" value="${cfg.redRange||''}">`;
    tbl.appendChild(row);
  });
}
function setWccMode(i,m){
  const tbl=document.getElementById('wcc-table');
  const rows=tbl.querySelectorAll('.wcc-row');
  if(!rows[i])return;
  rows[i].querySelectorAll('.wcc-tab').forEach(t=>t.classList.remove('active'));
  rows[i].querySelectorAll('.wcc-tab')[m==='complex'?1:0].classList.add('active');
  const ri=rows[i].querySelector('.wcc-range');
  if(ri)ri.classList.toggle('show',m==='complex');
}
function getWccConfig(){
  const tbl=document.getElementById('wcc-table');
  const rows=tbl.querySelectorAll('.wcc-row');
  return Array.from(rows).map(row=>{
    const active=row.querySelector('.wcc-tab.active');
    const mode=active&&active.textContent.includes('复杂')?'complex':'simple';
    const range=row.querySelector('.wcc-range');
    return{mode,redRange:range?range.value.trim():''};
  });
}
function saveEntry(){
  const hanzi=document.getElementById('m-hanzi').value.trim();
  if(!hanzi){alert('请输入汉字或词语');return;}
  let pinyin=document.getElementById('m-pinyin').value.trim();
  if(!pinyin)pinyin=autoPinyin(hanzi);
  const g=store.groups.find(x=>x.id===ms.groupId);if(!g)return;
  let obj;
  if(ms.entryType==='char'){
    obj={type:'char',hanzi,pinyin,mode:ms.formMode,redRange:document.getElementById('m-red').value.trim()};
  } else {
    obj={type:'word',hanzi,pinyin,charCfg:getWccConfig()};
  }
  if(ms.entryIdx===null)g.entries.push(obj);
  else g.entries[ms.entryIdx]=obj;
  saveStore();closeModal('modal-entry');renderManage();renderHome();
}
function deleteEntry(){
  if(!confirm('删除这条记录吗？'))return;
  const g=store.groups.find(x=>x.id===ms.groupId);if(!g)return;
  g.entries.splice(ms.entryIdx,1);saveStore();closeModal('modal-entry');renderManage();renderHome();
}

// ══════════════════════════════════════
// MODAL: group
// ══════════════════════════════════════
function initCp(){
  const el=document.getElementById('mg-color');el.innerHTML='';
  GRP_COLORS.forEach(c=>{
    const d=document.createElement('div');d.className='cp-dot'+(c===ms.selColor?' selected':'');
    d.style.background=c;d.onclick=()=>{ms.selColor=c;el.querySelectorAll('.cp-dot').forEach(x=>x.classList.remove('selected'));d.classList.add('selected');};
    el.appendChild(d);
  });
}
function openAddGroup(){
  ms.editGroupId=null;ms.selColor=GRP_COLORS[store.groups.length%GRP_COLORS.length];
  document.getElementById('mgtitle').textContent='新建分组';
  document.getElementById('mg-name').value='';
  document.getElementById('mg-del').style.display='none';
  initCp();openModal('modal-group');
}
function openEditGroup(gid){
  const g=store.groups.find(x=>x.id===gid);if(!g)return;
  ms.editGroupId=gid;ms.selColor=g.color;
  document.getElementById('mgtitle').textContent='编辑分组';
  document.getElementById('mg-name').value=g.name;
  document.getElementById('mg-del').style.display='inline-flex';
  initCp();openModal('modal-group');
}
function saveGroup(){
  const name=document.getElementById('mg-name').value.trim();if(!name){alert('请输入分组名称');return;}
  if(ms.editGroupId){const g=store.groups.find(x=>x.id===ms.editGroupId);if(g){g.name=name;g.color=ms.selColor;}}
  else store.groups.push({id:'g'+Date.now(),name,color:ms.selColor,entries:[]});
  saveStore();closeModal('modal-group');renderManage();renderHome();
}
function deleteGroup(){
  if(!confirm('确定删除整个分组？'))return;
  store.groups=store.groups.filter(x=>x.id!==ms.editGroupId);
  saveStore();closeModal('modal-group');renderManage();renderHome();
}

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
function autoPinyin(s){
  if(window.pinyinPro){try{return pinyinPro.pinyin(s,{toneType:'symbol',type:'string'});}catch(e){}}
  return '';
}

// keyboard: ← → switch entry in study
document.addEventListener('keydown',e=>{
  if(!document.getElementById('page-study').classList.contains('active'))return;
  if(document.querySelector('.modal-overlay.open'))return;
  if(e.key==='ArrowRight')goNextEntry();
  if(e.key==='ArrowLeft')goPrevEntry();
});

renderHome();
</script>
</body>
</html>
